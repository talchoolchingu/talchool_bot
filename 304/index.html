*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;overflow-x:hidden;overflow-y:auto;font-family:'Galmuri11',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;min-height:100dvh;touch-action:auto;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}

.inv-slot{width:70px;height:44px;border:2px solid #555;background:#222;display:flex;align-items:center;justify-content:center;font-size:10px;color:#ccc;text-align:center;line-height:1.2;cursor:pointer;border-radius:4px;word-break:keep-all;padding:2px;}
.inv-slot.selected{border-color:#ffdd00;background:#554400;color:#ffdd00;}

#adminTL{position:fixed;left:0;top:0;width:40px;height:40px;background:transparent;border:none;cursor:default;z-index:99;}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
#modal.show{display:flex;}
#modal-inner{background:#222;border:2px solid #888;border-radius:8px;padding:20px;color:#fff;font-family:'Galmuri11',sans-serif;text-align:center;max-height:80vh;overflow-y:auto;max-width:90vw;}
#modal-inner button{margin:6px;padding:8px 18px;font-family:'Galmuri11',sans-serif;font-size:14px;cursor:pointer;background:#444;color:#fff;border:1px solid #888;border-radius:4px;}

#title-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;touch-action:auto;-webkit-user-select:auto;user-select:auto;}

#title-screen .title-sub{font-family:'Galmuri11',sans-serif;font-size:18px;color:#666;letter-spacing:4px;margin-bottom:36px;}

<script>

// ===== CONFIG =====
const CONFIG={
  tileW:48,tileH:48,cols:14,rows:12,
  moveDur:400,maxItems:8,
  gameName:'304호',
  startX:7,startY:6,
};
const TW=CONFIG.tileW,TH=CONFIG.tileH,COLS=CONFIG.cols,ROWS=CONFIG.rows;
const CW=COLS*TW,CH=ROWS*TH;
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');

// ===== PASSWORD (랜덤 4자리) =====
function genPassword(){
  let pw='';for(let i=0;i<4;i++)pw+=Math.floor(Math.random()*10);return pw;
}
let doorPassword=genPassword();

// 2회차 / 사망 횟수 감지
function isSecondPlay(){return localStorage.getItem('304ho_cleared')==='true';}
function getDeathCount(){return parseInt(localStorage.getItem('304ho_deaths')||'0');}

// ===== GAME STATE =====
let gameStarted=false,gameOver=false,escaping=false;
let timerTotal=600,timerRemain=600,timerPaused=true,lastTimerTick=0;

const ITEM_TOOLTIPS={
  handle:'"어딘가에 끼울 수 있을 것 같은데..."',
  fork:'"딱딱한 걸 파는 데 쓸 수 있을 것 같다."',
  old_key:'"어딘가의 잠금을 열 수 있을 것 같다."',

  ruler:'"좁은 틈에 있는 걸 꺼낼 수 있을지도..."',
  battery:'"뭔가에 넣으면 작동할 것 같은데..."',
  remote:'"배터리가 있으면 작동할 것 같은데..."',
  remote_full:'"TV를 켤 수 있을 것 같다."',
  uv_light:'"보이지 않는 것을 볼 수 있을지도..."',
};

function defaultGS(){
  return {
    bedCheckCount:0,deskDrawerOpen:false,wardrobeCount:0,
    mirrorCount:0,plantDug:false,tvOn:false,tvInteractCount:0,tvDigit:null,tvBlinks:0,tvBroken:false,

    deaths:parseInt(localStorage.getItem('304ho_deaths')||'0'),
    helpUnlocked:['기본'],
    // 4자리 비밀번호 각 자리
    pw:doorPassword.split('').map(Number),
    pwFound:[false,false,false,false],
  };
}
let GS=defaultGS();

// ===== ATMOSPHERE =====
let atmosphere=0;
const ATMOS=[
  {floor:'#f5e6c8',wall:'#8b7355'},
  {floor:'#999',wall:'#555'},
  {floor:'#a66',wall:'#633'},
  {floor:'#800',wall:'#400'}
];

// ===== MAP =====
const MAP=Array.from({length:ROWS},()=>Array(COLS).fill(0));
const COLLISION=Array.from({length:ROWS},()=>Array(COLS).fill(0));
for(let x=0;x<COLS;x++){MAP[0][x]=1;MAP[ROWS-1][x]=1;COLLISION[0][x]=1;COLLISION[ROWS-1][x]=1;}
for(let y=0;y<ROWS;y++){MAP[y][0]=1;MAP[y][COLS-1]=1;COLLISION[y][0]=1;COLLISION[y][COLS-1]=1;}
function placeObj(id,cs,p){cs.forEach(([y,x])=>{MAP[y][x]=id;if(!p)COLLISION[y][x]=1;});}

// 원룸 레이아웃
placeObj(2,[[8,1],[8,2]]);          // 침대 (좌하)
placeObj(3,[[2,11],[2,12]]);        // 책상 (우상)
placeObj(4,[[3,12]]);               // 의자

placeObj(17,[[11,6],[11,7]]);       // 메인 문
placeObj(18,[[0,2]]);               // 환풍구
placeObj(19,[[5,5],[5,6],[5,7],[5,8],[6,5],[6,6],[6,7],[6,8]],true); // 러그
placeObj(20,[[9,12]]);              // 화분
placeObj(21,[[4,7]]);               // TV (중앙)
placeObj(22,[[3,1]]);               // 냉장고 (좌벽)

placeObj(24,[[0,10]]);              // 창문

  19:{name:'러그'},20:{name:'화분'},21:{name:'TV'},22:{name:'냉장고'},23:{name:'싱크대'},24:{name:'창문'},
};

// ===== PLAYER =====
const player={x:CONFIG.startX,y:CONFIG.startY,dir:'down',moving:false,fromX:CONFIG.startX,fromY:CONFIG.startY,toX:CONFIG.startX,toY:CONFIG.startY,moveT:0,moveDur:CONFIG.moveDur};
const DIR_DX={left:-1,right:1,up:0,down:0};
const DIR_DY={left:0,right:0,up:-1,down:1};

// ===== SPRITES =====
let spriteLoaded=false;const spriteFrames={};let spritesLoadedCount=0;
function loadSpriteDir(dir,uri){
  const img=new Image();
  img.onload=function(){
    const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
    const cx=c.getContext('2d');cx.drawImage(img,0,0);
    try{const id=cx.getImageData(0,0,c.width,c.height);const d=id.data;
    for(let i=0;i<d.length;i+=4){if(d[i]>=240&&d[i+1]>=240&&d[i+2]>=240)d[i+3]=0;}
    cx.putImageData(id,0,0);}catch(e){}
    spriteFrames[dir]=c;spritesLoadedCount++;
    if(spritesLoadedCount>=4)spriteLoaded=true;
  };img.src=uri;

// ===== drawPlayer =====
function drawPlayer(c,x,y,dir,wf){
  if(spriteLoaded&&spriteFrames[dir]){
    const fc=spriteFrames[dir];let by=wf===1?-2:0;
    c.drawImage(fc,0,0,fc.width,fc.height,x+2,y+2+by,TW-4,TH-4);return;
  }
  // fallback
  const cx2=x+TW/2,hr=10,hcy=y+14;
  c.fillStyle='#333';c.beginPath();c.arc(cx2,hcy,hr+1,Math.PI,0);c.fill();
  c.fillStyle='#ffd5a0';c.beginPath();c.arc(cx2,hcy,hr,0,Math.PI*2);c.fill();
  c.fillStyle='#333';c.fillRect(cx2-hr+1,hcy-hr,hr*2-2,5);
  c.fillStyle='#222';
  if(dir==='down'){c.beginPath();c.arc(cx2-4,hcy+2,1.8,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx2+4,hcy+2,1.8,0,Math.PI*2);c.fill();}
  else if(dir==='left'){c.beginPath();c.arc(cx2-4,hcy+2,1.8,0,Math.PI*2);c.fill();}
  else if(dir==='right'){c.beginPath();c.arc(cx2+4,hcy+2,1.8,0,Math.PI*2);c.fill();}
  c.fillStyle='#4488cc';c.fillRect(cx2-7,hcy+hr,14,10);
  c.fillStyle='#335577';const lt=hcy+hr+10;
  if(wf===0){c.fillRect(cx2-6,lt,5,6);c.fillRect(cx2+1,lt,5,6);}
  else{c.fillRect(cx2-8,lt,5,6);c.fillRect(cx2+3,lt,5,6);}
  c.fillStyle='#222';const st=lt+6;
  if(wf===0){c.fillRect(cx2-6,st,5,3);c.fillRect(cx2+1,st,5,3);}
  else{c.fillRect(cx2-8,st,5,3);c.fillRect(cx2+3,st,5,3);}
}

// ===== SOUND =====
let audioCtx=null;
function ac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playItemSound(){const a=ac(),n=a.currentTime;[523,659,784].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,n+i*0.08);g.gain.exponentialRampToValueAtTime(0.01,n+i*0.08+0.12);o.connect(g);g.connect(a.destination);o.start(n+i*0.08);o.stop(n+i*0.08+0.12);});}
function playBuzzer(){const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=200;g.gain.setValueAtTime(0.2,a.currentTime);g.gain.exponentialRampToValueAtTime(0.01,a.currentTime+0.3);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.3);}
function playDoorOpen(){const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(80,a.currentTime);o.frequency.linearRampToValueAtTime(40,a.currentTime+0.8);g.gain.setValueAtTime(0.15,a.currentTime);g.gain.exponentialRampToValueAtTime(0.01,a.currentTime+0.8);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.8);}
let scareAudio=null;
function initScareAudio(){
  if(!scareAudio){
    scareAudio=new Audio('./hidden.mp3');
    scareAudio.volume=0;
    scareAudio.play().then(()=>{scareAudio.pause();scareAudio.currentTime=0;scareAudio.volume=1.0;}).catch(()=>{});
  }
}
function playScareFallback(){
  const a=ac();const now=a.currentTime;
  // 불쾌한 고주파 노이즈
  for(let i=0;i<3;i++){
    const o=a.createOscillator(),g=a.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(800+Math.random()*1200,now);
    o.frequency.linearRampToValueAtTime(2000-Math.random()*1000,now+0.2);
    o.frequency.linearRampToValueAtTime(600+Math.random()*800,now+0.5);
    g.gain.setValueAtTime(0.3,now);
    g.gain.exponentialRampToValueAtTime(0.01,now+0.5);
    o.connect(g);g.connect(a.destination);
    o.start(now+i*0.05);o.stop(now+0.5);
  }
}
function playScareSound(){
  if(scareAudio){
    scareAudio.currentTime=0;scareAudio.volume=1.0;
    scareAudio.play().catch(()=>{playScareFallback();});
  } else {
    try{
      scareAudio=new Audio('./hidden.mp3');scareAudio.volume=1.0;
      scareAudio.play().catch(()=>{playScareFallback();});
    }catch(e){playScareFallback();}
  }
}

// ===== INPUT =====
const keys={};let inputQueue=[];
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space',' '].includes(e.key)){
    e.preventDefault();const k=e.key.replace('Arrow','').toLowerCase();const m=k===' '?'space':k;
    if(!keys[m]){keys[m]=true;inputQueue.push(m);}
  }
  if(!gameStarted&&(e.key===' '||e.key==='Space')){e.preventDefault();startGame();}
  if(e.key==='Escape'){document.getElementById('modal').classList.remove('show');}
});
document.addEventListener('keyup',e=>{const k=e.key.replace('Arrow','').toLowerCase();keys[k===' '?'space':k]=false;});
document.getElementById('title-screen').addEventListener('click',()=>{if(!gameStarted)startGame();});
document.getElementById('title-screen').addEventListener('touchstart',()=>{if(!gameStarted)startGame();},{passive:true});
document.getElementById('title-screen').addEventListener('touchend',()=>{if(!gameStarted)startGame();},{passive:true});
document.querySelectorAll('.dpad-btn').forEach(b=>{
  const d=b.dataset.dir;
  const dn=e=>{e.preventDefault();if(!keys[d]){keys[d]=true;inputQueue.push(d);}};
  const up=e=>{e.preventDefault();keys[d]=false;};
  b.addEventListener('touchstart',dn,{passive:false});b.addEventListener('touchend',up,{passive:false});
  b.addEventListener('mousedown',dn);b.addEventListener('mouseup',up);
});
const btnA=document.getElementById('btnA');
btnA.addEventListener('touchstart',e=>{e.preventDefault();keys.space=true;inputQueue.push('space');},{passive:false});
btnA.addEventListener('touchend',e=>{e.preventDefault();keys.space=false;},{passive:false});
btnA.addEventListener('mousedown',()=>{keys.space=true;inputQueue.push('space');});
btnA.addEventListener('mouseup',()=>{keys.space=false;});

// ===== DIALOG =====
const dialogBox=document.getElementById('dialogBox'),dialogTextEl=document.getElementById('dialogText');
let dialogActive=false,dialogQueue=[],typing=false,typeFull='',typeIndex=0,typeTimer=null,dialogCb=null;
function showDialog(t,cb){if(Array.isArray(t))dialogQueue=[...t];else dialogQueue=[t];dialogCb=cb||null;nextDialog();}
function nextDialog(){if(!dialogQueue.length){closeDialog();return;}dialogActive=true;dialogBox.style.display='block';typeFull=dialogQueue.shift();typeIndex=0;dialogTextEl.textContent='';typing=true;clearInterval(typeTimer);typeTimer=setInterval(()=>{if(typeIndex<typeFull.length)dialogTextEl.textContent+=typeFull[typeIndex++];else{typing=false;clearInterval(typeTimer);}},40);}
function advanceDialog(){if(typing){clearInterval(typeTimer);typing=false;dialogTextEl.textContent=typeFull;}else{if(dialogQueue.length)nextDialog();else closeDialog();}}
function closeDialog(){dialogActive=false;dialogBox.style.display='none';clearInterval(typeTimer);if(dialogCb){const cb=dialogCb;dialogCb=null;cb();}}
dialogBox.addEventListener('click',advanceDialog);

// ===== INVENTORY =====
const inventory=Array(CONFIG.maxItems).fill(null);
let selectedSlots=[];
const invContainer=document.getElementById('inventory');
const tooltip=document.getElementById('tooltip');

function buildInvUI(){
  invContainer.innerHTML='';
  for(let i=0;i<CONFIG.maxItems;i++){
    const s=document.createElement('div');
    s.className='inv-slot'+(inventory[i]?' has-item':'')+(selectedSlots.includes(i)?' selected':'');
    s.textContent=inventory[i]?inventory[i].name:'';
    s.addEventListener('click',()=>onSlotClick(i));
    if(inventory[i]){
      s.addEventListener('mouseenter',e=>{
        const tt=ITEM_TOOLTIPS[inventory[i].id];
        if(tt){tooltip.textContent=tt;tooltip.style.display='block';}
      });
      s.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
    }
    invContainer.appendChild(s);
  }
}

function onSlotClick(i){
  if(!inventory[i])return;
  const item=inventory[i];
  // 쪽지: 앞면 내용 표시
  if(item.id==='note'){
    if(GS.noteUVChecked){
      const msgs=['"시간은 거짓말을 하지 않는다. 멈춘 순간이 답이다."','(뒷면) "화면이 처음 보여주는 것을 기억해라."'];
      if(isSecondPlay()) msgs.push('...그리고 작은 글씨로: "넌 여기서 벗어날 수 없다."');
      showDialog(msgs);
    }
    else showDialog('"시간은 거짓말을 하지 않는다. 멈춘 순간이 답이다."');
    return;
  }
  const idx=selectedSlots.indexOf(i);
  if(idx!==-1){selectedSlots.splice(idx,1);}
  else{selectedSlots.push(i);if(selectedSlots.length===2){tryCombo(selectedSlots[0],selectedSlots[1]);selectedSlots=[];}}
  buildInvUI();
}

function tryCombo(a,b){
  const ia=inventory[a],ib=inventory[b];if(!ia||!ib)return;
  const ids=new Set([ia.id,ib.id]);
  if(ids.has('battery')&&ids.has('remote')){
    inventory[a]=null;inventory[b]=null;
    GS.remoteBattery=true;
    addItem({id:'remote_full',name:'리모콘(작동)'});
    showDialog('배터리를 리모콘에 넣었다! 리모콘(작동)을 획득했다!');
  }else showDialog('조합할 수 없다.');
  buildInvUI();
}

function addItem(item){
  const i=inventory.indexOf(null);
  if(i===-1){showDialog('인벤토리가 가득 찼다.');return false;}
  inventory[i]=item;playItemSound();buildInvUI();
  trackEvent('game_item_get',{item_name:item.name});
  if(!GS.helpUnlocked.includes('아이템')){GS.helpUnlocked.push('아이템');}
  return true;
}
function removeItem(id){for(let i=0;i<inventory.length;i++){if(inventory[i]&&inventory[i].id===id){inventory[i]=null;break;}}buildInvUI();}
function hasItem(id){return inventory.some(it=>it&&it.id===id);}
function getSelItem(){return selectedSlots.length===1?inventory[selectedSlots[0]]:null;}
buildInvUI();

// ===== INTERACT =====
function interact(){
  if(gameOver||escaping)return;
  const dx=DIR_DX[player.dir],dy=DIR_DY[player.dir];
  const tx=player.x+dx,ty=player.y+dy;
  if(tx<0||tx>=COLS||ty<0||ty>=ROWS)return;
  const objId=MAP[ty][tx];
  if(objId<2||!OBJECTS[objId])return;
  trackEvent('game_object_interact',{object_name:OBJECTS[objId].name});

  const sel=getSelItem();
  if(sel){selectedSlots=[];buildInvUI();handleUse(objId,sel);return;}

  switch(objId){
    case 2: // 침대
      GS.bedCheckCount++;
      if(GS.bedCheckCount===1)showDialog(isSecondPlay()?'...이 침대. 누워본 적 있는 것 같은데.':'평범한 침대다. 꽤 오래된 것 같다.');
      else if(GS.bedCheckCount>=2&&!GS.batteryFound)showDialog('뭔가 있는 것 같은데... 손이 안 닿는다.');
      else showDialog('평범한 침대다.');
      break;
    case 3: // 책상
      if(!GS.rulerTaken){GS.rulerTaken=true;addItem({id:'ruler',name:'자'});showDialog(isSecondPlay()?['이 책상... 서랍 안에 뭐가 있는지 아는 것 같다.','...일단 위를 살펴봤다.','자가 놓여있다.','자를 획득했다!']:['책상 위를 살펴봤다.','자가 놓여있다.','자를 획득했다!']);
      }else if(!GS.deskDrawerOpen)showDialog('책상 서랍이 잠겨있다. 무언가로 열어야 할 것 같다.');
      else showDialog('서랍은 이미 열려있다. 비어있다.');
      break;
    case 4:showDialog('평범한 의자다.');break;
    case 5: // 옷장
      GS.wardrobeCount++;
      if(GS.wardrobeCount===1){
        if(!GS.handleTaken){GS.handleTaken=true;addItem({id:'handle',name:'손잡이'});showDialog(isSecondPlay()?['...또 이 옷장이야.','열어봤다. 낡은 옷들이 빽빽하다.','옷장 하단에 손잡이가 하나 떨어져 있다.','손잡이를 획득했다!']:['옷장을 열어봤다. 낡은 옷들이 빽빽하다.','옷장 하단에 손잡이가 하나 떨어져 있다.','손잡이를 획득했다!']);}
        else showDialog('옷장을 열어봤다. 옷 사이에 뭔가 있는 것 같은데...');
      }else if(GS.wardrobeCount===2&&!hasItem('remote')&&!hasItem('remote_full')){
        addItem({id:'remote',name:'리모콘'});showDialog(['옷 사이를 뒤져보니...','리모콘을 발견했다!','리모콘을 획득했다!']);
      }else showDialog('옷장 안에는 낡은 옷들뿐이다.');
      break;
    case 6:case 7:showDialog('평범한 서랍장이다.');break;
    case 8: // 빨간 서랍장
      if(getSelItem()&&getSelItem().id==='old_key'){
        GS.redDrawerAttempt++;
        if(GS.redDrawerAttempt>=2){triggerTrap('빨간 서랍장');return;}
        showDialog('열쇠를 넣어봤지만... 이 열쇠는 맞지 않는다. 뭔가 꺼림칙한 느낌이 든다.');
      }else showDialog('이 서랍만 유독 붉은색이다... 열리지 않는다.');
      break;
    case 9: // 책장
      if(GS.bookDigitRevealed){
        const quips=['신호... 명작이었지.','우주탐정 루나도 미쳤어...','이 책들 누가 갖다 놓은 거야...','다 좋은 책이네.'];
        showDialog(quips[Math.floor(Math.random()*quips.length)]);
      }else if(!GS.dictChecked){
        GS.bookshelfCount++;
        if(GS.bookshelfCount===1)showDialog(isSecondPlay()?['이 책들... 전에도 읽었어. 분명히.','「신호」, 「우주탐정 루나」라는 책이 보인다.','...그리고 낡은 일한사전이 한 권 있다.']:['여러 권의 책이 꽂혀있다.','「신호」, 「우주탐정 루나」라는 책이 보인다.','...그리고 낡은 일한사전이 한 권 있다.']);
        else{
          GS.dictChecked=true;
          showDialog(['일한사전을 펼쳐봤다. 누군가 밑줄을 그어놨다.','頁(ページ) → 페이지, 쪽','始まり(はじまり) → 시작, 처음','...처음 쪽에 뭔가 의미가 있는 걸까?']);
        }
      }else if(GS.dictChecked&&GS.pwFound[1]){
        showDialog(['아까는 안 보였는데... 책 한 권이 살짝 튀어나와 있다.','어디를 펼쳐볼까?'],()=>{showPageChoice();});
      }else{
        showDialog('다시 와봐야겠다. 뭔가 빠진 게 있는 것 같은데...');
      }
      break;
    case 10: // 금고 (함정)
      if(isSecondPlay()&&!GS._safeFirstChecked){GS._safeFirstChecked=true;showDialog('이 금고는 열리지 않아. ...알고 있었어.',()=>showSafeModal());}
      else showSafeModal();break;
    case 11: // 벽시계
      GS.pwFound[0]=true;
      showDialog(isSecondPlay()?'이 시계... 항상 같은 시간을 가리키고 있어.':'시계가 멈춰있다. 바늘이 어딘가를 가리키고 있다.');
      break;
    case 12:showDialog(['풍경화가 그려진 액자다.','뒤를 확인해보니... 숫자 "'+GS.fakeFrameCode+'"이 적혀있다.']);break;
    case 13:showDialog('정물화가 그려진 액자다.');break;
    case 14:showDialog('추상화가 그려진 액자다.');break;
    case 15: // 거울
      GS.mirrorCount++;
      if(GS.mirrorCount===1)showDialog(getDeathCount()>=10?'그만 봐.':isSecondPlay()?['...또 너야?','...거울 속의 나... 웃고 있었나?']:'거울에 비친 내 모습이 보인다. 피곤해 보인다.');
      else if(GS.mirrorCount===2)showDialog('거울을 다시 들여다봤다... 내 표정이 이상하다.');
      else showDialog('거울 속 내 얼굴이... 웃고 있다?',()=>triggerTrap('거울'));
      break;
    case 16:showDialog('화장실 문이 잠겨있다.');break;
    case 17:
      if(GS.doorUnlocked)showDialog('문이 이미 열려있다.');
      else if(isSecondPlay()&&!GS._doorFirstChecked){GS._doorFirstChecked=true;showDialog('이 문... 비밀번호를 아는 것 같은데... 기억이 안 나.',()=>showPasswordModal());}
      else showPasswordModal();
      break;
    case 18:showDialog(isSecondPlay()?'...이 냄새. 기억나.':'나사가 단단히 조여져 있다.');break;
    case 19:showDialog('낡은 러그다. 바닥이 삐걱거린다.');break;
    case 20: // 화분
      if(!GS.plantDug)showDialog('흙이 단단하다. 맨손으로는 힘들 것 같은데...');
      else showDialog('이미 파본 화분이다.');
      break;
    case 21: // TV
      if(GS.tvBroken){
        GS.tvInteractCount++;
        if(GS.tvInteractCount===1)showDialog('고장난 TV다. 화면이 깨져있다...');
        else showDialog('억지로 TV를 조작하려는 순간—',()=>triggerTrap('TV'));
      }else if(!GS.tvOn)showDialog(isSecondPlay()?'이 TV... 숫자가 나올 거야. ...왜 알고 있지?':'TV가 꺼져있다. 리모콘이 필요할 것 같다.');
      else showDialog('화면에 뭔가 깜박이고 있다...');
      break;
    case 22:showDialog(isSecondPlay()?['...냉장고를 열어본 적이 있다. 분명히.','자석 메모가 붙어있다: "비밀번호는 '+GS.fakeFridgeCode+'"','...이건 거짓이다. ...왜 알지?']:['냉장고를 열어봤다.','자석 메모가 붙어있다: "비밀번호는 '+GS.fakeFridgeCode+'"','...믿어도 되는 걸까?']);break;
    case 23: // 싱크대
      if(!GS.sinkDrawerOpen)showDialog('싱크대 서랍이 있다. 손잡이가 빠져있어서 열 수 없다.');
      else showDialog('빈 서랍이다.');
      break;
    case 24: // 창문
      GS.windowCount++;
      if(GS.windowCount===1)showDialog(isSecondPlay()?'밖을 보면 안 된다. ...왜 그걸 알지?':'밖을 내다봤다. 하늘이... 빨갛다. 풍경이 이상하다.');
      else showDialog('창문을 열어볼까...',()=>showDialog('창문을 열려는 순간—',()=>triggerTrap('창문')));
      break;
  }
}

// ===== USE ITEM =====
function handleUse(objId,item){
  // 손잡이 + 싱크대 → 서랍 열림 → 포크
  if(objId===23&&item.id==='handle'&&!GS.sinkDrawerOpen){
    GS.sinkDrawerOpen=true;removeItem('handle');
    addItem({id:'fork',name:'포크'});showDialog(['손잡이를 끼워 서랍을 열었다!','안에 포크가 들어있다.','포크를 획득했다!']);
  }
  // 포크 + 화분 → 열쇠
  else if(objId===20&&item.id==='fork'&&!GS.plantDug){
    GS.plantDug=true;removeItem('fork');
    addItem({id:'old_key',name:'낡은 열쇠'});showDialog(['포크로 흙을 파봤다.','흙 속에서 낡은 열쇠를 발견했다!','낡은 열쇠를 획득했다!']);
  }
  // 열쇠 + 책상 서랍 → 쪽지
  else if(objId===3&&item.id==='old_key'&&!GS.deskDrawerOpen){
    GS.deskDrawerOpen=true;removeItem('old_key');
    addItem({id:'note',name:'쪽지'});showDialog(['열쇠로 서랍을 열었다!','안에 쪽지가 들어있다.','쪽지를 획득했다!']);
  }
  // 자 + 침대 → 배터리
  else if(objId===2&&item.id==='ruler'&&!GS.batteryFound){
    GS.batteryFound=true;removeItem('ruler');
    addItem({id:'battery',name:'배터리'});showDialog(['자로 침대 밑을 훑었다.','배터리를 끌어냈다!','배터리를 획득했다!']);
  }
  // 리모콘(작동) + TV → TV 켜기
  else if(objId===21&&item.id==='remote_full'&&GS.tvBroken){
    showDialog('지직거리기만 한다... 고장난 것 같다.');
  }
  else if(objId===21&&item.id==='remote_full'&&!GS.tvOn&&!GS.tvBroken){
    GS.tvOn=true;GS.tvDigit=GS.pw[1];GS.pwFound[1]=true;GS.tvBlinks=0;
    showDialog('리모콘으로 TV를 켰다. 화면에 뭔가 나타난다...');
    // 깜박임 시작: 2초 표시, 2초 숨김 x3
    let blinkCount=0;
    const blinkInterval=setInterval(()=>{
      blinkCount++;
      if(blinkCount%2===1){GS.tvDigit=GS.pw[1];}// 표시
      else{GS.tvDigit=null;}// 숨김
      if(blinkCount>=6){// 3번 표시+숨김 완료
        clearInterval(blinkInterval);
        GS.tvDigit=null;GS.tvBroken=true;GS.tvOn=false;
        showDialog('지직... TV가 꺼져버렸다.');
      }
    },2000);
  }
  // UV + 쪽지 → 뒷면 확인
  else if(item.id==='uv_light'&&hasItem('note')&&!GS.noteUVChecked){
    // 인벤토리에서 UV 선택 + 아무 곳에서 사용 시 쪽지 뒷면 체크
    GS.noteUVChecked=true;
    showDialog(['UV 라이트로 쪽지를 비추자...','뒷면에 글씨가 떠오른다: "화면이 처음 보여주는 것을 기억해라."']);
  }
  // UV + 거울 → 4번째 숫자
  else if(objId===15&&item.id==='uv_light'&&!GS.mirrorUVChecked){
    GS.mirrorCount++;// UV 사용도 카운트
    if(GS.mirrorCount>=3){triggerTrap('거울');return;}
    GS.mirrorUVChecked=true;GS.pwFound[3]=true;
    if(GS.mirrorCount===2){
      showDialog('숫자가 서서히 나타나고 있다... 하지만 거울 속 내 모습이 이상하다.');
      setTimeout(()=>{showDialog('숫자 "'+GS.pw[3]+'"이 보인다!');},2000);
    }else{
      showDialog('UV 라이트로 거울을 비추자... 숫자가 서서히 나타나고 있다.');
      setTimeout(()=>{showDialog('숫자 "'+GS.pw[3]+'"이 나타난다!');},2000);
    }
  }
  // UV + 벽 (어떤 벽 오브젝트든) → 입력 순서 힌트
  else if(item.id==='uv_light'&&!GS.wallUVChecked&&(objId===18||objId===12||objId===14)){
    GS.wallUVChecked=true;
    showDialog(['UV 라이트로 벽을 비추자 기호가 나타난다...','⏰ → 📺 → 📖 → 🪞']);
  }
  else showDialog('여기에는 사용할 수 없다.');
}

    inner.innerHTML='<div style="margin-bottom:16px;font-size:16px;">금고 비밀번호</div><div style="margin-bottom:16px;">'+dots+'</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:180px;margin:0 auto 12px;">'+

function playGasSound(){
  const a=ac();const dur=4;
  const buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*0.5;
  const src=a.createBufferSource();src.buffer=buf;
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2000;
  const gain=a.createGain();gain.gain.setValueAtTime(0,a.currentTime);
  gain.gain.linearRampToValueAtTime(0.6,a.currentTime+1.5);
  gain.gain.linearRampToValueAtTime(0.3,a.currentTime+dur);
  src.connect(lp);lp.connect(gain);gain.connect(a.destination);
  src.start();src.stop(a.currentTime+dur);
}

function triggerGasDeath(){
  if(gameOver)return;gameOver=true;timerPaused=true;
  playGasSound();
  trackEvent('game_trap_death',{trap_name:'가스'});
  GS.deaths++;localStorage.setItem('304ho_deaths',String(GS.deaths));

  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;pointer-events:none;';
  document.body.appendChild(ov);

  let phase=0,elapsed=0;
  const gasAnim=setInterval(()=>{
    elapsed+=33;
    if(phase===0){
      // 녹색 안개 짙어짐
      const opacity=Math.min(elapsed/2000,0.7);
      ov.style.background='rgba(30,120,30,'+opacity+')';
      if(elapsed>=1500&&phase===0){
        phase=1;
        showDialog('환풍구에서 이상한 가스가 나오고 있다...');
      }
    }
    if(phase===1&&elapsed>=3000){
      phase=2;
      showDialog('의식이 흐려진다...');
    }
    if(elapsed>=5000){
      clearInterval(gasAnim);
      ov.style.pointerEvents='auto';
      ov.style.background='#000';
      ov.style.display='flex';ov.style.flexDirection='column';
      ov.style.alignItems='center';ov.style.justifyContent='center';
      ov.innerHTML='<div style="color:#4a4;font-family:Galmuri11;font-size:36px;margin-bottom:30px;">질식</div>'+
        '<div style="color:#888;font-family:Galmuri11;font-size:14px;margin-bottom:20px;">사망 횟수: '+GS.deaths+'</div>'+
        '<button onclick="this.parentElement.remove();resetGame();" style="padding:12px 30px;font-family:Galmuri11;font-size:16px;cursor:pointer;background:#333;color:#fff;border:1px solid #666;border-radius:4px;">다시 시작</button>';
    }
  },33);
}

function triggerTrap(name){
  if(gameOver)return;gameOver=true;playScareSound();
  trackEvent('game_trap_death',{trap_name:name});
  GS.deaths++;localStorage.setItem('304ho_deaths',String(GS.deaths));

  // 오버레이 캔버스 생성
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:#000;';
  const sc=document.createElement('canvas');
  sc.width=window.innerWidth;sc.height=window.innerHeight;
  sc.style.cssText='width:100%;height:100%;';
  ov.appendChild(sc);
  document.body.appendChild(ov);
  const sctx=sc.getContext('2d');
  const W=sc.width,H=sc.height;

  let frame=0;
  const scareAnim=setInterval(()=>{
    frame++;
    sctx.fillStyle='#000';sctx.fillRect(0,0,W,H);

    // 빨간 플래시 (공통)
    if(frame%6<2){sctx.fillStyle='rgba(200,0,0,0.3)';sctx.fillRect(0,0,W,H);}

    if(name==='거울') drawScareGhost(sctx,W,H,frame);
    else if(name==='창문') drawScareHand(sctx,W,H,frame);
    else if(name==='TV') drawScareTV(sctx,W,H,frame);

    if(frame>=45){// 1.5초 (30fps*1.5)
      clearInterval(scareAnim);
      sctx.fillStyle='#000';sctx.fillRect(0,0,W,H);
      ov.innerHTML='';
      ov.style.display='flex';ov.style.flexDirection='column';
      ov.style.alignItems='center';ov.style.justifyContent='center';
      ov.innerHTML='<div style="color:#c00;font-family:Galmuri11;font-size:36px;margin-bottom:30px;">사망</div>'+
        '<div style="color:#888;font-family:Galmuri11;font-size:14px;margin-bottom:20px;">사망 횟수: '+GS.deaths+'</div>'+
        '<button onclick="this.parentElement.remove();resetGame();" style="padding:12px 30px;font-family:Galmuri11;font-size:16px;cursor:pointer;background:#333;color:#fff;border:1px solid #666;border-radius:4px;">다시 시작</button>';
    }
  },33); // ~30fps
}

// 거울: 귀신 얼굴
function drawScareGhost(c,W,H,f){
  const cx=W/2+Math.sin(f*0.5)*8, cy=H/2+Math.cos(f*0.7)*6;
  const sz=Math.min(W,H)*0.35;
  // 창백한 얼굴
  c.fillStyle='#d8d0c8';
  c.beginPath();c.ellipse(cx,cy,sz*0.4,sz*0.55,0,0,Math.PI*2);c.fill();
  // 검은 눈구멍
  c.fillStyle='#000';
  c.beginPath();c.ellipse(cx-sz*0.15,cy-sz*0.1,sz*0.1,sz*0.14,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(cx+sz*0.15,cy-sz*0.1,sz*0.1,sz*0.14,0,0,Math.PI*2);c.fill();
  // 눈 안 빨간 점
  c.fillStyle='#a00';
  c.beginPath();c.arc(cx-sz*0.15,cy-sz*0.08,2,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(cx+sz*0.15,cy-sz*0.08,2,0,Math.PI*2);c.fill();
  // 찢어진 입
  c.strokeStyle='#800';c.lineWidth=3;
  c.beginPath();
  c.moveTo(cx-sz*0.2,cy+sz*0.2);
  c.quadraticCurveTo(cx-sz*0.05,cy+sz*0.3+Math.sin(f)*4,cx,cy+sz*0.2);
  c.quadraticCurveTo(cx+sz*0.05,cy+sz*0.3+Math.cos(f)*4,cx+sz*0.2,cy+sz*0.2);
  c.stroke();
  // 머리카락 (검은 선)
  c.strokeStyle='#111';c.lineWidth=4;
  for(let i=-3;i<=3;i++){
    c.beginPath();
    c.moveTo(cx+i*sz*0.1,cy-sz*0.5);
    c.lineTo(cx+i*sz*0.12+Math.sin(f*0.3+i)*5,cy-sz*0.2);
    c.stroke();
  }
}

// 창문: 올라오는 검은 손
function drawScareHand(c,W,H,f){
  const progress=Math.min(f/40,1);
  const handY=H*(1-progress*0.7);
  c.fillStyle='#111';
  // 손바닥
  c.beginPath();
  c.ellipse(W/2,handY+60,80,50,0,0,Math.PI*2);
  c.fill();
  // 손가락 5개 (길고 뾰족)
  const fingers=[
    {x:-60,len:140,w:14},{x:-30,len:170,w:13},{x:0,len:180,w:14},
    {x:30,len:165,w:13},{x:55,len:130,w:12}
  ];
  fingers.forEach(fg=>{
    c.beginPath();
    c.moveTo(W/2+fg.x-fg.w/2,handY+40);
    c.lineTo(W/2+fg.x,handY+40-fg.len+Math.sin(f*0.4+fg.x)*8);
    c.lineTo(W/2+fg.x+fg.w/2,handY+40);
    c.fill();
  });
  // 가장자리 빨간색
  const edgeAlpha=progress*0.6;
  const grad=c.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.min(W,H)*0.7);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(150,0,0,'+edgeAlpha+')');
  c.fillStyle=grad;c.fillRect(0,0,W,H);
}

// TV: 글리치 + 일그러진 얼굴
function drawScareTV(c,W,H,f){
  // 노이즈/글리치 배경
  if(f<15){
    for(let i=0;i<200;i++){
      c.fillStyle='rgb('+Math.random()*255+','+Math.random()*100+','+Math.random()*100+')';
      c.fillRect(Math.random()*W,Math.random()*H,Math.random()*40+2,2);
    }
    // 스캔라인
    for(let y=0;y<H;y+=4){
      c.fillStyle='rgba(0,0,0,0.3)';c.fillRect(0,y,W,2);
    }
  } else {
    // 일그러진 얼굴
    const cx=W/2+Math.sin(f*0.8)*12, cy=H/2+Math.cos(f*0.6)*8;
    const sz=Math.min(W,H)*0.3;
    const alpha=Math.min((f-15)/10,1);
    c.globalAlpha=alpha;
    // 얼굴
    c.fillStyle='#998877';
    c.beginPath();c.ellipse(cx,cy,sz*0.4,sz*0.5,0.1,0,Math.PI*2);c.fill();
    // 비대칭 눈: 왼쪽 정상, 오른쪽 아래로 쳐짐
    c.fillStyle='#000';
    c.beginPath();c.ellipse(cx-sz*0.14,cy-sz*0.08,sz*0.06,sz*0.08,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx+sz*0.16,cy+sz*0.02,sz*0.07,sz*0.12,-0.3,0,Math.PI*2);c.fill();
    // 크게 벌어진 입
    c.fillStyle='#200';
    c.beginPath();c.ellipse(cx+sz*0.02,cy+sz*0.25,sz*0.2,sz*0.15,0,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
    // 글리치 라인 계속
    for(let i=0;i<20;i++){
      c.fillStyle='rgba('+Math.random()*255+',0,0,0.3)';
      c.fillRect(0,Math.random()*H,W,1);
    }
  }
}

function showPasswordModal(){
  const modal=document.getElementById('modal'),inner=document.getElementById('modal-inner');
  let code='';
  function submit(){
    if(code===doorPassword){cleanup();modal.classList.remove('show');playDoorOpen();GS.doorUnlocked=true;trackEvent('game_password_attempt',{success:true});startEscape();}
    else{cleanup();playBuzzer();trackEvent('game_password_attempt',{success:false});showDialog('삐— 잘못된 번호다.');code='';modal.classList.remove('show');}
  }
  function closeModal(){cleanup();code='';modal.classList.remove('show');}
  function render(){
    const dots=code.padEnd(4,'_').split('').map(c=>'<span style="display:inline-block;width:24px;height:30px;border-bottom:2px solid #fff;text-align:center;font-size:20px;margin:0 4px;">'+c+'</span>').join('');
    inner.innerHTML='<div style="margin-bottom:16px;font-size:16px;">비밀번호 입력</div><div style="margin-bottom:16px;">'+dots+'</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:180px;margin:0 auto 12px;">'+
      [1,2,3,4,5,6,7,8,9,'C',0,'OK'].map(n=>'<button class="pw-b" data-v="'+n+'" style="padding:14px;font-family:Galmuri11;font-size:18px;cursor:pointer;background:#444;color:#fff;border:1px solid #666;border-radius:4px;min-width:50px;">'+n+'</button>').join('')+'</div>'+
      '<button class="pw-close" style="padding:6px 16px;font-family:Galmuri11;font-size:12px;cursor:pointer;background:#333;color:#888;border:1px solid #555;border-radius:4px;">닫기</button>';
    inner.querySelector('.pw-close').onclick=closeModal;
    inner.querySelectorAll('.pw-b').forEach(b=>{b.onclick=function(){
      const v=this.dataset.v;
      if(v==='C'){code='';render();}
      else if(v==='OK'){submit();}
      else if(code.length<4){code+=v;render();}
    };});
  }
  function onKey(e){
    if(!modal.classList.contains('show'))return;
    if(e.key>='0'&&e.key<='9'&&code.length<4){e.preventDefault();code+=e.key;render();}
    else if(e.key==='Backspace'){e.preventDefault();code=code.slice(0,-1);render();}
    else if(e.key==='Enter'){e.preventDefault();submit();}
    else if(e.key==='Escape'){e.preventDefault();closeModal();}
  }
  function cleanup(){document.removeEventListener('keydown',onKey);}
  document.addEventListener('keydown',onKey);
  render();modal.classList.add('show');
}

// ===== UPDATE =====
function update(dt){
  // 타이머 업데이트
  if(!timerPaused&&!gameOver&&!escaping){
    const modalOpen=document.getElementById('modal').classList.contains('show');
    if(!dialogActive&&!modalOpen){
      const now=Date.now();
      timerRemain-=(now-lastTimerTick)/1000;
      lastTimerTick=now;
      if(timerRemain<=0){timerRemain=0;triggerGasDeath();return;}
    }else{lastTimerTick=Date.now();}
  }
  if(gameOver){inputQueue=[];return;}
  if(dialogActive){const si=inputQueue.indexOf('space');if(si!==-1){inputQueue.splice(si,1);advanceDialog();}inputQueue=[];return;}
  if(escaping){inputQueue=[];return;}
  if(player.moving){player.moveT+=dt;if(player.moveT>=player.moveDur){player.x=player.toX;player.y=player.toY;player.moving=false;player.moveT=0;}return;}
  while(inputQueue.length){
    const k=inputQueue.shift();
    if(k==='space'){interact();return;}
    if(['up','down','left','right'].includes(k)){
      player.dir=k;const nx=player.x+DIR_DX[k],ny=player.y+DIR_DY[k];
      if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&!COLLISION[ny][nx]){player.moving=true;player.fromX=player.x;player.fromY=player.y;player.toX=nx;player.toY=ny;player.moveT=0;}return;
    }
  }
  for(const d of ['up','down','left','right']){
    if(keys[d]){player.dir=d;const nx=player.x+DIR_DX[d],ny=player.y+DIR_DY[d];
    if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&!COLLISION[ny][nx]){player.moving=true;player.fromX=player.x;player.fromY=player.y;player.toX=nx;player.toY=ny;player.moveT=0;}break;}
  }
}

// ===== 7-SEGMENT DIGITAL CLOCK =====
const SEG_MAP=[0x7E,0x30,0x6D,0x79,0x33,0x5B,0x5F,0x70,0x7F,0x7B];
// bits: a=6(top) b=5(TR) c=4(BR) d=3(bot) e=2(BL) f=1(TL) g=0(mid)

function draw7Seg(c,x,y,w,h,digit,onColor,offColor){
  const segs=SEG_MAP[digit];
  const t=Math.max(1,h*0.08); // segment thickness
  const p=1; // padding
  const hw=w-p*2,hh=h/2;
  // a: top
  c.fillStyle=(segs&0x40)?onColor:offColor;
  c.fillRect(x+p+t,y+p,hw-t*2,t);
  // d: bottom
  c.fillStyle=(segs&0x08)?onColor:offColor;
  c.fillRect(x+p+t,y+h-p-t,hw-t*2,t);
  // g: middle
  c.fillStyle=(segs&0x01)?onColor:offColor;
  c.fillRect(x+p+t,y+hh-t/2,hw-t*2,t);
  // f: top-left
  c.fillStyle=(segs&0x02)?onColor:offColor;
  c.fillRect(x+p,y+p+t,t,hh-t*1.5);
  // b: top-right
  c.fillStyle=(segs&0x20)?onColor:offColor;
  c.fillRect(x+w-p-t,y+p+t,t,hh-t*1.5);
  // e: bottom-left
  c.fillStyle=(segs&0x04)?onColor:offColor;
  c.fillRect(x+p,y+hh+t*0.5,t,hh-t*1.5);
  // c: bottom-right
  c.fillStyle=(segs&0x10)?onColor:offColor;
  c.fillRect(x+w-p-t,y+hh+t*0.5,t,hh-t*1.5);
}

function drawDigitalClock(c,x,y,w,h,mins,secs){
  // 프레임
  c.fillStyle='#222';c.fillRect(x,y,w,h);
  c.fillStyle='#111';c.fillRect(x+2,y+2,w-4,h-4);
  // 나사
  c.fillStyle='#444';
  const nr=1.5;
  c.beginPath();c.arc(x+4,y+4,nr,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+w-4,y+4,nr,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+4,y+h-4,nr,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+w-4,y+h-4,nr,0,Math.PI*2);c.fill();
  // LED 색상 결정
  let onColor,offColor,visible=true;
  if(timerRemain<=60){
    onColor='#ff3333';offColor='rgba(255,51,51,0.08)';
    visible=(Math.floor(Date.now()/250)%2===0);
  }else if(timerRemain<=120){
    onColor='#ff3333';offColor='rgba(255,51,51,0.08)';
    visible=(Math.floor(Date.now()/500)%2===0);
  }else if(timerRemain<=300){
    onColor='#ffcc00';offColor='rgba(255,204,0,0.08)';
  }else{
    onColor=isSecondPlay()?'#cc2222':'#ff3333';offColor=isSecondPlay()?'rgba(204,34,34,0.08)':'rgba(255,51,51,0.08)';
  }
  if(!visible){onColor=offColor;}
  // 숫자 영역
  const pad=8,digitH=h-16,digitW=(w-pad*2-10)/4,gap=2;
  const dx=x+pad,dy=y+6;
  const d0=Math.floor(mins/10),d1=mins%10,d2=Math.floor(secs/10),d3=secs%10;
  draw7Seg(c,dx,dy,digitW,digitH,d0,onColor,offColor);
  draw7Seg(c,dx+digitW+gap,dy,digitW,digitH,d1,onColor,offColor);
  // 콜론
  const cx2=dx+digitW*2+gap*2+2,cy2=dy+digitH*0.3,cy3=dy+digitH*0.7;
  c.fillStyle=onColor;
  c.fillRect(cx2,cy2,2,2);c.fillRect(cx2,cy3,2,2);
  draw7Seg(c,cx2+6,dy,digitW,digitH,d2,onColor,offColor);
  draw7Seg(c,cx2+6+digitW+gap,dy,digitW,digitH,d3,onColor,offColor);
  // TIMER 라벨
  c.fillStyle='rgba(255,255,255,0.3)';c.font='6px Galmuri11';c.textAlign='center';
  c.fillText('TIMER',x+w/2,y+h-2);c.textAlign='left';
}

// ===== RENDER =====
function render(){
  const a=ATMOS[atmosphere];ctx.fillStyle=a.floor;ctx.fillRect(0,0,CW,CH);
  if(atmosphere===3){if(Math.floor(Date.now()/100)%3===0){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,CW,CH);}}
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){const t=MAP[y][x],px=x*TW,py=y*TH;if(t===1){ctx.fillStyle=a.wall;ctx.fillRect(px,py,TW,TH);}else if(t>=2&&OBJECTS[t])drawObject(ctx,t,px,py,TW,TH);}
  if(!gameOver&&!escaping){
    let dx2,dy2;
    if(player.moving){const t=player.moveT/player.moveDur;dx2=(player.fromX+(player.toX-player.fromX)*t)*TW;dy2=(player.fromY+(player.toY-player.fromY)*t)*TH;}
    else{dx2=player.x*TW;dy2=player.y*TH;}
    drawPlayer(ctx,dx2,dy2,player.dir,player.moving?Math.floor(player.moveT/200)%2:0);
    // direction indicator
    ctx.fillStyle='rgba(255,255,100,0.4)';const cx3=dx2+TW/2,cy3=dy2+TH/2,ix=DIR_DX[player.dir],iy=DIR_DY[player.dir];
    if(!player.moving){ctx.beginPath();const tx2=cx3+ix*26,ty2=cy3+iy*26;
    if(ix!==0){ctx.moveTo(tx2,ty2);ctx.lineTo(tx2-ix*6,ty2-5);ctx.lineTo(tx2-ix*6,ty2+5);}
    else{ctx.moveTo(tx2,ty2);ctx.lineTo(tx2-5,ty2-iy*6);ctx.lineTo(tx2+5,ty2-iy*6);}ctx.fill();}
  }
  // 1분 이하 녹색 안개
  if(!timerPaused&&timerRemain<=60&&timerRemain>0){
    const intensity=(1-timerRemain/60)*0.3;
    const grd=ctx.createRadialGradient(CW/2,CH/2,Math.min(CW,CH)*0.3,CW/2,CH/2,Math.max(CW,CH)*0.7);
    grd.addColorStop(0,'rgba(0,0,0,0)');
    grd.addColorStop(1,'rgba(50,200,50,'+intensity+')');
    ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);
  }
  // 2회차 상시 비네팅
  if(isSecondPlay()){
    const vg=ctx.createRadialGradient(CW/2,CH/2,Math.min(CW,CH)*0.35,CW/2,CH/2,Math.max(CW,CH)*0.7);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,0.18)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);
  }
  // 7세그먼트 전자 시계
  if(gameStarted&&!gameOver){
    drawDigitalClock(ctx,11*TW+2,2,2*TW-4,TH-4,Math.floor(timerRemain/60),Math.floor(timerRemain%60));
  }
}

let lastFrameTime=0;
function loop(timestamp){
  const dt=lastFrameTime?Math.min(timestamp-lastFrameTime,50):16;
  lastFrameTime=timestamp;
  if(gameStarted){update(dt);render();}
  requestAnimationFrame(loop);
}

      {id:'note',name:'쪽지',loc:'책상 서랍 (열쇠 필요)',has:hasItem('note')},
      {id:'ruler',name:'자',loc:'책상 위',has:hasItem('ruler')},
      {id:'battery',name:'배터리',loc:'침대 밑 (자 필요)',has:hasItem('battery')},
      {id:'remote',name:'리모콘',loc:'옷장 2회 조사',has:hasItem('remote')||hasItem('remote_full')},
      {id:'uv_light',name:'UV 라이트',loc:'책장 3회 (TV+사전 확인→앞쪽 선택)',has:hasItem('uv_light')},
    ];
    let h='<div style="text-align:left;font-size:12px;line-height:1.8;padding:10px;">';
    h+='<b>관리자 패널</b><br><br>';
    h+='<b>비밀번호:</b> '+doorPassword+'<br>';
    h+='<b>숫자 획득:</b> '+GS.pwFound.map((f,i)=>f?GS.pw[i]:'?').join(' ')+'<br><br>';
    h+='<b>아이템 목록:</b><br>';
    items.forEach(it=>{h+=(it.has?'✅':'⬜')+' '+it.name+' — '+it.loc+'<br>';});
    h+='<br><b>공략 순서:</b><br>';
    h+='1. 옷장→손잡이 / 책상→자 / 옷장2회→리모콘<br>';
    h+='2. 손잡이+싱크대→포크 / 자+침대→배터리<br>';
    h+='3. 포크+화분→열쇠 / 배터리+리모콘→리모콘(작동)<br>';
    h+='4. 열쇠+책상서랍→쪽지<br>';
    h+='5. 리모콘→TV (숫자 3번 깜박임, 기억!)<br>';
    h+='6. 책장1회→제목 / 2회→일한사전(頁,始まり)<br>';
    h+='7. 책장3회(TV+사전 필요)→3지선다→앞쪽→숫자+UV<br>';
    h+='8. UV+쪽지→뒷면 / UV+거울→숫자(2초대기)<br>';
    h+='9. UV+벽→순서힌트(⏰📺📖🪞)<br>';
    h+='10. 시계→1번째 / TV→2번째 / 책→3번째 / 거울→4번째<br>';
    h+='<br><b>⚠️ 함정:</b> 금고(맥거핀), 액자뒤숫자(가짜), 냉장고메모(가짜)<br>';
    h+='빨간서랍장(열쇠2회=즉사), 거울(3회조사=즉사), TV고장후조작=즉사<br><br>';
    h+='</div>';
    h+='<button onclick="[\'handle\',\'fork\',\'old_key\',\'note\',\'ruler\',\'battery\',\'remote_full\',\'uv_light\'].forEach(id=>{if(!hasItem(id))addItem({id:id,name:{handle:\'손잡이\',fork:\'포크\',old_key:\'낡은 열쇠\',note:\'쪽지\',ruler:\'자\',battery:\'배터리\',remote_full:\'리모콘(작동)\',uv_light:\'UV 라이트\'}[id]});});document.getElementById(\'modal\').classList.remove(\'show\');">아이템 전부 획득</button>';
    h+='<button onclick="GS.doorUnlocked=true;document.getElementById(\'modal\').classList.remove(\'show\');startEscape();">비밀번호 자동입력</button>';
    h+='<div style="margin-top:10px;font-size:12px;color:#aaa;">남은 시간: '+Math.floor(timerRemain)+'초</div>';
    h+='<button onclick="timerRemain=600;lastTimerTick=Date.now();document.getElementById(\'modal\').classList.remove(\'show\');">시간 리셋</button>';
    h+='<button onclick="timerRemain=60;lastTimerTick=Date.now();document.getElementById(\'modal\').classList.remove(\'show\');">1분 남기기</button>';
    h+='<div style="margin-top:10px;font-size:12px;color:#aaa;">2회차: '+(isSecondPlay()?'ON':'OFF')+'</div>';
    h+='<button onclick="if(isSecondPlay()){localStorage.removeItem(\'304ho_cleared\');localStorage.removeItem(\'304ho_round\');}else{localStorage.setItem(\'304ho_cleared\',\'true\');localStorage.setItem(\'304ho_round\',\'2\');}document.getElementById(\'modal\').classList.remove(\'show\');location.reload();">2회차 토글</button>';
    inner.innerHTML=h;modal.classList.add('show');
  }
});

document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show');});
window.addEventListener('load',()=>{
  document.getElementById('title-screen').focus();
  const extra=document.getElementById('title-extra');
  if(isSecondPlay()){
    extra.textContent='...이상한 꿈을 꾼 것 같다.';
    const tm=document.querySelector('.title-main');
    tm.style.animation='titleShake 1.5s ease-in-out infinite';
  } else if(getDeathCount()>=10) extra.textContent='...그만 죽어.';
  else if(getDeathCount()>=5) extra.textContent='...또 죽을 거야?';
});

</script>
</body>
</html>
