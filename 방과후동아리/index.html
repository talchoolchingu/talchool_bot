<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>방과후 동아리</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#f5f0e8;--bg-secondary:#fff;--text-color:#333;--accent:#5a7d9a;
  --vignette-opacity:0;--noise-opacity:0;--red-overlay:0;--shake-intensity:0px;
  --filter-brightness:1;--filter-contrast:1;--filter-saturate:1;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif}
body{
  background:var(--bg-primary);color:var(--text-color);
  filter:brightness(var(--filter-brightness)) contrast(var(--filter-contrast)) saturate(var(--filter-saturate));
  transition:background 2s,color 2s,filter 2s;
}
/* Text selection prevention */
#game-container,#stage-content,#dialog-box,.puzzle-panel,.diary,.newspaper,.quiz-card,.ending-text{user-select:none;-webkit-user-select:none}
input,textarea{user-select:auto;-webkit-user-select:auto}

.shaking{animation:shake .15s infinite}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(calc(-1*var(--shake-intensity)),var(--shake-intensity))}
  30%{transform:translate(var(--shake-intensity),calc(-1*var(--shake-intensity)))}
  50%{transform:translate(calc(-1*var(--shake-intensity)),0)}
  70%{transform:translate(var(--shake-intensity),var(--shake-intensity))}
  90%{transform:translate(0,calc(-1*var(--shake-intensity)))}
}
@keyframes glitch{
  0%{clip-path:inset(40% 0 61% 0);transform:translate(-2px,2px)}
  20%{clip-path:inset(92% 0 1% 0);transform:translate(1px,-3px)}
  40%{clip-path:inset(10% 0 85% 0);transform:translate(-3px,0)}
  60%{clip-path:inset(60% 0 20% 0);transform:translate(2px,3px)}
  80%{clip-path:inset(5% 0 90% 0);transform:translate(-1px,-2px)}
  100%{clip-path:inset(50% 0 40% 0);transform:translate(3px,1px)}
}
@keyframes flicker{0%,93%,100%{opacity:1}94%{opacity:.1}96%{opacity:.7}98%{opacity:.05}}
@keyframes redPulse{0%,100%{background:rgba(80,0,0,0)}50%{background:rgba(80,0,0,.15)}}
@keyframes noiseMove{0%{transform:translate(0,0)}25%{transform:translate(-5%,-5%)}50%{transform:translate(5%,2%)}75%{transform:translate(-2%,5%)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes ghostFloat{0%,100%{transform:translateY(0) scale(1);opacity:.7}50%{transform:translateY(-20px) scale(1.05);opacity:.9}}
@keyframes hairSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

/* Overlays */
#vignette-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.9) 100%);opacity:var(--vignette-opacity);pointer-events:none;transition:opacity 3s;z-index:90}
#noise-overlay{position:fixed;inset:-50%;width:200%;height:200%;opacity:var(--noise-opacity);pointer-events:none;animation:noiseMove .2s steps(4) infinite;z-index:91;background-size:200px 200px}
#red-overlay{position:fixed;inset:0;background:rgba(120,0,0,1);opacity:var(--red-overlay);pointer-events:none;transition:opacity 2s;z-index:92}
#flash-overlay{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:200;transition:opacity .3s}
#scare-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;z-index:201;transition:opacity .1s}
#glitch-overlay{position:fixed;inset:0;pointer-events:none;z-index:93;opacity:0}
.glitch-active #glitch-overlay{opacity:1;animation:glitch .1s steps(2) infinite}

/* Game Container */
#game-container{width:100%;height:100dvh;max-width:900px;margin:0 auto;display:flex;flex-direction:column;position:relative;z-index:10}
#inventory-bar{display:flex;gap:8px;padding:8px 12px;background:rgba(0,0,0,.1);min-height:50px;align-items:center;flex-wrap:wrap;z-index:20;transition:background 2s}
.inv-item{padding:4px 10px;background:rgba(255,255,255,.8);border-radius:6px;font-size:clamp(11px,2.5vw,13px);cursor:pointer;transition:all .3s}
#inv-popup{display:none;position:fixed;inset:0;z-index:260;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
#inv-popup.show{display:flex}
#inv-popup-box{background:#fff;color:#222;border-radius:12px;padding:20px 24px;max-width:320px;width:85%;text-align:center;position:relative;box-shadow:0 8px 30px rgba(0,0,0,.2)}
#inv-popup-box h4{font-size:16px;margin-bottom:8px}
#inv-popup-box p{font-size:14px;color:#555;line-height:1.6}
#inv-popup-close{position:absolute;top:8px;right:10px;width:26px;height:26px;border:none;background:rgba(0,0,0,.08);border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#666}
#inv-popup-close:hover{background:rgba(0,0,0,.15)}
.inv-item.used{opacity:.4;text-decoration:line-through}
#stage-content{flex:1;overflow:hidden;padding:16px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}
#dialog-box{background:rgba(0,0,0,.85);color:#fff;padding:14px 18px;min-height:80px;position:fixed;bottom:0;left:0;right:0;max-width:900px;margin:0 auto;border-top:2px solid rgba(255,255,255,.2);display:none;z-index:30;cursor:pointer}
#dialog-speaker{font-weight:bold;font-size:clamp(13px,3vw,15px);margin-bottom:4px;color:#8cb4d8}
#dialog-text{font-size:clamp(13px,3vw,15px);line-height:1.6;white-space:pre-wrap}
#dialog-next{position:absolute;bottom:8px;right:14px;animation:blink 1s infinite;cursor:pointer;font-size:18px}

/* Title Screen */
#title-screen{position:fixed;inset:0;background:linear-gradient(135deg,#fff0f5,#fce4ec,#f3e5f5,#e8eaf6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;color:#5d4037;text-align:center;padding:20px;overflow:hidden}
#title-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,rgba(255,183,197,.3) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(206,147,216,.2) 0%,transparent 50%);pointer-events:none}
#title-screen h1{font-size:clamp(30px,9vw,60px);margin-bottom:8px;color:#ad1457;text-shadow:2px 2px 0 rgba(255,183,197,.6),-1px -1px 0 rgba(255,255,255,.8);letter-spacing:6px;position:relative;z-index:1}
#title-screen .subtitle{font-size:clamp(14px,3.5vw,18px);color:#8d6e63;margin-bottom:12px;position:relative;z-index:1}
#title-screen .deco{font-size:clamp(20px,5vw,32px);margin-bottom:30px;letter-spacing:8px;position:relative;z-index:1}
#title-screen .sparkles{position:absolute;inset:0;pointer-events:none;z-index:0}
#title-screen .sparkle{position:absolute;font-size:clamp(12px,3vw,20px);animation:sparkleFloat 3s ease-in-out infinite;opacity:.6}
@keyframes sparkleFloat{0%,100%{transform:translateY(0) scale(1);opacity:.4}50%{transform:translateY(-15px) scale(1.2);opacity:.8}}
#start-btn{padding:14px 50px;font-size:clamp(16px,4vw,20px);background:linear-gradient(135deg,#f48fb1,#ce93d8);color:#fff;border:none;border-radius:30px;cursor:pointer;transition:all .3s;letter-spacing:2px;box-shadow:0 4px 15px rgba(244,143,177,.4);position:relative;z-index:1}
#start-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(244,143,177,.6)}

/* Stage Content Styles */
.room-scene{width:100%;max-width:700px;aspect-ratio:16/10;background:var(--bg-secondary);border-radius:12px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.clickable{cursor:pointer;transition:all .2s}
.clickable:hover{filter:brightness(1.2);transform:scale(1.03)}
.pulse{animation:float 3s ease-in-out infinite}

/* Room Objects */
.room-obj{position:absolute;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,5vw,36px);border-radius:6px;user-select:none}

/* Puzzle UI */
.puzzle-panel{background:rgba(255,255,255,.95);border-radius:12px;padding:20px;max-width:500px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,.15);text-align:center;position:relative}
.puzzle-panel h3{margin-bottom:12px;font-size:clamp(16px,4vw,20px)}
.puzzle-panel p{margin-bottom:16px;font-size:clamp(13px,3vw,15px);line-height:1.6}
.close-btn{position:absolute;top:8px;right:12px;width:28px;height:28px;border:none;background:rgba(0,0,0,.1);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;color:#666;line-height:1}
.close-btn:hover{background:rgba(0,0,0,.2);transform:scale(1.1)}
.dark .close-btn{background:rgba(255,255,255,.1);color:#ccc}
.dark .close-btn:hover{background:rgba(255,255,255,.2)}
.puzzle-input{width:80%;max-width:300px;padding:10px;font-size:18px;text-align:center;border:2px solid #ccc;border-radius:8px;outline:none;font-family:inherit}
.puzzle-input:focus{border-color:var(--accent)}
.puzzle-btn{padding:10px 30px;font-size:clamp(14px,3.5vw,16px);background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:12px;transition:all .2s;font-family:inherit}
.puzzle-btn:hover{opacity:.85;transform:scale(1.03)}
.puzzle-btn:active{transform:scale(.97)}
.hint-text{color:#e74c3c;font-size:clamp(12px,2.5vw,13px);margin-top:10px;min-height:20px}

/* Dark theme puzzle */
.dark .puzzle-panel{background:rgba(20,15,15,.97);color:#eee;border:1px solid rgba(255,255,255,.15)}
.dark .puzzle-input{background:rgba(0,0,0,.5);color:#fff;border-color:rgba(255,255,255,.3)}
.dark .puzzle-btn{background:#8b3a3a}
.dark .inv-item{background:rgba(60,40,40,.8);color:#eee}
.dark .inv-item.used{background:rgba(40,30,30,.6);color:#888}
.dark .hint-text{color:#ff7b7b}
.dark #hint-counter{background:rgba(255,255,255,.9);color:#222;border:1px solid rgba(0,0,0,.1)}
#hint-counter.disabled{opacity:.35;cursor:default}
#hint-modal{display:none !important}
#hint-modal.show{display:flex !important}
#hint-modal-content{background:#fff;color:#222;border-radius:12px}
#hint-modal-content h3{color:#333}
#hint-modal-content p{color:#444}
#hint-modal-content .sol-spoiler{background:#eee;color:#333}
#hint-modal-content button{background:var(--accent);color:#fff}
.dark #hint-modal-content{background:#fff;color:#222}
.dark #hint-modal-content .sol-spoiler{background:#eee;color:#333}
.dark #hint-modal-content button{background:var(--accent);color:#fff}
.dark #hint-modal-content button{background:#8b3a3a}
.sol-card{border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:14px;margin:10px 0;text-align:left}
.dark .sol-card{border-color:rgba(255,255,255,.1)}
.sol-card h4{margin-bottom:8px;font-size:15px}
.sol-spoiler{background:#eee;padding:8px 12px;border-radius:4px;cursor:pointer;font-size:13px;margin-top:8px}
.dark .sol-spoiler{background:rgba(255,255,255,.1)}
.sol-spoiler.revealed{background:transparent;cursor:default}
.dark .document{background:rgba(30,25,20,.95);color:#e0d8c8;border-color:rgba(255,255,255,.1)}

/* Diary */
.diary{background:#f9f3e3;border:2px solid #c9a96e;border-radius:4px;padding:20px;max-width:500px;width:90%;font-family:'Nanum Myeongjo',serif;line-height:2;box-shadow:3px 3px 15px rgba(0,0,0,.2);cursor:pointer}
.diary h4{border-bottom:1px solid #c9a96e;padding-bottom:8px;margin-bottom:12px}
.diary .date{font-size:12px;color:#888}
.diary .cipher{background:#ffe;padding:10px;border:1px dashed #c9a96e;margin:12px 0;font-weight:bold;letter-spacing:2px}
.diary .chalkboard{background:#2d5a27;color:#e8e8d0;padding:12px;border-radius:4px;margin:12px 0;font-family:monospace}

/* Library */
.newspaper{background:#f5e6c8;padding:16px;border:1px solid #a0876c;max-width:500px;width:90%;font-family:serif}
.newspaper h3{text-align:center;border-bottom:2px solid #333;padding-bottom:8px;margin-bottom:12px}
.torn-pieces{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0}
.torn-piece{padding:10px;background:#faf0d8;border:2px dashed #c9a96e;cursor:pointer;text-align:center;font-size:clamp(12px,2.8vw,14px);border-radius:4px;transition:all .2s;min-height:50px;display:flex;align-items:center;justify-content:center}
.torn-piece.selected{border-color:#e74c3c;background:#fff0f0;transform:scale(1.05)}
.torn-piece.placed{border-color:#27ae60;background:#f0fff0;opacity:.7;pointer-events:none}
.piece-slots{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.piece-slot{min-height:40px;border:2px solid #aaa;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,2.8vw,14px);background:rgba(0,0,0,.03);cursor:pointer;transition:all .2s}
.piece-slot.filled{border-color:#27ae60;background:#f0fff0;cursor:pointer}
.piece-slot.filled:hover{border-color:#e74c3c;background:#fff5f5}

/* Flashlight (Stage 4) */
.flashlight-room{width:100%;height:100%;position:absolute;inset:0;cursor:none}
.flashlight-content{position:absolute;inset:0}
.flashlight-mask{position:absolute;inset:0;background:#000;z-index:5;pointer-events:none}
.graffiti{position:absolute;color:#8b0000;font-weight:bold;font-size:clamp(14px,3.5vw,18px);text-shadow:0 0 10px rgba(139,0,0,.5);cursor:pointer;z-index:3;opacity:.9;user-select:none}
.graffiti:hover{text-shadow:0 0 20px rgba(139,0,0,.8)}
.graffiti.found{color:#27ae60;text-shadow:0 0 10px rgba(39,174,96,.5)}
.shadow-figure{position:absolute;width:60px;height:150px;background:rgba(0,0,0,.8);border-radius:30px 30px 0 0;z-index:4;opacity:0;transition:opacity .5s;filter:blur(2px)}

/* Boiler Room (Stage 5) */
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:400px;width:90%}
.valve{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#888,#555);border:3px solid #444;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .3s;margin:0 auto;flex-direction:column}
.valve:hover{border-color:#aaa}
.valve.turned{background:radial-gradient(circle,#5a8a5a,#3a6a3a);border-color:#2d5a2d}
.valve.wrong{background:radial-gradient(circle,#8a5a5a,#6a3a3a);animation:shake .3s}

/* Staff Room (Stage 6) */
.filing-cabinet{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:450px;width:90%}
.cabinet-drawer{padding:16px 10px;background:linear-gradient(180deg,#777,#555);color:#fff;text-align:center;border-radius:4px;cursor:pointer;font-size:clamp(12px,2.8vw,14px);transition:all .2s;border:1px solid #444}
.cabinet-drawer:hover{background:linear-gradient(180deg,#888,#666)}
.cabinet-drawer.open{background:linear-gradient(180deg,#555,#333);border-color:#222}
.document{background:#f5f0e0;padding:16px;border:1px solid #baa;max-width:500px;width:90%;font-size:clamp(13px,3vw,15px);line-height:1.8;position:relative}
.doc-stamp{color:#c00;font-weight:bold;border:2px solid #c00;padding:4px 12px;display:inline-block;transform:rotate(-5deg);margin:10px 0}

/* Rooftop (Stage 7) */
.rooftop{width:100%;max-width:700px;min-height:300px;background:linear-gradient(180deg,#0a0a1e,#1a1a3e,#2a2a4e);border-radius:12px;position:relative;overflow:hidden;padding:20px}
.stars{position:absolute;inset:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%}
/* Scary Ghost */
.ghost{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);width:130px;height:200px;animation:ghostFloat 4s ease-in-out infinite}
.ghost-body{width:130px;height:170px;background:radial-gradient(ellipse at 50% 30%,rgba(200,210,230,.6),rgba(150,170,200,.02));border-radius:65px 65px 35px 35px;position:relative;filter:blur(0.3px)}
.ghost-hair{position:absolute;top:-10px;left:8px;width:114px;height:120px;background:linear-gradient(180deg,rgba(10,10,30,.85),rgba(10,10,30,.15));border-radius:55px 55px 0 0;animation:hairSway 3s ease-in-out infinite;z-index:1}
.ghost-hair::after{content:'';position:absolute;bottom:-50px;left:8px;width:30px;height:70px;background:linear-gradient(180deg,rgba(10,10,30,.5),transparent);border-radius:0 0 12px 12px}
.ghost-hair::before{content:'';position:absolute;bottom:-45px;right:8px;width:25px;height:65px;background:linear-gradient(180deg,rgba(10,10,30,.4),transparent);border-radius:0 0 12px 12px}
.ghost-eye{position:absolute;width:22px;height:30px;background:#000;border-radius:50%;top:50px;z-index:2;box-shadow:0 0 25px rgba(100,120,200,.4),0 0 8px rgba(0,0,0,.8)}
.ghost-eye.left{left:30px}.ghost-eye.right{right:30px}
.ghost-mouth{position:absolute;width:40px;height:35px;background:rgba(0,0,20,.5);border-radius:10px 10px 50% 50%;bottom:35px;left:50%;transform:translateX(-50%);z-index:2;box-shadow:inset 0 0 15px rgba(0,0,0,.5)}
.quiz-card{background:rgba(10,10,30,.9);border:1px solid rgba(100,130,200,.3);border-radius:12px;padding:20px;margin:10px 0;max-width:500px;width:90%;color:#dde}
.quiz-card h3{margin-bottom:14px;color:#99aadd;font-size:clamp(15px,3.5vw,18px)}
.choice-btn{display:block;width:100%;padding:12px;margin:6px 0;background:rgba(40,50,80,.6);color:#ccd;border:1px solid rgba(100,130,200,.2);border-radius:8px;cursor:pointer;text-align:left;font-size:clamp(13px,3vw,15px);transition:all .2s;font-family:inherit}
.choice-btn:hover{background:rgba(60,70,110,.8);border-color:rgba(100,130,200,.5)}

/* Ending */
.ending-text{max-width:600px;width:90%;text-align:center;line-height:2;font-size:clamp(14px,3.5vw,17px);animation:fadeIn 2s}
.ending-happy{color:#e8dcc0}
.ending-horror{color:#cc8888}
.credits{margin-top:40px;font-size:clamp(12px,2.5vw,14px)}
.restart-btn{margin-top:30px;padding:14px 44px;border:none;border-radius:8px;cursor:pointer;font-size:clamp(15px,3.5vw,17px);transition:all .3s;font-family:inherit;font-weight:bold}
.restart-btn:hover{transform:scale(1.05)}
.restart-btn.happy{background:linear-gradient(135deg,#e8c48a,#d4a056);color:#3a2510}
.restart-btn.horror{background:linear-gradient(135deg,#8b3a3a,#a04040);color:#fdd}
.restart-btn.hidden{background:#fff;color:#222}

/* Scare Face (CSS only) */
.scare-face{width:200px;height:280px;position:relative;margin:0 auto}
.scare-face .head{width:200px;height:250px;background:radial-gradient(ellipse at 50% 40%,#e8d8c8,#8b6b5b 80%);border-radius:45% 45% 40% 40%;position:relative;filter:contrast(1.8) brightness(.5)}
.scare-face .eye{width:50px;height:60px;background:#000;border-radius:50%;position:absolute;top:70px;box-shadow:inset 0 0 20px #300,0 0 30px rgba(0,0,0,.5)}
.scare-face .eye.l{left:30px}.scare-face .eye.r{right:30px}
.scare-face .eye::after{content:'';width:15px;height:15px;background:red;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.8}
.scare-face .mouth{width:100px;height:80px;background:#000;border-radius:10px 10px 50% 50%;position:absolute;bottom:40px;left:50%;transform:translateX(-50%);box-shadow:inset 0 0 30px #200}
.scare-face-2 .head{filter:contrast(2) brightness(.3) hue-rotate(330deg)}
.scare-face-2 .eye{width:60px;height:70px;top:60px}
.scare-face-2 .eye::after{width:20px;height:20px;background:#f00;box-shadow:0 0 20px #f00}
.scare-face-2 .mouth{width:120px;height:90px}
.scare-face-3 .head{filter:contrast(2.5) brightness(.2) sepia(.5);box-shadow:0 0 60px rgba(150,0,0,.5)}
.scare-face-3 .eye{width:70px;height:80px;top:50px}
.scare-face-3 .eye::after{width:25px;height:25px;background:#ff0000;box-shadow:0 0 40px #f00}
.scare-face-3 .mouth{width:130px;height:100px;bottom:30px}

/* Atmosphere classes */
.atm-1{--bg-primary:#f5f0e8;--bg-secondary:#fff;--text-color:#333;--vignette-opacity:0;--noise-opacity:0;--red-overlay:0;--filter-brightness:1;--filter-contrast:1;--filter-saturate:1}
.atm-2{--bg-primary:#ede8df;--bg-secondary:#f8f4ec;--text-color:#333;--vignette-opacity:.1;--filter-saturate:.95}
.atm-3{--bg-primary:#d4cfc5;--bg-secondary:#e8e3d8;--text-color:#444;--vignette-opacity:.25;--filter-saturate:.85}
.atm-4{--bg-primary:#2a2520;--bg-secondary:#3a3530;--text-color:#e8e0d0;--vignette-opacity:.5;--red-overlay:.03;--filter-brightness:.9;--filter-saturate:.7}
.atm-5{--bg-primary:#1a1210;--bg-secondary:#2a2018;--text-color:#eedfcf;--vignette-opacity:.7;--red-overlay:.08;--noise-opacity:.02;--filter-brightness:.85;--filter-contrast:1.1;--filter-saturate:.6}

  #game-container{padding:0}

<body class="atm-1">
<div id="vignette-overlay"></div>
<div id="noise-overlay"></div>
<div id="red-overlay"></div>
<div id="glitch-overlay"></div>
<div id="flash-overlay"></div>
<div id="scare-overlay"></div>
<div id="inv-popup"><div id="inv-popup-box"><button id="inv-popup-close" onclick="document.getElementById('inv-popup').classList.remove('show')">&times;</button><h4 id="inv-popup-name"></h4><p id="inv-popup-desc"></p></div></div>
<div id="hint-counter" onclick="game.useHint()" style="position:fixed;top:10px;right:12px;z-index:25;background:rgba(255,255,255,.85);padding:6px 14px;border-radius:20px;font-size:14px;cursor:pointer;display:none;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.1)">&#x1F4A1; 2/2</div>

</div>

  <div id="inventory-bar"></div>
  <div id="stage-content"></div>

</div>

    <span class="sparkle" style="left:20%;top:75%;animation-delay:1s">&#x2B50;</span>

    <span class="sparkle" style="left:50%;top:10%;animation-delay:0.8s">&#x2728;</span>
    <span class="sparkle" style="left:90%;top:55%;animation-delay:2s">&#x2B50;</span>
    <span class="sparkle" style="left:5%;top:50%;animation-delay:1.2s">&#x1F338;</span>
  </div>
  <h1>방과후 동아리</h1>

</div>

  playMP3(type='normal'){
    try{

  tone(freq,type,dur,vol=0.3){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    o.connect(g);g.connect(this.master);o.start();o.stop(this.ctx.currentTime+dur);
  }
  noise(dur,vol=0.3){
    if(!this.ctx)return;
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*dur,this.ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const s=this.ctx.createBufferSource(),g=this.ctx.createGain();
    s.buffer=buf;g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    s.connect(g);g.connect(this.master);s.start();s.stop(this.ctx.currentTime+dur);
  }

  pageFlip(){ this.noise(0.1,0.05); this.tone(2000,'sine',0.05,0.03); }
  creak(){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain(),f=this.ctx.createBiquadFilter();
    o.type='sine';o.frequency.setValueAtTime(300,this.ctx.currentTime);
    o.frequency.linearRampToValueAtTime(600,this.ctx.currentTime+1.2);
    f.type='bandpass';f.frequency.value=400;f.Q.value=5;
    g.gain.setValueAtTime(0.08,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+1.5);
    o.connect(f);f.connect(g);g.connect(this.master);o.start();o.stop(this.ctx.currentTime+1.5);
  }
  clang(){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='square';o.frequency.setValueAtTime(800,this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(100,this.ctx.currentTime+0.2);
    g.gain.setValueAtTime(0.15,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.3);
    o.connect(g);g.connect(this.master);o.start();o.stop(this.ctx.currentTime+0.3);

  startDrone(freq=55,vol=0.06){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),lfo=this.ctx.createOscillator(),lfoG=this.ctx.createGain();
    const f=this.ctx.createBiquadFilter(),g=this.ctx.createGain();
    o.type='sawtooth';o.frequency.value=freq;
    lfo.type='sine';lfo.frequency.value=0.5;lfoG.gain.value=5;
    lfo.connect(lfoG);lfoG.connect(o.frequency);
    f.type='lowpass';f.frequency.value=200;
    g.gain.value=vol;
    o.connect(f);f.connect(g);g.connect(this.master);o.start();lfo.start();
    this.ambientNodes.push({o,lfo,g});
  }
  startHeartbeat(bpm=60){
    this.stopHeartbeat();
    const interval=60000/bpm;
    const beat=()=>{
      this.tone(55,'sine',0.15,0.2);
      setTimeout(()=>this.tone(55,'sine',0.1,0.15),150);
    };
    beat();
    this.hbInterval=setInterval(beat,interval);
  }
  stopHeartbeat(){ if(this.hbInterval){clearInterval(this.hbInterval);this.hbInterval=null;} }
  whisper(){
    if(!this.ctx)return;
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*0.8,this.ctx.sampleRate);
    const d=buf.getChannelData(0);let b=0;
    for(let i=0;i<d.length;i++){b+=(Math.random()*2-1)*0.1;b*=0.99;d[i]=b;}
    const s=this.ctx.createBufferSource(),g=this.ctx.createGain(),p=this.ctx.createStereoPanner();
    s.buffer=buf;g.gain.setValueAtTime(0.15,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.8);
    p.pan.setValueAtTime(-0.8,this.ctx.currentTime);
    p.pan.linearRampToValueAtTime(0.8,this.ctx.currentTime+0.8);
    s.connect(g);g.connect(p);p.connect(this.master);s.start();
  }
  scream(intensity=1){
    if(!this.ctx)return;
    const dur=[0.6,1.5,3.5][intensity-1]||1;
    const vol=[0.7,0.9,1.0][intensity-1]||0.7;
    const t=this.ctx.currentTime;
    // Pre-scream reverse sweep
    const oR=this.ctx.createOscillator(),gR=this.ctx.createGain();
    oR.type='sine';oR.frequency.setValueAtTime(4000,t);
    oR.frequency.exponentialRampToValueAtTime(200,t+0.1);
    gR.gain.setValueAtTime(vol*0.3,t);
    gR.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    oR.connect(gR);gR.connect(this.master);oR.start(t);oR.stop(t+0.12);
    // Boost master temporarily
    if(intensity>=3){
      this.master.gain.setValueAtTime(1.0,t);
    } else {
      this.master.gain.setValueAtTime(0.9,t);
    }
    this.master.gain.linearRampToValueAtTime(0.5,t+dur+0.5);
    // L1: Primary scream - multiple sine sweeps in human scream range
    const mkSweep=(f1,f2,f3,type,v)=>{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type=type;
      o.frequency.setValueAtTime(f1,t);
      o.frequency.exponentialRampToValueAtTime(f2,t+0.01);
      o.frequency.linearRampToValueAtTime(f3,t+dur*0.3);
      o.frequency.setValueAtTime(f3,t+dur*0.3);
      o.frequency.linearRampToValueAtTime(f2*0.8,t+dur);
      g.gain.setValueAtTime(0.001,t);
      g.gain.exponentialRampToValueAtTime(v,t+0.01);
      g.gain.setValueAtTime(v*0.9,t+dur*0.5);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.connect(g);g.connect(this.master);o.start();o.stop(t+dur);
    };
    // Main scream voices (stacked, slightly detuned for thickness)
    mkSweep(200,2200,3800,'sine',vol*0.5);
    mkSweep(200,2207,3815,'sine',vol*0.4);
    mkSweep(150,1800,3200,'sine',vol*0.3);
    // L2: Harsh overtones
    mkSweep(400,4400,5500,'sawtooth',vol*0.15);
    // L3: Heavy noise burst
    const nDur=dur*0.8;
    const nbuf=this.ctx.createBuffer(1,this.ctx.sampleRate*nDur,this.ctx.sampleRate);
    const nd=nbuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1);
    const ns=this.ctx.createBufferSource(),ng=this.ctx.createGain(),nf=this.ctx.createBiquadFilter();
    ns.buffer=nbuf;nf.type='bandpass';nf.frequency.value=3000;nf.Q.value=0.5;
    ng.gain.setValueAtTime(0.001,t);
    ng.gain.exponentialRampToValueAtTime(vol*0.7,t+0.01);
    ng.gain.exponentialRampToValueAtTime(0.001,t+nDur);
    ns.connect(nf);nf.connect(ng);ng.connect(this.master);ns.start(t);ns.stop(t+nDur);
    // L4: Sub-bass impact
    const ob=this.ctx.createOscillator(),gb=this.ctx.createGain();
    ob.type='square';ob.frequency.setValueAtTime(35,t);
    ob.frequency.linearRampToValueAtTime(20,t+dur);
    gb.gain.setValueAtTime(0.001,t);
    gb.gain.exponentialRampToValueAtTime(vol*0.6,t+0.01);
    gb.gain.exponentialRampToValueAtTime(0.001,t+dur);
    ob.connect(gb);gb.connect(this.master);ob.start();ob.stop(t+dur);
    if(intensity>=2){
      // Dissonant cluster (semitone intervals = maximum dissonance)
      [185,196,208,220,466,494,523,554].forEach(f=>{
        const o=this.ctx.createOscillator(),g=this.ctx.createGain();
        o.type='sawtooth';o.frequency.value=f;
        g.gain.setValueAtTime(0.001,t);
        g.gain.exponentialRampToValueAtTime(vol*0.12,t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.8);
        o.connect(g);g.connect(this.master);o.start();o.stop(t+dur);
      });
      // Second scream voice (delayed slightly for echo)
      setTimeout(()=>{mkSweep(300,2800,4200,'sine',vol*0.35);},50);
    }
    if(intensity>=3){
      // Glass-shattering high shriek
      mkSweep(3000,6000,5000,'square',vol*0.25);
      mkSweep(3500,5500,7000,'sawtooth',vol*0.15);
      // Extra delayed scream layers for "reverb"
      setTimeout(()=>{mkSweep(250,2500,4000,'sine',vol*0.25);},100);
      setTimeout(()=>{mkSweep(300,2000,3500,'sine',vol*0.15);},200);
      // Rumble intensified
      this.tone(25,'square',dur*1.2,vol*0.5);
    }
  }
  stopAmbient(){
    this.ambientNodes.forEach(n=>{try{n.o.stop();n.lfo.stop();}catch(e){}});
    this.ambientNodes=[];
    this.stopHeartbeat();
  }
  wind(){
    if(!this.ctx)return;
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*3,this.ctx.sampleRate);
    const d=buf.getChannelData(0);let b=0;
    for(let i=0;i<d.length;i++){b+=(Math.random()*2-1)*0.05;b*=0.995;d[i]=b;}
    const s=this.ctx.createBufferSource(),g=this.ctx.createGain(),f=this.ctx.createBiquadFilter();
    s.buffer=buf;s.loop=true;f.type='lowpass';f.frequency.value=800;
    g.gain.value=0.1;
    s.connect(f);f.connect(g);g.connect(this.master);s.start();
    this.ambientNodes.push({o:s,lfo:{stop:()=>{}},g});
  }
}

// Effect System
// ============================
class EffectSystem {
  constructor(game){ this.game=game; }
  wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
  async jumpScare(intensity=1,soundType='normal'){
    const flash=document.getElementById('flash-overlay');
    const scare=document.getElementById('scare-overlay');
    const g=this.game;
    g.audio.scream(intensity);
    g.audio.playMP3(soundType);
    flash.style.transition='opacity 0.05s';
    flash.style.opacity='1';
    await this.wait(100+intensity*100);
    const faceClass=intensity>=3?'scare-face-3':intensity>=2?'scare-face-2':'';
    scare.innerHTML=`<div class="scare-face ${faceClass}"><div class="head"><div class="eye l"></div><div class="eye r"></div><div class="mouth"></div></div></div>`;
    scare.style.opacity='1';
    document.body.style.setProperty('--shake-intensity',`${intensity*6}px`);
    document.body.classList.add('shaking');
    await this.wait(300+intensity*400);
    if(intensity>=2){
      for(let i=0;i<3;i++){
        flash.style.background=i%2===0?'rgba(150,0,0,0.5)':'#000';
        await this.wait(80);
      }
      flash.style.background='#000';
    }
    await this.wait(200);
    scare.style.opacity='0';
    flash.style.transition='opacity 0.5s';
    flash.style.opacity='0';
    document.body.classList.remove('shaking');
    document.body.style.setProperty('--shake-intensity','0px');
    await this.wait(500);
    scare.innerHTML='';
    flash.style.background='#000';
  }
  async screenFlash(color='#fff',dur=100){
    const f=document.getElementById('flash-overlay');
    f.style.background=color;f.style.transition='none';f.style.opacity='0.8';
    await this.wait(dur);
    f.style.transition='opacity 0.3s';f.style.opacity='0';
    await this.wait(300);f.style.background='#000';
  }
  async flicker(times=3){
    const f=document.getElementById('flash-overlay');
    for(let i=0;i<times;i++){
      f.style.transition='none';f.style.opacity='0.9';
      await this.wait(50+Math.random()*80);
      f.style.opacity='0';
      await this.wait(80+Math.random()*120);
    }
  }
  startGlitch(){ document.body.classList.add('glitch-active'); }
  stopGlitch(){ document.body.classList.remove('glitch-active'); }
}

// ============================
// UI Manager
// ============================
class UIManager {
  constructor(game){ this.game=game; this.typing=false; this.onDialogEnd=null; this.typingTimer=null; }
  isBusy(){ return this.typing || !!this.onDialogEnd; }
  showDialog(speaker,text,onEnd){
    const box=document.getElementById('dialog-box');
    const sp=document.getElementById('dialog-speaker');
    const tx=document.getElementById('dialog-text');
    box.style.display='block';
    sp.textContent=speaker;
    tx.textContent='';
    this.typing=true;
    let i=0;
    const fullText=text;
    const typeChar=()=>{
      if(i<fullText.length){tx.textContent+=fullText[i];i++;this.typingTimer=setTimeout(typeChar,30);}
      else{this.typing=false;this.onDialogEnd=onEnd;}
    };
    typeChar();
    // Store full text for skip
    this._fullText=fullText;
    this._onEnd=onEnd;
    this._tx=tx;
  }
  showDialogChain(dialogs,finalCb){
    let idx=0;
    const next=()=>{
      if(idx>=dialogs.length){
        document.getElementById('dialog-box').style.display='none';
        if(finalCb)finalCb();
        return;
      }
      const d=dialogs[idx];idx++;
      this.showDialog(d[0],d[1],next);
    };
    next();
  }
  nextDialog(){
    if(this.typing){
      // Skip typing, show full text instantly
      clearTimeout(this.typingTimer);
      this._tx.textContent=this._fullText;
      this.typing=false;
      this.onDialogEnd=this._onEnd;
      return;
    }
    if(this.onDialogEnd){const cb=this.onDialogEnd;this.onDialogEnd=null;cb();}
  }
  hideDialog(){ document.getElementById('dialog-box').style.display='none'; }
  updateInventory(items,usedItems){
    const bar=document.getElementById('inventory-bar');
    bar.innerHTML=items.map(i=>`<span class="inv-item${usedItems&&usedItems.has(i.name)?' used':''}" data-name="${i.name}" data-desc="${(i.desc||'').replace(/"/g,'&quot;')}">${i.name}</span>`).join('');
    bar.querySelectorAll('.inv-item').forEach(el=>{
      el.onclick=(e)=>{
        e.stopPropagation();
        const name=el.dataset.name;
        let desc=el.dataset.desc;
        if(name==='이수현의 일기장'){
          this.game.diaryViewCount++;
          const c=this.game.diaryViewCount;
          if(c===1) desc='1993년 3월, 이수현이 남긴 마지막 일기.';
          else if(c===2) desc='일기장을 자세히 살펴보니 뒷표지에 뭔가 적혀있다...';
          else desc='뒷표지에 알 수 없는 알파벳이 적혀 있다.\nB... D... A... C...';
        }
        document.getElementById('inv-popup-name').textContent=name;
        document.getElementById('inv-popup-desc').textContent=desc;
        document.getElementById('inv-popup').classList.add('show');
      };
    });
  }
}

// ============================
// Noise texture generator
// ============================
function generateNoise(){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const ctx=c.getContext('2d');
  const img=ctx.createImageData(128,128);
  for(let i=0;i<img.data.length;i+=4){
    const v=Math.random()*255;
    img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;
  }
  ctx.putImageData(img,0,0);
  document.getElementById('noise-overlay').style.backgroundImage=`url(${c.toDataURL()})`;
}

  // ======= STAGE 3: Library =======
  stage3(sc){
    this.audio.resume();
    const correctOrder=['○○고 신문부원','이수현(17),','학교에서','실종'];
    const shuffled=['학교에서','이수현(17),','실종','○○고 신문부원'];
    let selected=null;
    let placed=[null,null,null,null]; // index of piece in each slot (null = empty)
    let slotForPiece={}; // pieceIdx -> slotIdx
    sc.innerHTML=`
      <div class="newspaper">
        <h3>&#x1F4F0; ○○일보 1993년 3월 17일</h3>
        <p style="text-align:center;color:#888;margin-bottom:12px">기사의 헤드라인이 찢겨져 있다. 조각을 올바른 순서로 배치하세요.</p>
        <div class="piece-slots" id="s3-slots"></div>
        <hr style="margin:12px 0">
        <p style="font-size:13px;color:#888">조각을 클릭 후 빈칸에 배치 / 배치된 칸을 클릭하면 취소:</p>
        <div class="torn-pieces" id="s3-pieces"></div>
        <div class="hint-text" id="s3-hint"></div>
      </div>`;
    const slotsEl=sc.querySelector('#s3-slots');
    const piecesEl=sc.querySelector('#s3-pieces');
    const pieces=[];
    const slots=[];
    const checkSolved=()=>{
      if(placed.some(p=>p===null))return;
      const result=placed.map(p=>shuffled[p]);
      if(JSON.stringify(result)===JSON.stringify(correctOrder)){
        this.s3Solved(sc);
      } else {
        sc.querySelector('#s3-hint').textContent='순서가 맞지 않다... 칸을 클릭해서 취소할 수 있습니다.';
        this.audio.tone(200,'square',0.2,0.1);
      }
    };
    // Create slots
    for(let i=0;i<4;i++){
      const slot=document.createElement('div');
      slot.className='piece-slot';
      slot.textContent=`[ ${i+1}번째 ]`;
      slot.onclick=()=>{
        if(placed[i]!==null){
          // Remove piece from slot
          const pIdx=placed[i];
          placed[i]=null;
          delete slotForPiece[pIdx];
          slot.textContent=`[ ${i+1}번째 ]`;
          slot.classList.remove('filled');
          pieces[pIdx].classList.remove('placed');
          pieces[pIdx].style.pointerEvents='auto';
          this.audio.click();
        } else if(selected!==null){
          // Place piece
          placed[i]=selected;
          slotForPiece[selected]=i;
          slot.textContent=shuffled[selected];
          slot.classList.add('filled');
          pieces[selected].classList.add('placed');
          pieces[selected].style.pointerEvents='none';
          selected=null;
          sc.querySelectorAll('.torn-piece').forEach(p=>p.classList.remove('selected'));
          this.audio.click();
          checkSolved();
        }
      };
      slots.push(slot);
      slotsEl.appendChild(slot);
    }
    // Create pieces
    shuffled.forEach((text,i)=>{
      const piece=document.createElement('div');
      piece.className='torn-piece';
      piece.textContent=text;
      piece.onclick=()=>{
        if(slotForPiece[i]!==undefined)return;
        sc.querySelectorAll('.torn-piece').forEach(p=>p.classList.remove('selected'));
        piece.classList.add('selected');
        selected=i;
        this.audio.pageFlip();
      };
      pieces.push(piece);
      piecesEl.appendChild(piece);
    });
    this.ui.showDialogChain([
      ['','도서관은 먼지가 쌓여 있다. 오래된 신문 아카이브를 뒤졌다.'],
      ['','1993년 3월... 찾았다! 하지만 기사의 헤드라인이 찢겨져 있다.'],
    ]);
  }
  async s3Solved(sc){
    this.audio.tone(440,'sine',0.3,0.15);
    this.addItem('실종 기사 스크랩','1993년 3월 17일자 ○○일보 기사');
    this.ui.showDialog('','\"○○고 신문부원 이수현(17), 학교에서 실종\"... 30년 전 이 학교에서 학생이 사라졌다고?');

    setTimeout(()=>{

    },1500);
  }

  stage5(sc){

      <p id="s6-text2" style="display:none">같은 날 방과후, 김태호 교사가 이수현 학생을 옥상으로 불러냄.</p>
      <p id="s6-text3" style="display:none">이수현 학생은 옥상에서 추락. 김태호 교사는 "자진 퇴직" 처리.</p>
      <p id="s6-text4" style="display:none;color:#ff6b6b;font-weight:bold">교감 김정수 지시로 모든 기록 은폐. "가정 사정 전학" 처리됨.</p>
    </div>`;
    this.addItem('극비 보고서','사건 경위가 담긴 미공개 보고서');
    await this.effects.wait(2000);
    sc.querySelector('#s6-text2').style.display='block';
    this.audio.creak();
    await this.effects.wait(2000);
    sc.querySelector('#s6-text3').style.display='block';
    this.effects.startGlitch();
    document.body.style.setProperty('--noise-opacity','0.06');
    this.audio.whisper();
    await this.effects.wait(2000);
    await this.effects.jumpScare(2);
    this.effects.stopGlitch();
    await this.effects.wait(1000);
    sc.querySelector('#s6-text4').style.display='block';
    this.ui.showDialogChain([
      ['???','왜 나를 잊었어...'],
      ['','...눈 앞에 글씨가 나타났다 사라졌다. 환각인가?'],
      ['','진실을 알았다. 옥상으로 가야 한다.'],
    ],()=>this.goStage(7));
  }

  // ======= STAGE 7: Rooftop =======
  stage7(sc){
    this.audio.resume();
    this.audio.stopAmbient();
    this.audio.wind();
    this.audio.startHeartbeat(100);
    let qIdx=0;
    let wrongCount=0;
    const questions=[
      {q:'이수현에게 무슨 일이 있었는가?',opts:['교통사고를 당했다','학교 옥상에서 추락했다','스스로 학교를 떠났다','전학을 갔다'],ans:1},
      {q:'범인은 누구인가?',opts:['교장 선생님','경비 아저씨','김태호 교사','알 수 없다'],ans:2},
      {q:'학교는 왜 진실을 숨겼는가?',opts:['증거가 부족해서','학교 명예를 위해','교감의 친인척을 보호하기 위해','학부모 요청으로'],ans:2},
    ];
    let stars='';for(let i=0;i<50;i++){stars+=`<div class="star" style="left:${Math.random()*100}%;top:${Math.random()*60}%;opacity:${0.3+Math.random()*0.7};width:${1+Math.random()*2}px;height:${1+Math.random()*2}px"></div>`;}
    sc.innerHTML=`
      <div class="rooftop">
        <div class="stars">${stars}</div>
        <div class="ghost" id="s7-ghost">
          <div class="ghost-body">
            <div class="ghost-hair"></div>
            <div class="ghost-eye left"></div>
            <div class="ghost-eye right"></div>
            <div class="ghost-mouth"></div>
          </div>
        </div>
      </div>
      <div id="s7-quiz" style="margin-top:16px;display:flex;flex-direction:column;align-items:center"></div>`;
    const showQuestion=()=>{
      if(qIdx>=questions.length){
        this.s7FinalChoice(sc);
        return;
      }
      const q=questions[qIdx];
      const quiz=sc.querySelector('#s7-quiz');
      quiz.innerHTML=`<div class="quiz-card">
        <h3>${qIdx+1}/3: ${q.q}</h3>
        ${q.opts.map((o,i)=>`<button class="choice-btn" data-idx="${i}">${o}</button>`).join('')}
      </div>`;
      quiz.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.onclick=async()=>{
          const idx=parseInt(btn.dataset.idx);
          if(idx===q.ans){
            this.audio.tone(523,'sine',0.2,0.15);
            btn.style.borderColor='#4a9';btn.style.background='rgba(40,120,80,.4)';
            qIdx++;
            setTimeout(showQuestion,800);
          } else {
            btn.style.borderColor='#a44';btn.style.background='rgba(120,40,40,.4)';
            wrongCount++;
            if(wrongCount>=3){
              await this.effects.jumpScare(3);
              sc.innerHTML='<div class="ending-text ending-horror"><p style="margin-bottom:20px">\uC774\uC218\uD604: "\uB10C \uC544\uBB34\uAC83\uB3C4 \uBAA8\uB974\uB294\uAD6C\uB098..."</p><button class="restart-btn horror" onclick="game.restart()">\uCC98\uC74C\uBD80\uD130 \uB2E4\uC2DC</button></div>';
              this.ui.hideDialog();
              return;
            }
            await this.effects.jumpScare(2);
            showQuestion();
          }
        };
      });
    };
    this.ui.showDialogChain([
      ['','옥상. 차가운 바람이 분다.'],
      ['','...저기, 희미하게 빛나는 형체가 보인다.'],
    ],async()=>{
      await this.effects.flicker(2);
      this.audio.scream(1);
      await this.effects.wait(800);
      this.ui.showDialogChain([
      ['이수현','...드디어 왔구나. 내 이야기를 들어줄 사람이.'],
      ['이수현','진실을 증명해 봐. 네가 알아낸 것을 말해줘.'],
    ],showQuestion);
    });
  }
  s7FinalChoice(sc){
    const quiz=sc.querySelector('#s7-quiz');
    quiz.innerHTML=`<div class="quiz-card" style="border-color:rgba(200,150,100,.4)">
      <h3>이수현의 영혼에게 뭐라고 하겠는가?</h3>
      <button class="choice-btn" id="s7-happy" style="border-color:rgba(100,180,150,.4)">
        "이제 쉬어도 돼. 진실은 밝혀졌어."
      </button>
      <button class="choice-btn" id="s7-horror" style="border-color:rgba(180,100,100,.4)">
        "같이 가자. 여기서 나가자."
      </button>
    </div>`;
    sc.querySelector('#s7-happy').onclick=()=>{
      this.ui.showDialog('이수현','...고마워.',()=>this.goStage(8));
    };
    sc.querySelector('#s7-horror').onclick=()=>{
      this.ui.showDialog('이수현','...정말? 같이...?',()=>this.goStage(9));
    };
  }

  // ======= STAGE 8: Happy Ending =======
  async stage8Happy(sc){
    this.audio.stopAmbient();
    this.setAtmosphere(8);
    sc.innerHTML=`<div class="ending-text ending-happy" id="s8h-text"></div>`;
    const textEl=sc.querySelector('#s8h-text');
    const lines=[
      '이수현의 형체가 희미하게 미소 짓는다.',
      '',
      '빛이 되어 흩어지듯, 천천히 사라져 간다.',
      '',
      '...동쪽 하늘이 밝아온다.',
      '',
      '다음 날, 나는 경찰에 신고했다.',
      '30년간 묻혔던 진실이 세상에 알려졌다.',
      '김태호는 체포되었고, 이수현의 가족은 마침내 딸의 죽음을 알게 되었다.',
      '',
      '가끔 동아리실에서 바람이 불면,',
      '누군가 속삭이는 것 같다.',
      '',
      '"고마워..."',
    ];
    for(const line of lines){
      const p=document.createElement('p');p.textContent=line;p.style.opacity='0';
      p.style.transition='opacity 1.5s';textEl.appendChild(p);
      await this.effects.wait(200);p.style.opacity='1';
      await this.effects.wait(1500);
    }
    document.body.style.transition='background 10s';
    document.body.style.setProperty('--bg-primary','#f5e6c8');
    document.body.style.setProperty('--vignette-opacity','0');
    textEl.style.color='#3a2a1a';
    await this.effects.wait(3000);
    this.audio.whisper();
    await this.effects.screenFlash('#fff',200);
    await this.effects.wait(2000);
    const credits=document.createElement('div');
    credits.className='credits';
    credits.innerHTML=`<p>— 끝 —</p><p style="margin-top:16px">방과후 동아리</p><p style="margin-top:20px;font-style:italic;opacity:.4;font-size:clamp(11px,2.5vw,13px)">...처음으로 돌아가면, 열리지 않는 문을 계속 두드려볼 걸 그랬다.</p><button class="restart-btn happy" onclick="game.restart()">다시 하기</button><br><button class="restart-btn" style="background:rgba(255,255,255,.15);color:#bba;margin-top:10px;font-size:13px;padding:10px 30px" onclick="game.showSolutions()">해설 보기</button>`;
    textEl.appendChild(credits);
    credits.style.opacity='0';credits.style.transition='opacity 2s';
    await this.effects.wait(200);credits.style.opacity='1';
  }

  // ======= STAGE 9: Horror Ending =======
  async stage8Horror(sc){
    this.audio.stopAmbient();
    this.audio.startDrone(35,0.15);
    this.setAtmosphere(8);
    sc.innerHTML=`<div class="ending-text ending-horror" id="s8b-text"></div>`;
    const textEl=sc.querySelector('#s8b-text');
    const lines=['이수현이 손을 내민다.','','그 손을 잡는 순간—'];
    for(const line of lines){
      const p=document.createElement('p');p.textContent=line;p.style.opacity='0';
      p.style.transition='opacity 1.5s';textEl.appendChild(p);
      await this.effects.wait(200);p.style.opacity='1';
      await this.effects.wait(2000);
    }
    await this.effects.wait(500);
    this.effects.startGlitch();
    this.audio.scream(2);
    await this.effects.wait(1500);
    this.effects.stopGlitch();
    textEl.innerHTML='<p style="font-size:clamp(20px,5vw,28px);color:#ff4444">"너도 여기 있어..."</p>';
    await this.effects.wait(2000);
    await this.effects.jumpScare(3);
    await this.effects.wait(500);
    const flash=document.getElementById('flash-overlay');
    flash.style.opacity='1';
    document.body.style.setProperty('--noise-opacity','0.3');
    await this.effects.wait(2000);
    document.body.style.setProperty('--noise-opacity','0');
    await this.effects.wait(1000);
    textEl.innerHTML='';
    flash.style.transition='opacity 2s';flash.style.opacity='0';
    await this.effects.wait(2000);
    textEl.style.color='#ccbbaa';
    const finalLines=['다음 날,','○○고등학교에서','또 한 명의 학생이 사라졌다...'];
    for(const line of finalLines){
      const p=document.createElement('p');p.textContent=line;p.style.opacity='0';
      p.style.transition='opacity 2s';textEl.appendChild(p);
      await this.effects.wait(300);p.style.opacity='1';
      await this.effects.wait(2500);
    }
    this.audio.stopAmbient();
    await this.effects.wait(3000);
    const hintP=document.createElement('p');
    hintP.style.cssText='font-style:italic;opacity:.4;font-size:clamp(11px,2.5vw,13px);margin-top:20px';
    hintP.textContent='...만약 처음부터 그 문을 억지로 열었다면?';
    textEl.appendChild(hintP);
    const btn=document.createElement('button');
    btn.className='restart-btn horror';btn.textContent='다시 하기';
    btn.onclick=()=>game.restart();
    textEl.appendChild(btn);
    const solBtn=document.createElement('button');
    solBtn.className='restart-btn';
    solBtn.style.cssText='background:rgba(255,255,255,.1);color:#c99;margin-top:10px;font-size:13px;padding:10px 30px';
    solBtn.textContent='해설 보기';solBtn.onclick=()=>game.showSolutions();
    textEl.appendChild(solBtn);
    btn.style.opacity='0';btn.style.transition='opacity 2s';
    solBtn.style.opacity='0';solBtn.style.transition='opacity 2s';
    hintP.style.opacity='0';hintP.style.transition='opacity 2s';
    await this.effects.wait(200);btn.style.opacity='1';solBtn.style.opacity='1';hintP.style.opacity='.4';
  }

  // ======= STAGE 10: Hidden Ending =======
  async stageHiddenEnd(sc){
    this.audio.stopAmbient();
    this.setAtmosphere(8);
    sc.innerHTML=`<div class="ending-text ending-horror" id="s10-text"></div>`;
    const textEl=sc.querySelector('#s10-text');
    await this.effects.wait(2000);
    const lines=[
      '복도는 칠흑같이 어두웠다.',
      '',
      '문 너머에서 무언가가 기다리고 있었다.',
      '',
      '"나가면 안 된다고 했는데..."',
    ];
    for(const line of lines){
      const p=document.createElement('p');p.textContent=line;p.style.opacity='0';
      p.style.transition='opacity 1.5s';textEl.appendChild(p);
      await this.effects.wait(200);p.style.opacity='1';
      await this.effects.wait(2000);
    }
    // Fake calm - pretend it's safe
    await this.effects.wait(1500);
    const safeP=document.createElement('p');
    safeP.textContent='...아무 일도 없다. 괜히 겁먹었나.';
    safeP.style.opacity='0';safeP.style.transition='opacity 2s';
    textEl.appendChild(safeP);
    await this.effects.wait(200);safeP.style.opacity='1';
    // Long pause to make them relax
    await this.effects.wait(4000);
    const safe2=document.createElement('p');
    safe2.textContent='이제 집에 가면 되겠—';
    safe2.style.opacity='0';safe2.style.transition='opacity 1.5s';
    textEl.appendChild(safe2);
    await this.effects.wait(200);safe2.style.opacity='1';
    // Wait just long enough for them to start reading
    await this.effects.wait(800);
    // MAXIMUM JUMP SCARE at worst possible moment
    this.audio.startDrone(25,0.2);
    await this.effects.jumpScare(3,'hidden');
    await this.effects.wait(300);
    // Double scare
    await this.effects.jumpScare(3,'hidden');
    await this.effects.wait(500);
    this.audio.stopAmbient();
    textEl.innerHTML='';
    const flash=document.getElementById('flash-overlay');
    flash.style.opacity='1';
    await this.effects.wait(3000);
    flash.style.transition='opacity 3s';flash.style.opacity='0';
    await this.effects.wait(3000);
    textEl.style.color='#ccbbaa';
    const finalLines=[
      '당신은 동아리실에서 발견되지 않았다.',
      '',
      '아무도 당신을 찾지 않았다.',
      '',
      '30년 뒤, 누군가 이 방에 다시 올 것이다.',
    ];
    for(const line of finalLines){
      const p=document.createElement('p');p.textContent=line;p.style.opacity='0';
      p.style.transition='opacity 2s';textEl.appendChild(p);
      await this.effects.wait(300);p.style.opacity='1';
      await this.effects.wait(2500);
    }
    await this.effects.wait(2000);
    const btn=document.createElement('button');
    btn.className='restart-btn hidden';btn.textContent='다시 하기';
    btn.onclick=()=>game.restart();
    textEl.appendChild(btn);
    btn.style.opacity='0';btn.style.transition='opacity 2s';
    await this.effects.wait(200);btn.style.opacity='1';
  }

  restart(){
    this.inventory=[];
    this.usedItems=new Set();
    this.diaryViewCount=0;
    this.hintsLeft=2;
    this.hintUsedStages=new Set();
    this.updateHintCounter();
    document.getElementById('hint-counter').style.display='block';
    this.ui.updateInventory([],this.usedItems);
    this.audio.stopAmbient();
    this.effects.stopGlitch();
    document.body.className='atm-1';
    document.body.style.removeProperty('--noise-opacity');
    document.body.style.removeProperty('--bg-primary');
    document.body.style.removeProperty('--vignette-opacity');
    document.body.style.transition='';
    document.getElementById('flash-overlay').style.opacity='0';
    document.getElementById('scare-overlay').style.opacity='0';
    document.getElementById('hint-modal').classList.remove('show');
    this.goStage(1);
  }
}

const game=new Game();
document.addEventListener('click',function(e){
  if(e.target.classList.contains('sol-spoiler')&&!e.target.classList.contains('revealed')){
    e.target.textContent=e.target.dataset.answer;
    e.target.classList.add('revealed');
  }
});
</script>
</body>
</html>
