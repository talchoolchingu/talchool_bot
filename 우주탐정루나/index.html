<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0a0e27;color:#e0e0ff;user-select:none;}
input,textarea{user-select:text;}
#app{width:100%;height:100%;position:relative;overflow:hidden;}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.stars::before,.stars::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:transparent;}
.stars::before{box-shadow:
  12px 50px 1px #fff,80px 120px 1px #fff,150px 30px 1px #fff,230px 180px 1px #fff,
  310px 60px 1px #fff,400px 200px 1px #fff,50px 300px 1px #fff,180px 350px 1px #fff,
  290px 400px 1px #fff,370px 280px 1px #fff,450px 100px 1px #fff,30px 450px 1px #fff,
  500px 350px 1px #fff,120px 500px 1px #fff,350px 500px 1px #fff,200px 250px 1px #fff,
  420px 420px 1px #fff,70px 200px 1px #fff,260px 150px 1px #fff,480px 50px 1px #fff,
  550px 250px 1px #fff,600px 100px 1px #fff,650px 300px 1px #fff,700px 50px 1px #fff,
  750px 200px 1px #fff,100px 600px 1px #fff,300px 650px 1px #fff,500px 500px 1px #fff;
animation:twinkle 3s infinite alternate;}
.stars::after{box-shadow:
  25px 80px 1px rgba(255,255,255,0.6),130px 200px 1px rgba(255,255,255,0.6),
  220px 50px 1px rgba(255,255,255,0.6),340px 300px 1px rgba(255,255,255,0.6),
  60px 400px 1px rgba(255,255,255,0.6),190px 150px 1px rgba(255,255,255,0.6),
  410px 350px 1px rgba(255,255,255,0.6),280px 250px 1px rgba(255,255,255,0.6),
  500px 150px 1px rgba(255,255,255,0.6),160px 450px 1px rgba(255,255,255,0.6),
  380px 100px 1px rgba(255,255,255,0.6),440px 450px 1px rgba(255,255,255,0.6);
animation:twinkle 4s 1s infinite alternate;}
@keyframes twinkle{0%{opacity:0.4;}100%{opacity:1;}}

/* Title Screen */
#title-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:20px;}
#title-screen h1{font-size:clamp(28px,7vw,56px);color:#00f5ff;text-shadow:0 0 20px #00f5ff,0 0 40px #00f5ff,0 0 80px #00f5ff;text-align:center;animation:glow-pulse 2s infinite alternate;}
@keyframes glow-pulse{0%{text-shadow:0 0 20px #00f5ff,0 0 40px #00f5ff;}100%{text-shadow:0 0 30px #00f5ff,0 0 60px #00f5ff,0 0 100px #00f5ff;}}
.luna-avatar-big{width:120px;height:120px;position:relative;margin:10px auto;}
.luna-helmet{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#e8e8ff,#a0a0d0);border:4px solid #c0c0e0;position:relative;overflow:visible;box-shadow:0 0 20px rgba(0,245,255,0.3);}
.luna-face{width:90px;height:90px;border-radius:50%;background:#ffe4c9;position:absolute;top:15px;left:15px;}
.luna-eye{width:18px;height:22px;background:#2a1a4e;border-radius:50%;position:absolute;top:28px;}
.luna-eye.left{left:20px;}
.luna-eye.right{right:20px;}
.luna-eye::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%;position:absolute;top:4px;left:4px;}
.luna-mouth{width:12px;height:8px;border:2px solid #e07060;border-top:none;border-radius:0 0 10px 10px;position:absolute;bottom:22px;left:50%;transform:translateX(-50%);}
.luna-antenna{width:4px;height:30px;background:linear-gradient(#c0c0e0,#00f5ff);position:absolute;top:-26px;left:50%;transform:translateX(-50%);border-radius:2px;}
.luna-antenna::after{content:'';width:12px;height:12px;background:#00f5ff;border-radius:50%;position:absolute;top:-8px;left:-4px;box-shadow:0 0 10px #00f5ff;animation:antenna-blink 1.5s infinite;}
@keyframes antenna-blink{0%,100%{opacity:1;box-shadow:0 0 10px #00f5ff;}50%{opacity:0.5;box-shadow:0 0 5px #00f5ff;}}
.sound-notice{color:#ffe600;font-size:14px;opacity:0.8;}
.btn-neon{padding:16px 48px;font-size:20px;font-weight:bold;border:2px solid #00f5ff;background:linear-gradient(135deg,rgba(0,245,255,0.15),rgba(255,0,255,0.15));color:#00f5ff;border-radius:12px;cursor:pointer;transition:all 0.3s;min-height:44px;min-width:44px;text-shadow:0 0 10px #00f5ff;}
.btn-neon:hover,.btn-neon:active{background:linear-gradient(135deg,rgba(0,245,255,0.35),rgba(255,0,255,0.35));box-shadow:0 0 20px rgba(0,245,255,0.5),0 0 40px rgba(255,0,255,0.3);transform:scale(1.05);}

/* Game UI */
#game-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;z-index:5;}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(10,14,39,0.9);border-bottom:1px solid rgba(0,245,255,0.3);z-index:20;flex-shrink:0;}
#top-bar .stage-label{color:#00f5ff;font-size:14px;font-weight:bold;}
#top-bar .btn-small{padding:6px 14px;font-size:12px;border:1px solid;border-radius:8px;background:rgba(0,0,0,0.3);cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;}
.btn-hint{color:#ffe600;border-color:#ffe600;}
.btn-hint:hover{background:rgba(255,230,0,0.2);}
.btn-hint.disabled{opacity:0.4;color:#666;border-color:#666;pointer-events:none;}
.btn-inv{color:#39ff14;border-color:#39ff14;}
.btn-inv:hover{background:rgba(57,255,20,0.2);}
.btn-sol{color:#ff00ff;border-color:#ff00ff;}
.btn-sol:hover{background:rgba(255,0,255,0.2);}
#stage-content{flex:1;overflow:hidden;position:relative;z-index:5;}

/* Dialog */
#dialog-box{position:fixed;bottom:0;left:0;width:100%;z-index:100;display:none;padding:8px;}
#dialog-inner{background:rgba(10,14,39,0.95);border:2px solid #00f5ff;border-radius:16px 16px 4px 4px;padding:12px 16px;box-shadow:0 0 20px rgba(0,245,255,0.3);display:flex;gap:12px;align-items:flex-start;max-width:600px;margin:0 auto;}
.dialog-avatar{width:50px;height:50px;border-radius:50%;flex-shrink:0;position:relative;}
.dialog-avatar .mini-helmet{width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#e8e8ff,#a0a0d0);border:2px solid #c0c0e0;position:relative;overflow:visible;}
.dialog-avatar .mini-face{width:36px;height:36px;border-radius:50%;background:#ffe4c9;position:absolute;top:7px;left:7px;}
.dialog-avatar .mini-eye{width:8px;height:10px;background:#2a1a4e;border-radius:50%;position:absolute;top:10px;}
.dialog-avatar .mini-eye.left{left:7px;}
.dialog-avatar .mini-eye.right{right:7px;}
.dialog-avatar .mini-eye::after{content:'';width:3px;height:3px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;}
.dialog-avatar .mini-antenna{width:3px;height:14px;background:linear-gradient(#c0c0e0,#00f5ff);position:absolute;top:-12px;left:50%;transform:translateX(-50%);border-radius:2px;}
.dialog-avatar .mini-antenna::after{content:'';width:8px;height:8px;background:#00f5ff;border-radius:50%;position:absolute;top:-5px;left:-2.5px;box-shadow:0 0 6px #00f5ff;}
.dialog-text{flex:1;}
.dialog-speaker{font-weight:bold;color:#ffe600;font-size:13px;margin-bottom:4px;}
.dialog-content{font-size:15px;line-height:1.6;color:#e0e0ff;min-height:40px;}
.dialog-click-hint{font-size:11px;color:rgba(255,255,255,0.4);text-align:right;margin-top:4px;}

/* Inventory Modal */
#inv-modal,#sol-modal,#hint-modal,#item-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#0f1440;border:2px solid #00f5ff;border-radius:16px;padding:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 0 30px rgba(0,245,255,0.3);}
.modal-box h2{color:#00f5ff;text-align:center;margin-bottom:16px;font-size:20px;}
.modal-close{position:absolute;top:10px;right:14px;font-size:24px;color:#ff00ff;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;background:none;border:none;}
.inv-item{padding:10px 14px;margin:6px 0;background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.3);border-radius:8px;cursor:pointer;font-size:14px;color:#e0e0ff;transition:background 0.2s;}
.inv-item:hover{background:rgba(0,245,255,0.25);}
.inv-empty{text-align:center;color:rgba(255,255,255,0.4);padding:20px;}

/* Solutions */
.sol-item{padding:12px;margin:8px 0;background:rgba(255,0,255,0.1);border:1px solid rgba(255,0,255,0.2);border-radius:8px;}
.sol-title{color:#ff00ff;font-weight:bold;font-size:14px;margin-bottom:4px;}
.sol-hint{color:#ffe600;font-size:13px;margin-bottom:4px;}
.sol-reveal{padding:8px 16px;margin-top:6px;background:rgba(255,0,255,0.2);border:1px solid #ff00ff;color:#ff00ff;border-radius:6px;cursor:pointer;font-size:13px;min-height:44px;}
.sol-answer{color:#39ff14;font-size:13px;margin-top:6px;display:none;}

/* Hint modal */
.hint-text{color:#ffe600;font-size:16px;text-align:center;padding:20px;line-height:1.6;}

/* Stage scenes */
.scene{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:12px;position:relative;overflow:hidden;}
.scene-title{color:#00f5ff;font-size:18px;font-weight:bold;margin:8px 0;text-shadow:0 0 10px #00f5ff;}
.scene-desc{color:#e0e0ff;font-size:13px;text-align:center;margin-bottom:8px;opacity:0.8;}
.scene-room{position:relative;width:100%;max-width:500px;flex:1;min-height:200px;border:2px solid rgba(0,245,255,0.2);border-radius:12px;background:rgba(15,20,60,0.8);overflow:hidden;}

/* Clickable objects */
.obj{position:absolute;cursor:pointer;border-radius:8px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,5vw,32px);min-width:44px;min-height:44px;padding:6px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.obj:hover{transform:scale(1.15);filter:brightness(1.3);}
.obj.found{opacity:0.4;pointer-events:none;}

/* Counter */
.counter{color:#39ff14;font-size:16px;font-weight:bold;text-align:center;margin:8px 0;text-shadow:0 0 10px #39ff14;}

/* Choice buttons */
.choices{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px;margin:8px auto;padding:0 12px;}
.choice-btn{padding:12px 16px;border:2px solid #00f5ff;background:rgba(0,245,255,0.1);color:#e0e0ff;border-radius:10px;cursor:pointer;font-size:14px;text-align:left;transition:all 0.2s;min-height:44px;}
.choice-btn:hover{background:rgba(0,245,255,0.25);box-shadow:0 0 15px rgba(0,245,255,0.3);}
.choice-btn.correct{border-color:#39ff14;background:rgba(57,255,20,0.2);color:#39ff14;}
.choice-btn.wrong{border-color:#ff4444;background:rgba(255,0,0,0.2);color:#ff4444;}

/* CCTV */
.cctv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:400px;margin:8px auto;}
.cctv-panel{background:rgba(0,40,0,0.6);border:2px solid #39ff14;border-radius:8px;padding:10px;text-align:center;cursor:pointer;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.2s;color:#39ff14;font-size:13px;}
.cctv-panel:hover{background:rgba(0,60,0,0.8);box-shadow:0 0 15px rgba(57,255,20,0.3);}
.cctv-panel .cam-label{font-weight:bold;font-size:14px;}
.time-btns{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.time-btn{padding:6px 10px;border:1px solid #39ff14;background:rgba(0,40,0,0.8);color:#39ff14;border-radius:4px;cursor:pointer;font-size:12px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;}
.time-btn:hover{background:rgba(57,255,20,0.3);}

/* Flashlight */
.dark-room{background:#000 !important;cursor:none;}
.flashlight-mask{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;background:radial-gradient(circle 70px at var(--fx,50%) var(--fy,50%),transparent 0%,rgba(0,0,0,0.97) 100%);}
.dark-room .obj{z-index:1;}

/* Test tubes */
.tubes{display:flex;gap:16px;justify-content:center;margin:12px 0;}
.tube{width:40px;height:100px;border:2px solid rgba(255,255,255,0.5);border-top:none;border-radius:0 0 20px 20px;cursor:pointer;transition:all 0.2s;position:relative;min-width:44px;}
.tube::before{content:attr(data-label);position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:11px;color:#e0e0ff;white-space:nowrap;}
.tube:hover{transform:scale(1.1);box-shadow:0 0 15px rgba(255,255,255,0.3);}
.tube.red{background:linear-gradient(to top,#ff4444 70%,transparent);}
.tube.blue{background:linear-gradient(to top,#4488ff 70%,transparent);}
.tube.green{background:linear-gradient(to top,#39ff14 70%,transparent);}
.tube.yellow{background:linear-gradient(to top,#ffe600 70%,transparent);}
.tube.purple{background:linear-gradient(to top,#aa44ff 70%,transparent);}
.beaker{width:80px;height:100px;border:3px solid rgba(255,255,255,0.6);border-radius:0 0 16px 16px;margin:12px auto;position:relative;overflow:hidden;transition:all 0.5s;}
.beaker-fill{position:absolute;bottom:0;width:100%;transition:all 0.4s;border-radius:0 0 12px 12px;}

/* Wires */
.wire-area{display:flex;justify-content:space-between;width:100%;max-width:400px;margin:8px auto;padding:0 12px;}
.wire-list,.port-list{display:flex;flex-direction:column;gap:10px;}
.wire-item,.port-item{padding:10px 16px;border:2px solid;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;min-height:44px;min-width:80px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.wire-item:hover,.port-item:hover{transform:scale(1.05);}
.wire-item.selected{box-shadow:0 0 15px currentColor;transform:scale(1.1);}
.wire-item.connected,.port-item.connected{opacity:0.4;pointer-events:none;}
.port-item.correct-flash{animation:flash-green 0.5s;}
.port-item.wrong-flash{animation:flash-red 0.5s;}
@keyframes flash-green{0%,100%{box-shadow:none;}50%{box-shadow:0 0 20px #39ff14;}}
@keyframes flash-red{0%,100%{box-shadow:none;}50%{box-shadow:0 0 20px #ff4444;}}

/* Timer */
.timer-wrap{position:absolute;top:8px;left:8px;z-index:30;}
.timer-wrap svg{width:60px;height:60px;}
.timer-text{font-size:16px;font-weight:bold;fill:#39ff14;}

/* Signal patterns */
.signal-group{padding:12px;margin:6px 0;background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.2);border-radius:8px;text-align:center;}
.signal-dots{font-size:24px;letter-spacing:4px;margin:4px 0;}
.signal-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
.signal-btn{padding:8px 14px;border:1px solid #ffe600;background:rgba(255,230,0,0.1);color:#ffe600;border-radius:6px;cursor:pointer;font-size:13px;min-height:44px;transition:all 0.2s;}
.signal-btn:hover{background:rgba(255,230,0,0.3);}
.signal-btn.correct{border-color:#39ff14;color:#39ff14;background:rgba(57,255,20,0.2);pointer-events:none;}
.signal-btn.wrong{border-color:#ff4444;color:#ff4444;}

/* Suspect cards */
.suspect-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
.suspect-card{width:140px;padding:12px;border:2px solid rgba(0,245,255,0.3);border-radius:12px;background:rgba(15,20,60,0.9);text-align:center;font-size:12px;color:#e0e0ff;position:relative;overflow:visible;}
.suspect-card h3{color:#ffe600;font-size:14px;margin-bottom:6px;}
.suspect-face{width:60px;height:60px;border-radius:50%;margin:0 auto 8px;border:2px solid;}
.face-han{background:linear-gradient(135deg,#4a5568,#2d3748);border-color:#ffe600;}
.face-yoon{background:linear-gradient(135deg,#553c9a,#44337a);border-color:#00f5ff;}
.face-park{background:linear-gradient(135deg,#c05621,#9c4221);border-color:#39ff14;}
.suspect-face::after{content:'';display:block;width:20px;height:10px;background:#ffe4c9;border-radius:0 0 10px 10px;margin:30px auto 0;}

/* Ending stats */
.stats-box{background:rgba(0,245,255,0.1);border:1px solid #00f5ff;border-radius:12px;padding:16px;margin:12px auto;max-width:300px;text-align:center;}
.stats-box p{margin:6px 0;font-size:15px;color:#e0e0ff;}
.stats-box span{color:#ffe600;font-weight:bold;}
.perfect-badge{background:linear-gradient(135deg,#ffe600,#ff8800);color:#0a0e27;font-weight:bold;padding:8px 16px;border-radius:20px;display:inline-block;margin:8px 0;font-size:14px;box-shadow:0 0 20px rgba(255,230,0,0.5);}

/* Warp transition */
#warp-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;display:none;background:#0a0e27;align-items:center;justify-content:center;overflow:hidden;}
.warp-lines{position:absolute;width:100%;height:100%;}
.warp-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,#00f5ff,#fff,#00f5ff,transparent);left:0;animation:warp-fly 0.4s linear forwards;}
@keyframes warp-fly{0%{width:0;opacity:0;}50%{opacity:1;}100%{width:100%;opacity:0;}}

/* Confetti */
.confetti-piece{position:fixed;width:10px;height:10px;z-index:250;pointer-events:none;animation:confetti-fall linear forwards;}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* Shake */
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.shake{animation:shake 0.4s;}

/* Heavy shake for jump scare */
@keyframes heavy-shake{0%,100%{transform:translate(0)}10%{transform:translate(-12px,8px)}20%{transform:translate(12px,-8px)}30%{transform:translate(-10px,6px)}40%{transform:translate(10px,-6px)}50%{transform:translate(-8px,10px)}60%{transform:translate(8px,-10px)}70%{transform:translate(-6px,8px)}80%{transform:translate(6px,-8px)}90%{transform:translate(-4px,4px)}}
.heavy-shake{animation:heavy-shake 0.5s infinite;}

/* Emoji popup */
.emoji-popup{position:fixed;font-size:48px;z-index:150;pointer-events:none;animation:emoji-float 1.2s forwards;}
@keyframes emoji-float{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.3);}}

/* Scare overlay */
#scare-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:400;display:flex;align-items:center;justify-content:center;background:#000;opacity:0;pointer-events:none;transition:opacity 0.1s;}
#flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:350;background:#000;opacity:0;pointer-events:none;}
.scare-face{width:200px;height:280px;position:relative;margin:0 auto;}
.scare-face .head{width:200px;height:250px;background:radial-gradient(ellipse at 50% 40%,#e8d8c8,#8b6b5b 80%);border-radius:45% 45% 40% 40%;position:relative;filter:contrast(2.5) brightness(.2) sepia(.5);box-shadow:0 0 60px rgba(150,0,0,.5);}
.scare-face .eye{width:70px;height:80px;background:#000;border-radius:50%;position:absolute;top:50px;box-shadow:inset 0 0 20px #300,0 0 30px rgba(0,0,0,.5);}
.scare-face .eye.l{left:20px;}
.scare-face .eye.r{right:20px;}
.scare-face .eye::after{content:'';width:25px;height:25px;background:#ff0000;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 40px #f00;}
.scare-face .mouth{width:130px;height:100px;background:#000;border-radius:10px 10px 50% 50%;position:absolute;bottom:30px;left:50%;transform:translateX(-50%);box-shadow:inset 0 0 30px #200;}

/* Static flicker for hidden path */
.static-hint{position:absolute;width:36px;height:36px;cursor:pointer;z-index:15;border-radius:50%;animation:static-pulse 3s infinite;background:radial-gradient(circle,rgba(255,0,255,0.2) 0%,transparent 70%);}
@keyframes static-pulse{0%,100%{opacity:0;box-shadow:none;}40%{opacity:0;}50%{opacity:0.6;box-shadow:0 0 8px rgba(255,0,255,0.4);}60%{opacity:0;}85%{opacity:0.4;box-shadow:0 0 6px rgba(255,0,255,0.3);}90%{opacity:0;}}

/* Codebook recall button */

.recall-btn:hover{background:rgba(255,230,0,0.3);}
.recall-btn:disabled{opacity:0.3;pointer-events:none;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
::-webkit-scrollbar-thumb{background:#00f5ff;border-radius:3px;}
</style>
</head>
<body>
<div id="app">
<div class="stars"></div>

  <h1>우주 탐정 루나</h1>

        </div>
      </div>
    </div>

      <div class="dialog-speaker" id="dialog-speaker">루나</div>

<div id="scare-overlay"></div>
<div id="flash-overlay"></div>

<script>
(function(){
"use strict";

/* ===== SOLUTIONS DATA ===== */
var SOLUTIONS = [
  {stage:1,title:'로비 - 단서 찾기',hint:'책상, 화분, 보고서가 단서야. 다른 물건들은 함정!',answer:'책상(금고기록), 화분(앞치마실), 보고서(현장보고서)'},
  {stage:2,title:'카메라실 - CCTV 분석',hint:'금고 앞 카메라가 핵심. 새벽 시간대를 확인해봐',answer:'CAM-A (금고 앞) + 03:00 시간대'},
  {stage:3,title:'한 선장 방 - 암호 해독',hint:'베개와 사진을 먼저 확인해야 일기를 해독할 수 있어',answer:'박 셰프가 요즘 수상하다'},
  {stage:4,title:'식당 - 재료 분석',hint:'4가지 재료가 전부 일치하는 요리를 찾아. 비슷한 게 있으니 주의!',answer:'박 셰프의 특제 파이 (4가지 모두 일치)'},
  {stage:5,title:'화물칸 - 아이템 찾기',hint:'손전등으로 구석구석 비춰보자. 시간 제한 주의!',answer:'보석함 파편, 주방 세정제, 배송 명세서'},
  {stage:6,title:'\uC5F0\uAD6C\uC2E4 - \uC2DC\uC57D \uBC30\uD569',hint:'\uBA85\uC138\uC11C\uC758 \uADF8\uB9BC\uC744 \uD574\uC11D\uD574\uBD10: \u{1F525}=\uBD88, \u{2744}=\uC5BC\uC74C, \u{1F331}=\uC0DD\uBA85, \u{2B50}=\uBCC4',answer:'\u{1F525}Red - \u{2744}Blue - \u{1F331}Green - \u{2B50}Yellow'},
  {stage:7,title:'엔진실 - 배선 수리',hint:'매뉴얼을 기억해! 색이 아니라 이름으로 맞춰야 해',answer:'Red-Power, Blue-Cooling, Green-Life, Yellow-Comms, White-Backup'},
  {stage:8,title:'\uD1B5\uC2E0\uC2E4 - \uC2E0\uD638 \uD574\uB3C5',hint:'\uCF54\uB4DC\uBD81\uC774 \uC0AC\uB77C\uC9C0\uAE30 \uC804\uC5D0 \uC798 \uAE30\uC5B5\uD574\uB458! 4\uBC88\uC9F8 \uC2E0\uD638\uB294 \uD328\uD134\uC774 \uBC18\uB300\uC57C!',answer:'\uBCF4\uC11D + \uBC14\uC774\uC5B4 + \uC624\uB9AC\uC628 + \uC815\uAC70\uC7A5(\uBC18\uB300 \uD328\uD134)'},
  {stage:9,title:'전망대 - 최종 추리',hint:'모든 증거를 기억해. 범인, 정체, 장소, 이유 4가지!',answer:'박 셰프 = 전직 보석 도둑, 오리온 정거장, 비밀번호 입수'}
];

/* ===== AUDIO ENGINE ===== */
var AudioEngine = (function(){
  var ctx = null;
  var hiddenScream = null;
  function getCtx(){
    if(!ctx){try{ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    if(ctx && ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function tone(freq,type,dur,vol){
    var c=getCtx();if(!c)return;
    var o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);
    o.start(c.currentTime);o.stop(c.currentTime+dur);
  }
  function noise(dur,vol){
    var c=getCtx();if(!c)return;
    var bufSize=c.sampleRate*dur;
    var buf=c.createBuffer(1,bufSize,c.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*(vol||0.1);
    var src=c.createBufferSource();src.buffer=buf;
    var g=c.createGain();
    g.gain.setValueAtTime(vol||0.1,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    src.connect(g);g.connect(c.destination);
    src.start(c.currentTime);
  }
  return {
    click:function(){tone(800,'sine',0.05,0.1);},
    success:function(){
      var c=getCtx();if(!c)return;
      tone(523,'sine',0.2,0.12);
      setTimeout(function(){tone(659,'sine',0.2,0.12);},100);
      setTimeout(function(){tone(784,'sine',0.3,0.12);},200);
    },
    fail:function(){
      tone(392,'square',0.15,0.08);
      setTimeout(function(){tone(330,'square',0.15,0.08);},100);
      setTimeout(function(){tone(262,'square',0.2,0.08);},200);
    },
    warp:function(){
      var c=getCtx();if(!c)return;
      noise(0.8,0.08);
      var o=c.createOscillator(),g=c.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(200,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(2000,c.currentTime+0.6);
      g.gain.setValueAtTime(0.08,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.8);
      o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.8);
    },
    bonk:function(){
      tone(200,'triangle',0.15,0.15);noise(0.1,0.08);
    },
    timerTick:function(){tone(1000,'square',0.03,0.05);},
    timerUrgent:function(){tone(1500,'square',0.05,0.08);},
    confetti:function(){
      var notes=[523,554,587,622,659,698,740,784];
      for(var i=0;i<notes.length;i++){
        (function(n,d){setTimeout(function(){tone(n,'sine',0.15,0.08);},d);})(notes[i],i*60);
      }
      setTimeout(function(){noise(0.3,0.05);},500);
    },
    scream:function(){
      var c=getCtx();if(!c)return;
      var t=c.currentTime;
      var mkSweep=function(f1,f2,type,v,dur){
        var o=c.createOscillator(),g=c.createGain();
        o.type=type;o.frequency.setValueAtTime(f1,t);
        o.frequency.exponentialRampToValueAtTime(f2,t+0.01);
        o.frequency.setValueAtTime(f2,t+dur*0.3);
        o.frequency.exponentialRampToValueAtTime(f1*1.5,t+dur);
        g.gain.setValueAtTime(0.001,t);
        g.gain.exponentialRampToValueAtTime(v,t+0.01);
        g.gain.setValueAtTime(v*0.9,t+dur*0.5);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.connect(g);g.connect(c.destination);o.start();o.stop(t+dur);
      };
      mkSweep(200,2200,'sine',0.5,3);
      mkSweep(200,2207,'sine',0.4,3);
      mkSweep(150,1800,'sine',0.3,3);
      mkSweep(400,4400,'sawtooth',0.15,2.5);
      mkSweep(3000,6000,'square',0.2,2);
      mkSweep(3500,5500,'sawtooth',0.12,2);
      noise(3,0.15);
      tone(25,'square',3.5,0.4);
    },
    preloadHidden:function(){
      if(hiddenScream) return;
      var c=getCtx();if(!c) return;
      var xhr=new XMLHttpRequest();
      xhr.open('GET','hidden.mp3',true);
      xhr.responseType='arraybuffer';
      xhr.onload=function(){
        if(xhr.status===200){
          c.decodeAudioData(xhr.response,function(buf){hiddenScream=buf;},function(){});
        }
      };
      xhr.send();
    },
    playHiddenMP3:function(){
      var c=getCtx();if(!c||!hiddenScream) return;
      try{
        var src=c.createBufferSource();
        var g=c.createGain();
        src.buffer=hiddenScream;
        g.gain.value=0.9;
        src.connect(g);g.connect(c.destination);
        src.start(0);
      }catch(e){}
    }
  };
})();

/* ===== EFFECT SYSTEM ===== */
var EffectSystem = {
  shake:function(el){
    if(!el) el=document.getElementById('stage-content');
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
    setTimeout(function(){el.classList.remove('shake');},500);
  },
  emoji:function(e,x,y){
    var d=document.createElement('div');
    d.className='emoji-popup';d.textContent=e;
    d.style.left=(x||window.innerWidth/2-24)+'px';
    d.style.top=(y||window.innerHeight/2)+'px';
    document.body.appendChild(d);
    setTimeout(function(){d.remove();},1200);
  },
  warp:function(cb){
    var ov=document.getElementById('warp-overlay');
    var lines=document.getElementById('warp-lines');
    ov.style.display='flex';ov.style.opacity='1';ov.style.transition='none';lines.innerHTML='';
    AudioEngine.warp();
    for(var i=0;i<20;i++){
      var l=document.createElement('div');l.className='warp-line';
      l.style.top=Math.random()*100+'%';
      l.style.animationDelay=(Math.random()*0.3)+'s';
      lines.appendChild(l);
    }
    setTimeout(function(){
      ov.style.transition='opacity 0.4s ease-out';
      ov.style.opacity='0';
      setTimeout(function(){
        ov.style.display='none';ov.style.opacity='1';ov.style.transition='none';
        ov.style.background='#0a0e27';
        lines.innerHTML='';
        if(cb) cb();
      },400);
    },600);
  },
  confetti:function(){
    AudioEngine.confetti();
    var colors=['#00f5ff','#ff00ff','#39ff14','#ffe600','#ff4444','#4488ff'];
    for(var i=0;i<60;i++){
      (function(idx){
        setTimeout(function(){
          var p=document.createElement('div');p.className='confetti-piece';
          p.style.left=Math.random()*100+'%';
          p.style.background=colors[idx%colors.length];
          p.style.borderRadius=Math.random()>0.5?'50%':'0';
          p.style.width=(6+Math.random()*8)+'px';
          p.style.height=(6+Math.random()*8)+'px';
          p.style.animationDuration=(1.5+Math.random()*2)+'s';
          document.body.appendChild(p);
          setTimeout(function(){p.remove();},4000);
        },idx*30);
      })(i);
    }
  },
  jumpScare:function(cb){
    var flash=document.getElementById('flash-overlay');
    var scare=document.getElementById('scare-overlay');
    AudioEngine.scream();
    AudioEngine.playHiddenMP3();
    flash.style.transition='opacity 0.05s';
    flash.style.background='rgba(150,0,0,0.8)';
    flash.style.opacity='1';
    setTimeout(function(){
      scare.innerHTML='<div class="scare-face"><div class="head"><div class="eye l"></div><div class="eye r"></div><div class="mouth"></div></div></div>';
      scare.style.opacity='1';scare.style.pointerEvents='auto';
      document.body.classList.add('heavy-shake');
      setTimeout(function(){
        flash.style.background='#000';
        setTimeout(function(){
          flash.style.background='rgba(150,0,0,0.6)';
          setTimeout(function(){
            flash.style.background='#000';
            setTimeout(function(){
              document.body.classList.remove('heavy-shake');
              scare.style.opacity='0';
              flash.style.transition='opacity 1s';flash.style.opacity='0';
              setTimeout(function(){
                scare.innerHTML='';
                flash.style.background='#000';
                scare.style.pointerEvents='none';
                if(cb) cb();
              },1000);
            },300);
          },100);
        },100);
      },1200);
    },200);
  }
};

/* ===== UI MANAGER ===== */
var UIManager = {
  dialogQueue:[],
  dialogBusy:false,
  dialogResolve:null,
  typeTimer:null,

  showDialog:function(lines,cb){
    if(!Array.isArray(lines)) lines=[lines];
    this.dialogQueue=lines.slice();
    this.dialogResolve=cb||null;
    this._nextLine();
  },

  _nextLine:function(){
    if(this.dialogQueue.length===0){
      document.getElementById('dialog-box').style.display='none';
      this.dialogBusy=false;
      if(this.dialogResolve) this.dialogResolve();
      return;
    }
    this.dialogBusy=true;
    var line=this.dialogQueue.shift();
    var speaker=line.speaker||'\uB8E8\uB098';
    var text=line.text||line;
    if(typeof line==='string'){
      var m=line.match(/^\[(.+?)\]\s*(.*)$/);
      if(m){speaker=m[1];text=m[2];}else{text=line;}
    }
    document.getElementById('dialog-speaker').textContent=speaker;
    document.getElementById('dialog-content').textContent='';
    var avatarEl=document.querySelector('.dialog-avatar');
    if(speaker==='\uB8E8\uB098'){
      avatarEl.innerHTML='<div class="mini-helmet"><div class="mini-antenna"></div><div class="mini-face"><div class="mini-eye left"></div><div class="mini-eye right"></div></div></div>';
    }else if(speaker==='\uBC15 \uC170\uD504'){
      avatarEl.innerHTML='<div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#c05621,#9c4221);border:2px solid #39ff14;display:flex;align-items:center;justify-content:center;font-size:24px;">\u{1F468}\u200D\u{1F373}</div>';
    }else if(speaker==='\uC724 \uBC15\uC0AC'){
      avatarEl.innerHTML='<div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#553c9a,#44337a);border:2px solid #00f5ff;display:flex;align-items:center;justify-content:center;font-size:24px;">\u{1F468}\u200D\u{1F52C}</div>';
    }else if(speaker==='\uC758\uB8B0\uC778'){
      avatarEl.innerHTML='<div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#2d3748,#4a5568);border:2px solid #ffe600;display:flex;align-items:center;justify-content:center;font-size:24px;">\u{1F464}</div>';
    }else if(speaker==='???'){
      avatarEl.innerHTML='<div style="width:50px;height:50px;border-radius:50%;background:#000;border:2px solid #ff0000;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 10px rgba(255,0,0,0.5);">?</div>';
    }else{
      avatarEl.innerHTML='<div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#4a5568,#2d3748);border:2px solid #ffe600;display:flex;align-items:center;justify-content:center;font-size:24px;">\u{1F464}</div>';
    }
    document.getElementById('dialog-box').style.display='block';
    this._typeText=text;
    this._typeIdx=0;
    this._typeDone=false;
    var self=this;
    clearInterval(this.typeTimer);
    this.typeTimer=setInterval(function(){
      if(self._typeIdx<self._typeText.length){
        document.getElementById('dialog-content').textContent+=self._typeText[self._typeIdx];
        self._typeIdx++;
      }else{
        clearInterval(self.typeTimer);
        self._typeDone=true;
      }
    },30);
  },

  advanceDialog:function(){
    if(!this.dialogBusy) return;
    if(!this._typeDone){
      clearInterval(this.typeTimer);
      document.getElementById('dialog-content').textContent=this._typeText;
      this._typeDone=true;
    }else{
      this._nextLine();
    }
  },

  isBusy:function(){return this.dialogBusy;}
};

document.getElementById('dialog-box').addEventListener('click',function(e){
  e.stopPropagation();
  UIManager.advanceDialog();
});

/* ===== GAME ===== */
var Game = {
  stage:0,
  inventory:[],
  hintUsedStages:new Set(),
  hintTotal:0,
  hintMax:3,
  startTime:0,
  engineFails:0,
  totalWrong:0,
  momongaClues:0,
  _easterEggFound:false,
  _hiddenClicks:0,
  timers:[],
  timerIntervals:[],

  addItem:function(name,desc){
    for(var i=0;i<this.inventory.length;i++){
      if(this.inventory[i].name===name) return;
    }
    this.inventory.push({name:name,desc:desc});
    AudioEngine.success();
  },

  clearTimers:function(){
    for(var i=0;i<this.timers.length;i++) clearTimeout(this.timers[i]);
    for(var j=0;j<this.timerIntervals.length;j++) clearInterval(this.timerIntervals[j]);
    this.timers=[];this.timerIntervals=[];
  },

  start:function(){
    this.stage=0;this.inventory=[];this.hintUsedStages=new Set();
    this.hintTotal=0;this.momongaClues=0;this._easterEggFound=false;this._hiddenClicks=0;
    this._momonga3=false;this._momonga4=false;this._momonga5=false;this._momonga5b=false;this._momonga7=false;this._momonga8=false;
    this.startTime=Date.now();this.engineFails=0;this.totalWrong=0;
    updateHintButton();
    document.getElementById('title-screen').style.display='none';
    document.getElementById('game-screen').style.display='flex';
    trackEvent('game_start',{game:'\uC6B0\uC8FC\uD0D0\uC815\uB8E8\uB098'});
    this.goStage(1);
  },

  goStage:function(n){
    var self=this;
    this.clearTimers();
    if(n>1 && n<=10){
      EffectSystem.warp(function(){self._enterStage(n);});
    }else{
      this._enterStage(n);
    }
  },

  _enterStage:function(n){
    this.stage=n;
    document.getElementById('stage-label').textContent=n>=10?'':'Stage '+n;
    if(n>=1 && n<=10) trackEvent('stage_enter',{game:'\uC6B0\uC8FC\uD0D0\uC815\uB8E8\uB098',stage:n});
    var topBtns=document.getElementById('top-bar').querySelectorAll('.btn-small');
    for(var b=0;b<topBtns.length;b++){topBtns[b].style.display=n>=10?'none':'';}
    var sc=document.getElementById('stage-content');
    sc.innerHTML='';
    switch(n){
      case 1: this.stage1(); break;
      case 2: this.stage2(); break;
      case 3: this.stage3(); break;
      case 4: this.stage4(); break;
      case 5: this.stage5(); break;
      case 6: this.stage6(); break;
      case 7: this.stage7(); break;
      case 8: this.stage8(); break;
      case 9: this.stage9(); break;
      case 10: this.stage10(true); break;
      case 98: this.stageHiddenEnding(); break;
      case 99: this.stage10(false); break;
    }

  /* ---- STAGE 10 (ENDING) ---- */
  stage10:function(isWin){
    var self=this;
    var sc=document.getElementById('stage-content');
    var elapsed=Math.floor((Date.now()-this.startTime)/1000);
    var min=Math.floor(elapsed/60);
    var sec=elapsed%60;

    if(isWin){
      trackEvent('ending_reached',{game:'\uC6B0\uC8FC\uD0D0\uC815\uB8E8\uB098',ending:'correct',time:elapsed,hints:this.hintTotal});
      EffectSystem.confetti();
      var penalty=this.hintTotal+this.engineFails*2+this.totalWrong*0.5;
      var rank,rankTitle,rankColor;
      if(penalty===0){rank='S';rankTitle='\u2B50 \uC804\uC124\uC758 \uC6B0\uC8FC \uD0D0\uC815';rankColor='#ffe600';}
      else if(penalty<=2){rank='A';rankTitle='\u{1F50D} \uBCA0\uD14C\uB791 \uD0D0\uC815';rankColor='#00f5ff';}
      else if(penalty<=5){rank='B';rankTitle='\u{1F31F} \uC720\uB2A5\uD55C \uC218\uC2B5 \uD0D0\uC815';rankColor='#39ff14';}
      else if(penalty<=8){rank='C';rankTitle='\u{1F4AB} \uC11C\uD234\uB978 \uC2E0\uC785 \uD0D0\uC815';rankColor='#aa44ff';}
      else{rank='D';rankTitle='\u{1F300} \uC5C9\uB69D\uD55C \uBAA8\uD5D8\uAC00';rankColor='#ff4444';}

            '<p>\uD78C\uD2B8 \uC0AC\uC6A9: <span>'+this.hintTotal+'/'+this.hintMax+'\uD68C</span></p>'+
            '<p>\uC5D4\uC9C4 \uD3ED\uBC1C: <span>'+this.engineFails+'\uD68C</span></p>'+

            '<p>\uBC94\uC778 \uCF54\uB4DC\uB124\uC784: <span style="color:#ff00ff;">\uBAA8\uBABD\uAC00 \u2714</span></p>'+
          '</div>'+
          '<div style="text-align:center;margin:16px 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">'+
            '<button class="btn-neon" id="btn-replay" style="padding:12px 24px;font-size:16px;">\uB2E4\uC2DC \uD558\uAE30</button>'+

        '</div>';

      var rankMsg;
      if(rank==='S') rankMsg='\uC0AC\uAC74 \uD574\uACB0! \uC6B0\uC8FC \uCD5C\uACE0 \uD0D0\uC815 \uB8E8\uB098\uC758 \uC644\uBCBD\uD55C \uCD94\uB9AC! \u2728\u{1F389}';
      else if(rank==='A') rankMsg='\uC0AC\uAC74 \uD574\uACB0! \uAF64 \uAD1C\uCC2E\uC558\uC5B4! \u{1F60E}\u2728';
      else if(rank==='B') rankMsg='\uC0AC\uAC74 \uD574\uACB0! \uC880 \uD5E4\uB9F8\uC9C0\uB9CC \uACB0\uAD6D \uD574\uB0C8\uC5B4! \u{1F31F}';

      var endDialogs=[

        {speaker:'\uB8E8\uB098',text:'*\uC758\uAE30\uC591\uC591\uD558\uAC8C \uAC78\uC5B4\uAC00\uB2E4 \uB118\uC5B4\uC9D0* \uC73C\uC545! \u{1F635}'},

      ];
      endDialogs.push({speaker:'\uB8E8\uB098',text:'\uADF8\uB7F0\uB370... \uC774 \uC6B0\uC8FC \uC815\uAC70\uC7A5\uC5D0\uB294 \uC544\uC9C1 \uBC1D\uD600\uC9C0\uC9C0 \uC54A\uC740 \uBE44\uBC00\uC774 \uC788\uB294 \uAC83 \uAC19\uC544... \u{1F440}'});
      endDialogs.push({speaker:'\uB8E8\uB098',text:'\uC6A9\uC758\uC790 \uCE74\uB4DC \uAD6C\uC11D\uC5D0\uC11C \uBB54\uAC00 \uAE5C\uBE61\uC774\uB358 \uAC8C \uC2E0\uACBD \uC4F0\uC5EC... \u{1F914}'});

      UIManager.showDialog(endDialogs);
    }else{
      trackEvent('ending_reached',{game:'\uC6B0\uC8FC\uD0D0\uC815\uB8E8\uB098',ending:'giveup',time:elapsed});
      sc.innerHTML=
        '<div class="scene" style="overflow-y:auto;">'+
          '<div class="scene-title" style="color:#ff00ff;">&#x1F635; \uBBF8\uAD81 \uC18D\uC73C\uB85C...</div>'+
          '<div class="luna-avatar-big" style="margin:12px auto;">'+
            '<div class="luna-helmet"><div class="luna-antenna"></div><div class="luna-face"><div class="luna-eye left"></div><div class="luna-eye right"></div><div class="luna-mouth"></div></div></div>'+
          '</div>'+
          '<div style="text-align:center;color:#e0e0ff;padding:20px;font-size:16px;line-height:1.8;">'+
            '<p>\uB8E8\uB098 \uD0D0\uC815\uC774 \uBBF8\uAD81\uC5D0 \uBE60\uC84C\uC2B5\uB2C8\uB2E4...</p>'+
            '<p style="color:#ffe600;margin-top:8px;">"\uD639\uC2DC... \uBC94\uC778\uC774 \uB098?!" \u{1F631}</p>'+
            '<p style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:4px;">(\uC544\uB2D9\uB2C8\uB2E4)</p>'+
          '</div>'+
          '<div style="text-align:center;margin:16px 0;">'+
            '<button class="btn-neon" id="btn-replay" style="padding:12px 24px;font-size:16px;border-color:#ff00ff;color:#ff00ff;">\uC9C4\uC9DC\uB85C \uB2E4\uC2DC \uD558\uAE30</button>'+
          '</div>'+
        '</div>';

      UIManager.showDialog([
        {speaker:'\uB8E8\uB098',text:'\uC73C\uC73C... \uBA38\uB9AC\uAC00 \uBCF5\uC7A1\uD574... \u{1F635}'},
        {speaker:'\uB8E8\uB098',text:'\uD639\uC2DC... \uBC94\uC778\uC774 \uB098\uC778\uAC00?! \u{1F631}'},
        {speaker:'\uC758\uB8B0\uC778',text:'\uD0D0\uC815\uB2D8... \uC544\uB2D9\uB2C8\uB2E4...'}

    sc.addEventListener('click',function(e){

      textEl.style.opacity='1';
    },500);
    setTimeout(function(){
      textEl.style.opacity='0';

      textEl.textContent='\uB2F9\uC2E0\uC740 \uB108\uBB34 \uAE4A\uC774 \uB4E4\uC5B4\uC654\uB2E4';

                '<button class="btn-neon" id="btn-replay" style="padding:12px 24px;font-size:16px;border-color:#ff0000;color:#ff0000;">\uB2E4\uC2DC \uD558\uAE30</button>'+
              '</div>'+
            '</div>';
          sc.addEventListener('click',function(e){

    },5500);
  }

/* ===== HINT BUTTON UPDATE ===== */
function updateHintButton(){
  var btn=document.getElementById('btn-hint');
  var remaining=Game.hintMax-Game.hintTotal;
  btn.innerHTML='&#x1F4A1; \uD78C\uD2B8('+remaining+')';
  if(remaining<=0){
    btn.classList.add('disabled');
  }else{
    btn.classList.remove('disabled');
  }
}

/* ===== MODAL HANDLERS ===== */
function openInventory(){
  var list=document.getElementById('inv-list');
  if(Game.inventory.length===0){
    list.innerHTML='<div class="inv-empty">\uC544\uC9C1 \uC99D\uAC70\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4</div>';
  }else{
    var h='';
    for(var i=0;i<Game.inventory.length;i++){
      h+='<div class="inv-item" data-idx="'+i+'">'+Game.inventory[i].name+'</div>';
    }
    list.innerHTML=h;
  }
  document.getElementById('inv-modal').style.display='flex';
}
document.getElementById('inv-list').addEventListener('click',function(e){
  var item=e.target.closest('.inv-item');if(!item) return;
  var idx=parseInt(item.getAttribute('data-idx'));
  var inv=Game.inventory[idx];if(!inv) return;
  document.getElementById('item-popup-title').textContent=inv.name;
  document.getElementById('item-popup-desc').innerHTML=inv.desc;
  document.getElementById('item-popup').style.display='flex';
});

function openSolutions(){
  var h='';
  for(var i=0;i<SOLUTIONS.length;i++){
    var s=SOLUTIONS[i];
    h+='<div class="sol-item"><div class="sol-title">Stage '+s.stage+': '+s.title+'</div>'+
      '<div class="sol-hint">\u{1F4A1} '+s.hint+'</div>'+
      '<button class="sol-reveal" data-answer="'+s.answer+'">&#x1F50D; \uC815\uB2F5 \uBCF4\uAE30</button>'+
      '<div class="sol-answer" id="sol-ans-'+i+'"></div></div>';
  }
  document.getElementById('sol-list').innerHTML=h;
  document.getElementById('sol-modal').style.display='flex';
}
document.getElementById('sol-list').addEventListener('click',function(e){
  var btn=e.target.closest('.sol-reveal');if(!btn) return;
  AudioEngine.click();
  var ans=btn.getAttribute('data-answer');
  var ansDiv=btn.nextElementSibling;
  ansDiv.textContent='\u2705 '+ans;
  ansDiv.style.display='block';
  btn.style.display='none';
});

function openHint(){
  var stage=Game.stage;
  if(stage<1||stage>9){
    document.getElementById('hint-text').textContent='\uD604\uC7AC \uC2A4\uD14C\uC774\uC9C0\uC5D0\uB294 \uD78C\uD2B8\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.';
    document.getElementById('hint-modal').style.display='flex';
    return;
  }
  if(Game.hintTotal>=Game.hintMax){
    document.getElementById('hint-text').textContent='\uD78C\uD2B8\uB97C \uBAA8\uB450 \uC0AC\uC6A9\uD588\uC2B5\uB2C8\uB2E4! ('+Game.hintMax+'/'+Game.hintMax+')';
    document.getElementById('hint-modal').style.display='flex';
    return;
  }
  if(!Game.hintUsedStages.has(stage)){
    Game.hintUsedStages.add(stage);
    Game.hintTotal++;
    trackEvent('hint_used',{game:'\uC6B0\uC8FC\uD0D0\uC815\uB8E8\uB098',stage:stage});
    updateHintButton();
  }
  document.getElementById('hint-text').textContent=SOLUTIONS[stage-1].hint;
  document.getElementById('hint-modal').style.display='flex';
}

document.getElementById('btn-inv').addEventListener('click',function(){AudioEngine.click();openInventory();});
document.getElementById('btn-hint').addEventListener('click',function(){AudioEngine.click();openHint();});
document.getElementById('btn-sol').addEventListener('click',function(){AudioEngine.click();openSolutions();});
document.getElementById('inv-close').addEventListener('click',function(){document.getElementById('inv-modal').style.display='none';});
document.getElementById('sol-close').addEventListener('click',function(){document.getElementById('sol-modal').style.display='none';});
document.getElementById('hint-close').addEventListener('click',function(){document.getElementById('hint-modal').style.display='none';});
document.getElementById('item-close').addEventListener('click',function(){document.getElementById('item-popup').style.display='none';});

document.getElementById('inv-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
document.getElementById('sol-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
document.getElementById('hint-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
document.getElementById('item-popup').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

/* ===== START ===== */
document.getElementById('btn-start').addEventListener('click',function(){
  AudioEngine.click();
  AudioEngine.preloadHidden();
  Game.start();
