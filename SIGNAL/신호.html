<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>신호 (SIGNAL)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#0a0a0f;color:#d0d0d0;user-select:none;}
input,textarea{user-select:text;}
#app{width:100%;height:100%;position:relative;overflow:hidden;transition:background 1.5s,color 1s;}

/* ===== ATMOSPHERE SYSTEM ===== */
:root{
  --atmo-bg:#0a0a0f;
  --atmo-accent:#5588aa;
  --atmo-glow:rgba(85,136,170,0.3);
  --atmo-text:#d0d0d0;
  --atmo-danger:#ff0000;
}
.atmo-calm{--atmo-bg:#0a0e1a;--atmo-accent:#6699bb;--atmo-glow:rgba(100,153,187,0.2);--atmo-text:#c8d8e8;}
.atmo-uneasy{--atmo-bg:#0d0d12;--atmo-accent:#667788;--atmo-glow:rgba(80,80,100,0.3);--atmo-text:#a0a0b0;}
.atmo-dread{--atmo-bg:#120808;--atmo-accent:#aa4444;--atmo-glow:rgba(170,68,68,0.3);--atmo-text:#d0b0b0;}
.atmo-horror{--atmo-bg:#080000;--atmo-accent:#cc0000;--atmo-glow:rgba(200,0,0,0.4);--atmo-text:#ff9999;}
.atmo-despair{--atmo-bg:#0a0000;--atmo-accent:#ff2222;--atmo-glow:rgba(255,0,0,0.5);--atmo-text:#ff6666;}

#app{background:var(--atmo-bg);color:var(--atmo-text);}

/* Ambient flicker for uneasy+ */
.atmo-uneasy #stage-content,.atmo-dread #stage-content,.atmo-horror #stage-content{animation:ambient-flicker 8s infinite;}
@keyframes ambient-flicker{0%,95%,100%{opacity:1;}96%{opacity:0.92;}97%{opacity:1;}98%{opacity:0.95;}}

/* Red pulse for dread+ */
.atmo-dread::after,.atmo-horror::after,.atmo-despair::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;animation:red-pulse 4s infinite;background:radial-gradient(ellipse at center,transparent 60%,var(--atmo-glow) 100%);}
.atmo-dread::after{animation-duration:5s;}
.atmo-horror::after{animation-duration:3s;}
.atmo-despair::after{animation-duration:1.5s;}
@keyframes red-pulse{0%,100%{opacity:0.3;}50%{opacity:0.7;}}

/* Heartbeat for despair */
.atmo-despair #stage-content{animation:heartbeat 1.2s infinite;}
@keyframes heartbeat{0%{transform:scale(1);}15%{transform:scale(1.01);}30%{transform:scale(1);}45%{transform:scale(1.008);}60%,100%{transform:scale(1);}}

/* ===== TITLE SCREEN ===== */
#title-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:20px;background:#0a0a0f;}
#title-screen h1{font-family:'Special Elite',monospace;font-size:clamp(36px,9vw,72px);color:#ff2222;text-shadow:0 0 20px rgba(255,0,0,0.5),0 0 60px rgba(255,0,0,0.2);letter-spacing:8px;animation:title-glitch 5s infinite;}
@keyframes title-glitch{0%,92%,94%,96%,100%{transform:translate(0);opacity:1;}93%{transform:translate(-3px,1px);opacity:0.8;}95%{transform:translate(2px,-1px);opacity:0.9;}}
.title-sub{font-size:14px;color:#667;letter-spacing:4px;text-transform:uppercase;}
.title-warn{color:#ff4444;font-size:12px;opacity:0.6;margin-top:8px;}
.btn-signal{padding:16px 48px;font-size:18px;font-weight:bold;border:1px solid #ff2222;background:rgba(255,0,0,0.08);color:#ff4444;border-radius:2px;cursor:pointer;transition:all 0.3s;font-family:'Special Elite',monospace;letter-spacing:4px;text-transform:uppercase;min-height:44px;}
.btn-signal:hover,.btn-signal:active{background:rgba(255,0,0,0.2);box-shadow:0 0 30px rgba(255,0,0,0.3);text-shadow:0 0 10px #ff4444;}
.playthrough-notice{color:#ff6600;font-size:13px;display:none;}

/* ===== GAME UI ===== */
#game-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;z-index:5;}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,0.8);border-bottom:1px solid rgba(255,255,255,0.1);z-index:20;flex-shrink:0;}
#top-bar .stage-label{color:var(--atmo-accent);font-size:14px;font-weight:bold;font-family:'Special Elite',monospace;letter-spacing:2px;}
#top-bar .btn-small{padding:6px 14px;font-size:12px;border:1px solid;border-radius:4px;background:rgba(0,0,0,0.5);cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.btn-hint{color:#ffaa00;border-color:#ffaa00;}
.btn-hint:hover{background:rgba(255,170,0,0.15);}
.btn-hint.disabled{opacity:0.3;pointer-events:none;}
.btn-inv{color:#44aaff;border-color:#44aaff;}
.btn-inv:hover{background:rgba(68,170,255,0.15);}
.btn-sol{color:#aa44ff;border-color:#aa44ff;}
.btn-sol:hover{background:rgba(170,68,255,0.15);}
.btn-alien{color:#00ff88;border-color:#00ff88;animation:alien-glitch 3s infinite;}
.btn-alien:hover{background:rgba(0,255,136,0.15);}
#stage-content{flex:1;overflow:hidden;position:relative;z-index:5;}

/* ===== DIALOG ===== */
#dialog-box{position:fixed;bottom:0;left:0;width:100%;z-index:100;display:none;padding:8px;}
#dialog-inner{background:rgba(5,5,10,0.95);border:1px solid var(--atmo-accent);border-radius:8px 8px 2px 2px;padding:12px 16px;box-shadow:0 0 20px var(--atmo-glow);max-width:600px;margin:0 auto;}
.dialog-speaker{font-weight:bold;color:var(--atmo-accent);font-size:13px;margin-bottom:4px;font-family:'Special Elite',monospace;}
.dialog-content{font-size:15px;line-height:1.6;color:var(--atmo-text);min-height:40px;}
.dialog-click-hint{font-size:11px;color:rgba(255,255,255,0.25);text-align:right;margin-top:4px;}

/* ===== ALIEN TEXT ===== */
.alien-text{font-family:'Special Elite',monospace;color:#00ff88;text-shadow:0 0 8px rgba(0,255,136,0.5);animation:alien-glitch 3s infinite;letter-spacing:2px;}
@keyframes alien-glitch{0%,90%,94%,100%{opacity:1;transform:none;}91%{opacity:0.7;transform:translateX(-2px);}93%{opacity:0.8;transform:translateX(1px);}95%{opacity:0.9;}}
.alien-translated{color:#ff4444;text-shadow:0 0 8px rgba(255,0,0,0.5);font-weight:bold;}

/* ===== MODALS ===== */
#inv-modal,#sol-modal,#hint-modal,#item-popup,#alien-modal,#hidden-item-popup,#hidden-guide-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#0a0a12;border:1px solid var(--atmo-accent);border-radius:8px;padding:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 0 30px var(--atmo-glow);}
.modal-box h2{color:var(--atmo-accent);text-align:center;margin-bottom:16px;font-size:18px;font-family:'Special Elite',monospace;}
.modal-close{position:absolute;top:10px;right:14px;font-size:24px;color:#ff4444;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;background:none;border:none;}
.inv-item{padding:10px 14px;margin:6px 0;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:4px;cursor:pointer;font-size:14px;color:#c0c0c0;transition:background 0.2s;}
.inv-item:hover{background:rgba(255,255,255,0.08);}
.inv-empty{text-align:center;color:rgba(255,255,255,0.3);padding:20px;}
.sol-item{padding:12px;margin:8px 0;background:rgba(170,68,255,0.05);border:1px solid rgba(170,68,255,0.15);border-radius:4px;}
.sol-title{color:#aa44ff;font-weight:bold;font-size:14px;margin-bottom:4px;}
.sol-hint{color:#ffaa00;font-size:13px;margin-bottom:4px;}
.sol-reveal{padding:8px 16px;margin-top:6px;background:rgba(170,68,255,0.1);border:1px solid #aa44ff;color:#aa44ff;border-radius:4px;cursor:pointer;font-size:13px;min-height:44px;}
.sol-answer{color:#44ff44;font-size:13px;margin-top:6px;display:none;}
.hint-text{color:#ffaa00;font-size:16px;text-align:center;padding:20px;line-height:1.6;}

/* ===== SCENE ===== */
.scene{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:12px;position:relative;overflow-y:auto;}
.scene-title{color:var(--atmo-accent);font-size:18px;font-weight:bold;margin:8px 0;font-family:'Special Elite',monospace;letter-spacing:2px;text-shadow:0 0 10px var(--atmo-glow);}
.scene-desc{color:var(--atmo-text);font-size:13px;text-align:center;margin-bottom:12px;opacity:0.7;}
.scene-room{position:relative;width:100%;max-width:500px;flex:1;min-height:200px;border:1px solid rgba(255,255,255,0.08);border-radius:4px;background:rgba(0,0,0,0.4);overflow:hidden;}

/* Placeholder stage content */
.placeholder-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 20px;text-align:center;min-height:200px;}
.placeholder-box .puzzle-name{color:var(--atmo-accent);font-size:16px;font-weight:bold;border:1px dashed var(--atmo-accent);padding:12px 24px;border-radius:4px;opacity:0.6;}
.placeholder-box .puzzle-note{color:rgba(255,255,255,0.3);font-size:12px;}
.btn-next{padding:14px 36px;font-size:16px;border:1px solid var(--atmo-accent);background:rgba(255,255,255,0.05);color:var(--atmo-accent);border-radius:4px;cursor:pointer;transition:all 0.3s;font-family:'Special Elite',monospace;letter-spacing:2px;min-height:44px;margin-top:20px;}
.btn-next:hover{background:rgba(255,255,255,0.1);box-shadow:0 0 20px var(--atmo-glow);}

/* Timer */
.timer-wrap{position:absolute;top:8px;right:8px;z-index:30;}
.timer-wrap svg{width:60px;height:60px;}
.timer-text{font-size:16px;font-weight:bold;fill:#ff4444;font-family:'Special Elite',monospace;}

/* Choices */
.choices{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px;margin:8px auto;padding:0 12px;}
.choice-btn{padding:12px 16px;border:1px solid var(--atmo-accent);background:rgba(255,255,255,0.03);color:var(--atmo-text);border-radius:4px;cursor:pointer;font-size:14px;text-align:left;transition:all 0.2s;min-height:44px;}
.choice-btn:hover{background:rgba(255,255,255,0.08);box-shadow:0 0 15px var(--atmo-glow);}

/* ===== TRANSITION ===== */
#warp-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;display:none;background:#000;align-items:center;justify-content:center;overflow:hidden;}
.warp-static{position:absolute;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.03) 2px,rgba(255,255,255,0.03) 4px);animation:static-scroll 0.1s linear infinite;}
@keyframes static-scroll{0%{transform:translateY(0);}100%{transform:translateY(4px);}}

/* ===== SCARE ===== */
#scare-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:400;display:flex;align-items:center;justify-content:center;background:#000;opacity:0;pointer-events:none;transition:opacity 0.05s;}
#flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:350;background:#000;opacity:0;pointer-events:none;}
#static-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:250;pointer-events:none;opacity:0;transition:opacity 0.2s;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");}

/* Glitch effect */
@keyframes glitch-1{0%{clip-path:inset(40% 0 61% 0);}20%{clip-path:inset(92% 0 1% 0);}40%{clip-path:inset(43% 0 1% 0);}60%{clip-path:inset(25% 0 58% 0);}80%{clip-path:inset(54% 0 7% 0);}100%{clip-path:inset(58% 0 43% 0);}}
@keyframes glitch-2{0%{clip-path:inset(65% 0 13% 0);}20%{clip-path:inset(14% 0 72% 0);}40%{clip-path:inset(80% 0 5% 0);}60%{clip-path:inset(36% 0 52% 0);}80%{clip-path:inset(2% 0 89% 0);}100%{clip-path:inset(67% 0 22% 0);}}
.glitch-active::before,.glitch-active::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;background:inherit;}
.glitch-active::before{animation:glitch-1 0.3s infinite;color:#ff0000;left:2px;}
.glitch-active::after{animation:glitch-2 0.3s infinite;color:#0000ff;left:-2px;}

/* Heavy shake */
@keyframes heavy-shake{0%,100%{transform:translate(0);}10%{transform:translate(-12px,8px);}20%{transform:translate(12px,-8px);}30%{transform:translate(-10px,6px);}40%{transform:translate(10px,-6px);}50%{transform:translate(-8px,10px);}60%{transform:translate(8px,-10px);}70%{transform:translate(-6px,8px);}80%{transform:translate(6px,-8px);}90%{transform:translate(-4px,4px);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.shake{animation:shake 0.4s;}
.heavy-shake{animation:heavy-shake 0.5s infinite;}

/* News ticker */
.news-ticker{position:fixed;top:0;left:0;width:100%;background:rgba(200,0,0,0.9);color:#fff;font-size:14px;font-weight:bold;padding:8px 0;z-index:150;overflow:hidden;display:none;}
.news-ticker-text{white-space:nowrap;animation:ticker-scroll 15s linear infinite;}
@keyframes ticker-scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}

/* 히든 아이템 아이콘 (화면 우측 하단 고정) */
.hidden-item-icon{position:fixed;bottom:80px;right:16px;width:44px;height:44px;cursor:pointer;z-index:999;border-radius:50%;background:radial-gradient(circle,rgba(0,255,136,0.6) 0%,rgba(0,255,136,0.1) 70%);font-size:22px;color:#00ff88;display:flex;align-items:center;justify-content:center;animation:alien-glitch 3s infinite;box-shadow:0 0 12px rgba(0,255,136,0.4);}

/* B엔딩 공포 연출 */
@keyframes horror-shake{0%,100%{transform:translate(0) scale(1);}10%{transform:translate(-20px,15px) scale(1.02);}20%{transform:translate(18px,-12px) scale(0.98);}30%{transform:translate(-15px,10px) scale(1.01);}40%{transform:translate(15px,-15px) scale(0.99);}50%{transform:translate(-12px,18px) scale(1.03);}60%{transform:translate(12px,-10px) scale(0.97);}70%{transform:translate(-10px,12px) scale(1.01);}80%{transform:translate(10px,-12px) scale(0.99);}90%{transform:translate(-8px,8px) scale(1.02);}}
.horror-shake{animation:horror-shake 0.3s infinite;}
@keyframes face-distort{0%{filter:contrast(2) brightness(0.8);}25%{filter:contrast(3) brightness(1.2) hue-rotate(30deg);}50%{filter:contrast(2.5) brightness(0.5) invert(1);}75%{filter:contrast(4) brightness(0.9) hue-rotate(-20deg);}100%{filter:contrast(2) brightness(0.8);}}
@keyframes face-jitter{0%{transform:translate(0) skewX(0);}10%{transform:translate(-3px,2px) skewX(2deg);}20%{transform:translate(4px,-1px) skewX(-1deg);}30%{transform:translate(-2px,3px) skewX(3deg);}40%{transform:translate(3px,-3px) skewX(-2deg);}50%{transform:translate(-4px,1px) skewX(1deg);}60%{transform:translate(2px,-2px) skewX(-3deg);}70%{transform:translate(-1px,4px) skewX(2deg);}80%{transform:translate(3px,-1px) skewX(-1deg);}90%{transform:translate(-2px,2px) skewX(1deg);}100%{transform:translate(0) skewX(0);}}
#horror-face-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:none;background:#000;overflow:hidden;}
#horror-face-container .scanlines{position:absolute;top:0;left:0;width:100%;height:200%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.3) 2px,rgba(0,0,0,0.3) 4px);animation:scanline-scroll 0.5s linear infinite;pointer-events:none;z-index:3;}
@keyframes scanline-scroll{0%{transform:translateY(0);}100%{transform:translateY(-50%);}}
@keyframes code-float{0%{transform:translate(0,0) rotate(0deg);opacity:0.6;}25%{transform:translate(30px,-20px) rotate(2deg);opacity:0.4;}50%{transform:translate(-20px,-40px) rotate(-1deg);opacity:0.7;}75%{transform:translate(10px,-60px) rotate(3deg);opacity:0.3;}100%{transform:translate(-10px,-80px) rotate(-2deg);opacity:0;}}
@keyframes ui-collapse{0%{transform:translate(0) scale(1);filter:none;}30%{transform:translate(20px,10px) scale(1.1);filter:hue-rotate(90deg);}60%{transform:translate(-30px,40px) scale(0.8);filter:invert(1) hue-rotate(180deg);}100%{transform:translate(50px,80px) scale(0.3);filter:hue-rotate(270deg);opacity:0;}}
@keyframes cursor-blink{0%,100%{opacity:1;}50%{opacity:0;}}
.meta-cursor{animation:cursor-blink 0.8s infinite;color:#0f0;}
.title-glitch-d{animation:title-glitch 0.5s infinite!important;}

/* Ending styles */
.ending-box{text-align:center;padding:30px 20px;}
.ending-title{font-family:'Special Elite',monospace;font-size:clamp(24px,6vw,40px);margin-bottom:20px;letter-spacing:4px;}
.ending-text{font-size:15px;line-height:1.8;max-width:500px;margin:0 auto 20px;color:var(--atmo-text);}
.stats-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:16px;margin:16px auto;max-width:300px;text-align:center;}
.stats-box p{margin:6px 0;font-size:14px;}
.stats-box span{color:var(--atmo-accent);font-weight:bold;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
::-webkit-scrollbar-thumb{background:var(--atmo-accent);border-radius:2px;}

/* Translation reveal animation */
@keyframes reveal-translate{0%{opacity:0;transform:translateY(5px);filter:blur(4px);}100%{opacity:1;transform:translateY(0);filter:blur(0);}}
.reveal-anim{animation:reveal-translate 0.8s forwards;}

/* ===== STAGE 1: RADIO ===== */
.radio-body{background:linear-gradient(145deg,#1a1a2a,#0d0d18);border:2px solid rgba(100,153,187,0.3);border-radius:12px;padding:20px;max-width:360px;width:100%;margin:0 auto;box-shadow:0 0 30px rgba(100,153,187,0.1);}
.radio-display{background:#000;border:1px solid rgba(100,153,187,0.4);border-radius:6px;padding:12px;text-align:center;margin-bottom:16px;font-family:'Special Elite',monospace;}
.radio-freq{font-size:clamp(28px,7vw,36px);color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,0.5);letter-spacing:2px;}
.radio-label{font-size:11px;color:#556;margin-top:4px;}
.signal-bar-wrap{height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin:8px 0;}
.signal-bar-fill{height:100%;background:linear-gradient(90deg,#ff4444,#ffaa00,#00ff88);border-radius:4px;transition:width 0.15s;width:0;}
.signal-status{text-align:center;font-size:12px;color:#556;margin-bottom:12px;min-height:18px;}
.dial-area{display:flex;align-items:center;justify-content:center;gap:12px;margin:16px 0;}
.dial-circle{width:100px;height:100px;border-radius:50%;border:3px solid rgba(100,153,187,0.4);background:radial-gradient(circle,#1a1a2e,#0a0a18);position:relative;cursor:pointer;touch-action:none;transition:box-shadow 0.2s;}
.dial-circle:active{box-shadow:0 0 20px rgba(100,153,187,0.3);}
.dial-indicator{position:absolute;top:8px;left:50%;width:3px;height:20px;background:#00ff88;border-radius:2px;transform-origin:bottom center;transform:translateX(-50%);box-shadow:0 0 6px rgba(0,255,136,0.5);}
.dial-btn{width:48px;height:48px;border-radius:50%;border:1px solid rgba(100,153,187,0.4);background:rgba(255,255,255,0.05);color:var(--atmo-accent);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;min-height:44px;min-width:44px;}
.dial-btn:hover,.dial-btn:active{background:rgba(255,255,255,0.12);}
.radio-narrative{text-align:center;font-size:14px;color:var(--atmo-text);margin-top:16px;line-height:1.6;min-height:40px;opacity:0.8;}

/* ===== STAGE 2: ANTENNA ===== */
.antenna-parts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
.antenna-part{background:rgba(255,255,255,0.04);border:1px solid rgba(100,153,187,0.3);border-radius:8px;padding:14px;width:clamp(90px,25vw,110px);text-align:center;cursor:pointer;transition:all 0.2s;min-height:44px;}
.antenna-part:hover,.antenna-part:active{background:rgba(100,153,187,0.1);border-color:rgba(100,153,187,0.6);transform:translateY(-2px);}
.antenna-part.used{opacity:0.3;pointer-events:none;border-style:dashed;}
.antenna-part-icon{font-size:28px;margin-bottom:6px;}
.antenna-part-name{font-size:12px;color:var(--atmo-accent);font-weight:bold;}
.antenna-part-desc{font-size:10px;color:#667;margin-top:4px;line-height:1.3;}
.antenna-slots{display:flex;gap:8px;justify-content:center;align-items:center;margin:20px 0;}
.antenna-slot{width:clamp(80px,22vw,100px);height:60px;border:2px dashed rgba(100,153,187,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#445;transition:all 0.3s;background:rgba(0,0,0,0.3);}
.antenna-slot.filled{border-style:solid;border-color:#00ff88;background:rgba(0,255,136,0.05);color:#00ff88;}
.antenna-arrow{color:var(--atmo-accent);font-size:20px;font-weight:bold;text-shadow:0 0 4px var(--atmo-glow);}
.antenna-reset{padding:10px 24px;font-size:13px;border:1px solid rgba(255,100,100,0.3);background:rgba(255,0,0,0.05);color:#ff6666;border-radius:4px;cursor:pointer;transition:all 0.2s;min-height:44px;margin-top:8px;}
.antenna-reset:hover{background:rgba(255,0,0,0.12);}
.antenna-narrative{text-align:center;font-size:14px;color:var(--atmo-text);margin-top:16px;line-height:1.6;min-height:40px;opacity:0.8;}
@keyframes antenna-glow{0%{box-shadow:0 0 10px rgba(0,255,136,0.2);}50%{box-shadow:0 0 30px rgba(0,255,136,0.5);}100%{box-shadow:0 0 10px rgba(0,255,136,0.2);}}

/* ===== STAGE 3: WIRING ===== */
.wire-panel{max-width:400px;width:100%;margin:0 auto;}
.wire-hint{background:rgba(255,255,255,0.03);border:1px solid rgba(102,119,136,0.3);border-radius:8px;padding:12px;margin-bottom:16px;font-family:'Special Elite',monospace;font-size:13px;color:#889;line-height:1.8;}
.wire-hint .faded{color:#334;text-decoration:line-through;font-style:italic;}
.wire-hint .visible{color:#aab;}
.wire-area{display:flex;justify-content:space-between;align-items:center;gap:8px;position:relative;padding:0 10px;}
.wire-col{display:flex;flex-direction:column;gap:12px;z-index:2;}
.wire-node{width:52px;height:52px;border-radius:50%;border:2px solid rgba(102,119,136,0.4);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-family:'Special Elite',monospace;font-size:18px;font-weight:bold;color:#889;cursor:pointer;transition:all 0.2s;min-height:44px;min-width:44px;}
.wire-node:hover,.wire-node:active{border-color:var(--atmo-accent);color:var(--atmo-accent);}
.wire-node.selected{border-color:#ffaa00;color:#ffaa00;box-shadow:0 0 12px rgba(255,170,0,0.4);}
.wire-node.connected{border-color:#00ff88;color:#00ff88;opacity:0.6;pointer-events:none;}
.wire-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
.wire-connections{display:flex;flex-direction:column;gap:6px;margin:12px 0;font-size:13px;color:#667;text-align:center;}
.wire-conn-item{color:#aab;}
@keyframes spark-flash{0%{opacity:1;background:rgba(255,200,0,0.8);}100%{opacity:0;background:rgba(255,100,0,0);}}

/* ===== STAGE 4: LAB ===== */
.keypad-wrap{max-width:320px;width:100%;margin:0 auto;}
.hint-panel{background:rgba(255,255,255,0.03);border:1px solid rgba(102,119,136,0.3);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#889;line-height:1.6;}
.hint-panel .element{display:inline-block;border:1px solid rgba(255,68,68,0.4);border-radius:4px;padding:2px 8px;margin:0 4px;color:#ff6666;font-family:'Special Elite',monospace;}
.hint-panel .graffiti{color:#556;font-style:italic;font-size:11px;margin-top:6px;}
.keypad-display{background:#000;border:1px solid rgba(102,119,136,0.4);border-radius:6px;padding:12px;text-align:center;font-family:'Special Elite',monospace;font-size:28px;color:#00ff88;letter-spacing:8px;margin-bottom:12px;min-height:52px;}
.keypad-display.error{color:#ff4444;animation:shake 0.3s;}
.keypad-display.locked{color:#ff4444;font-size:14px;letter-spacing:1px;}
.keypad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.keypad-btn{padding:14px;font-size:18px;border:1px solid rgba(102,119,136,0.3);background:rgba(255,255,255,0.04);color:#aab;border-radius:6px;cursor:pointer;transition:all 0.15s;min-height:48px;font-family:'Special Elite',monospace;}
.keypad-btn:hover,.keypad-btn:active{background:rgba(255,255,255,0.1);border-color:var(--atmo-accent);}
.keypad-btn.fn{color:#ff6666;border-color:rgba(255,100,100,0.3);}
.keypad-btn.fn.confirm{color:#00ff88;border-color:rgba(0,255,136,0.3);}
.keypad-row-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}

.micro-wrap{max-width:360px;width:100%;margin:0 auto;}
.micro-scope{background:radial-gradient(circle,#0a1a0a,#000);border:2px solid rgba(0,255,136,0.2);border-radius:50%;width:clamp(140px,40vw,180px);height:clamp(140px,40vw,180px);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,255,136,0.1);}
.micro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.micro-dot{width:clamp(24px,6vw,32px);height:clamp(24px,6vw,32px);border-radius:50%;transition:background 0.2s;}
.micro-dot.on{background:rgba(0,255,136,0.8);box-shadow:0 0 8px rgba(0,255,136,0.5);}
.micro-dot.off{background:rgba(255,255,255,0.08);}
.micro-timer-wrap{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin:8px 0;}
.micro-timer-bar{height:100%;background:linear-gradient(90deg,#00ff88,#ffaa00,#ff4444);border-radius:3px;transition:width 0.3s linear;}
.micro-options{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0;}
.micro-option{background:rgba(255,255,255,0.03);border:1px solid rgba(102,119,136,0.3);border-radius:8px;padding:10px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:44px;}
.micro-option:hover,.micro-option:active{background:rgba(0,255,136,0.05);border-color:rgba(0,255,136,0.3);}
.micro-option .micro-label{font-size:12px;color:#889;font-family:'Special Elite',monospace;}
.micro-option .micro-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.micro-mini-dot{width:14px;height:14px;border-radius:50%;}
.micro-mini-dot.on{background:rgba(0,255,136,0.7);}
.micro-mini-dot.off{background:rgba(255,255,255,0.08);}
.micro-round{display:flex;gap:8px;justify-content:center;margin:8px 0;}
.micro-round-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,255,136,0.3);background:rgba(0,0,0,0.3);}
.micro-round-dot.done{background:rgba(0,255,136,0.6);}

/* Debug skip & jump — game-screen 기준 고정 */
.debug-skip{position:fixed;bottom:8px;left:8px;width:30px;height:30px;opacity:0;cursor:pointer;z-index:999;}
.debug-jump{position:fixed;top:50px;left:8px;width:30px;height:30px;opacity:0;cursor:pointer;z-index:999;}
#debug-jump-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.debug-jump-box{background:#0a0a12;border:1px solid #444;border-radius:8px;padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;}
.debug-jump-box h3{color:#aaa;text-align:center;margin-bottom:12px;font-size:14px;}
.debug-jump-list{display:flex;flex-direction:column;gap:6px;}
.debug-jump-btn{padding:10px 14px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);color:#aab;border-radius:4px;cursor:pointer;font-size:13px;text-align:left;transition:all 0.2s;min-height:38px;}
.debug-jump-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3);}
.debug-jump-close{margin-top:12px;padding:8px 16px;border:1px solid #555;background:none;color:#888;border-radius:4px;cursor:pointer;font-size:12px;width:100%;}

/* ===== GAME OVER ===== */
.gameover{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;padding:20px;gap:20px;}
.gameover-text{max-width:400px;text-align:center;font-size:18px;color:#ff2222;font-family:'Special Elite',monospace;letter-spacing:2px;line-height:1.6;min-height:40px;}
.gameover-sub{font-size:13px;color:#553333;margin-top:8px;}
.gameover-choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:16px;}
.gameover-choices button{padding:12px 28px;font-size:14px;border:1px solid;border-radius:4px;background:rgba(0,0,0,0.8);cursor:pointer;min-height:44px;font-family:'Special Elite',monospace;transition:all 0.2s;}
.gameover-choices .go-retry{color:#ffaa00;border-color:#ffaa00;}
.gameover-choices .go-retry:hover{background:rgba(255,170,0,0.15);}
.gameover-choices .go-restart{color:#ff4444;border-color:#ff4444;}
.gameover-choices .go-restart:hover{background:rgba(255,0,0,0.15);}
@keyframes typing-blink{0%,100%{border-color:#ff2222;}50%{border-color:transparent;}}

/* ===== STAGE 7: CHEMISTRY ===== */
.chem-wrap{max-width:380px;width:100%;margin:0 auto;}
.chem-hint{background:rgba(255,255,255,0.03);border:1px solid rgba(170,68,68,0.3);border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:#998;line-height:1.5;}
.chem-reagents{display:flex;flex-direction:column;gap:10px;margin:12px 0;}
.chem-row{display:flex;align-items:center;gap:8px;}
.chem-row label{font-size:14px;font-weight:bold;min-width:60px;color:var(--atmo-accent);font-family:'Special Elite',monospace;}
.chem-row .chem-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(170,68,68,0.4);background:rgba(0,0,0,0.5);color:var(--atmo-text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:44px;min-width:44px;transition:background 0.2s;}
.chem-row .chem-btn:hover,.chem-row .chem-btn:active{background:rgba(170,68,68,0.2);}
.chem-row .chem-val{font-size:20px;font-family:'Special Elite',monospace;color:var(--atmo-text);min-width:30px;text-align:center;}
.chem-beaker{width:100px;height:120px;border:2px solid rgba(255,255,255,0.2);border-top:none;border-radius:0 0 16px 16px;margin:12px auto;position:relative;overflow:hidden;background:rgba(0,0,0,0.3);}
.chem-liquid{position:absolute;bottom:0;width:100%;transition:height 0.3s,background 0.3s;border-radius:0 0 14px 14px;}

/* ===== STAGE 8: HOSPITAL ===== */
.hospital-map{max-width:400px;width:100%;margin:0 auto;}
.hospital-rooms{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.hospital-room{padding:14px 8px;border:1px solid rgba(200,0,0,0.3);background:rgba(0,0,0,0.5);border-radius:6px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:13px;color:#cc9999;min-height:44px;display:flex;align-items:center;justify-content:center;}
.hospital-room:hover,.hospital-room:active{background:rgba(200,0,0,0.1);border-color:rgba(200,0,0,0.6);}
.hospital-room.visited{opacity:0.5;border-style:dashed;}
.hospital-room.wide{grid-column:span 2;}
.hospital-basement{padding:14px;border:2px solid rgba(255,0,0,0.4);background:rgba(30,0,0,0.6);border-radius:6px;text-align:center;cursor:pointer;font-size:14px;color:#ff6666;margin-top:8px;min-height:44px;transition:all 0.2s;}
.hospital-basement:hover{background:rgba(60,0,0,0.6);}
.hospital-basement.locked{opacity:0.4;cursor:default;}
.hospital-clues{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:8px;margin:8px 0;font-size:12px;color:#776;min-height:40px;}

/* ===== STAGE 9: ALIEN BASE ===== */
.alien-base-wrap{max-width:400px;width:100%;margin:0 auto;}
.floor-indicator{display:flex;gap:8px;justify-content:center;margin:8px 0;}
.floor-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(170,68,255,0.4);display:flex;align-items:center;justify-content:center;font-size:11px;color:#776;font-family:'Special Elite',monospace;}
.floor-dot.active{border-color:#aa44ff;color:#aa44ff;box-shadow:0 0 8px rgba(170,68,255,0.4);}
.floor-dot.done{border-color:#00ff88;color:#00ff88;background:rgba(0,255,136,0.1);}
.alien-symbol{display:inline-block;font-size:24px;margin:0 6px;padding:4px 10px;border:1px solid rgba(170,68,255,0.3);border-radius:4px;background:rgba(0,0,0,0.5);font-family:'Special Elite',monospace;color:#aa44ff;}
.simon-row{display:flex;gap:10px;justify-content:center;margin:16px 0;}
.simon-btn{width:clamp(50px,14vw,64px);height:clamp(50px,14vw,64px);border-radius:12px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.15s;min-height:44px;min-width:44px;}
.simon-btn.lit{transform:scale(1.1);box-shadow:0 0 20px currentColor;}
.simon-btn:active{transform:scale(0.95);}
.memo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:clamp(120px,30vw,150px);margin:0 auto;}
.memo-cell{aspect-ratio:1;border:1px solid rgba(170,68,255,0.3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(0,0,0,0.5);}
.memo-option{cursor:pointer;padding:8px;border:1px solid rgba(170,68,255,0.2);border-radius:8px;transition:all 0.2s;min-height:44px;}
.memo-option:hover,.memo-option:active{border-color:rgba(170,68,255,0.6);background:rgba(170,68,255,0.05);}
.memo-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}

/* ===== CUTSCENE ===== */
.cutscene{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;padding:20px;position:relative;}
.cutscene-text{max-width:500px;text-align:center;font-size:16px;line-height:1.8;color:#d0d0d8;opacity:0;transition:opacity 0.5s;min-height:60px;}
.cutscene-text.visible{opacity:1;}
.cutscene-narrator{font-size:14px;color:#889;font-style:italic;}
.cutscene-speech{font-size:16px;color:#d0d0d8;}
.cutscene-hint{position:absolute;bottom:16px;right:16px;font-size:11px;color:rgba(255,255,255,0.2);}

/* ===== STAGE 5: WAVEFORM ===== */
.wave-wrap{max-width:400px;width:100%;margin:0 auto;}
.wave-canvas{width:100%;height:150px;background:#000;border:1px solid rgba(102,119,136,0.3);border-radius:6px;margin-bottom:12px;}
.wave-slider-wrap{display:flex;flex-direction:column;gap:10px;margin:8px 0;}
.wave-slider-row{display:flex;align-items:center;gap:8px;}
.wave-slider-row label{font-size:12px;color:#889;min-width:50px;text-align:right;}
.wave-slider-row input[type=range]{flex:1;accent-color:var(--atmo-accent);height:20px;min-height:44px;}
.wave-slider-row .wave-val{font-size:12px;color:var(--atmo-accent);min-width:45px;font-family:'Special Elite',monospace;}
.wave-status{text-align:center;font-size:13px;color:#667;margin:8px 0;min-height:20px;}

/* ===== STAGE 6: GLYPHS ===== */
.glyph-hint{background:rgba(255,255,255,0.03);border:1px solid rgba(170,68,68,0.3);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#998;line-height:1.6;text-align:center;font-style:italic;}
.glyph-row{display:flex;gap:6px;justify-content:center;flex-wrap:nowrap;margin:16px 0;}
.glyph-circle{width:clamp(64px,16vw,80px);height:clamp(64px,16vw,80px);border-radius:50%;border:2px solid rgba(170,68,68,0.4);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.3s,border-color 0.3s;min-height:44px;min-width:44px;position:relative;}
.glyph-circle:hover,.glyph-circle:active{border-color:rgba(170,68,68,0.8);}
.glyph-circle.correct{border-color:#00ff88;box-shadow:0 0 12px rgba(0,255,136,0.3);}
.glyph-arrow{font-size:clamp(28px,7vw,36px);color:var(--atmo-accent);transition:transform 0.3s;}
.glyph-num{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:10px;color:#556;font-family:'Special Elite',monospace;}
</style>
</head>
<body>
<div id="app">

<div id="title-screen">
  <div class="title-sub">INCOMING TRANSMISSION</div>
  <h1>신호</h1>
  <div class="title-sub">SIGNAL</div>
  <div class="title-warn">🎧 헤드폰 착용을 권장합니다 | 깜짝 놀람 요소 포함</div>
  <div class="playthrough-notice" id="playthrough-notice">⚠ 2회차 — 숨겨진 무언가가 있습니다</div>
  <button class="btn-signal" id="btn-start">RECEIVE</button>
  <button class="btn-signal" id="btn-hidden-guide" style="display:none;padding:8px 20px;font-size:12px;color:#00ff88;border-color:#00ff88;margin-top:8px;">★ 히든 가이드</button>
</div>

<div id="game-screen">
  <div id="top-bar">
    <span class="stage-label" id="stage-label">Stage 1</span>
    <div style="display:flex;gap:6px;">
      <button class="btn-small btn-hint" id="btn-hint">💡 힌트(3)</button>
      <button class="btn-small btn-inv" id="btn-inv">📦 수집품</button>
      <button class="btn-small btn-sol" id="btn-sol" style="display:none;">📖 해설</button>
      <button class="btn-small btn-alien" id="btn-alien" style="display:none;">👽 ???</button>
    </div>
  </div>
  <div id="stage-content"></div>
</div>

<div id="dialog-box">
  <div id="dialog-inner">
    <div class="dialog-speaker" id="dialog-speaker">???</div>
    <div class="dialog-content" id="dialog-content"></div>
    <div class="dialog-click-hint">▶ click / space</div>
  </div>
</div>

<div id="inv-modal">
  <div class="modal-box">
    <button class="modal-close" id="inv-close">&times;</button>
    <h2>📦 수집품</h2>
    <div id="inv-list"></div>
  </div>
</div>

<div id="hint-modal">
  <div class="modal-box">
    <button class="modal-close" id="hint-close">&times;</button>
    <h2>💡 힌트</h2>
    <div class="hint-text" id="hint-text"></div>
  </div>
</div>

<div id="sol-modal">
  <div class="modal-box">
    <button class="modal-close" id="sol-close">&times;</button>
    <h2>📖 해설</h2>
    <div id="sol-list"></div>
  </div>
</div>

<div id="item-popup">
  <div class="modal-box" style="max-width:360px;">
    <button class="modal-close" id="item-close">&times;</button>
    <h2 id="item-popup-title"></h2>
    <p id="item-popup-desc" style="color:#c0c0c0;font-size:14px;line-height:1.6;text-align:center;padding:10px;"></p>
  </div>
</div>

<div id="alien-modal">
  <div class="modal-box" style="max-width:400px;border-color:#00ff88;">
    <button class="modal-close" id="alien-close">&times;</button>
    <h2 style="color:#00ff88;">👽 외계 수집품</h2>
    <div id="alien-list" style="padding:8px;"></div>
  </div>
</div>

<div id="hidden-item-popup">
  <div class="modal-box" style="max-width:320px;border-color:#00ff88;text-align:center;">
    <button class="modal-close" id="hidden-item-close">&times;</button>
    <div style="font-size:28px;margin-bottom:8px;">★</div>
    <div style="color:#00ff88;font-size:16px;font-weight:bold;">히든 아이템을 얻었다!</div>
    <div id="hidden-item-popup-name" style="color:#fff;font-size:18px;margin:12px 0;"></div>
    <button class="btn-signal" id="hidden-item-ok" style="padding:8px 24px;font-size:14px;">확인</button>
  </div>
</div>

<div id="hidden-guide-modal">
  <div class="modal-box" style="max-width:400px;border-color:#00ff88;">
    <button class="modal-close" id="hidden-guide-close">&times;</button>
    <h2 style="color:#00ff88;">★ 히든 아이템 가이드</h2>
    <div id="hidden-guide-list" style="padding:8px;"></div>
  </div>
</div>

<div id="warp-overlay"><div class="warp-static"></div></div>

/* ===== AUDIO ENGINE ===== */
var AudioEngine = (function(){
  var ctx=null;
  var bgmSource=null;
  var bgmGain=null;

  function getCtx(){
    if(!ctx){try{ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    if(ctx&&ctx.state==='suspended')ctx.resume();
    return ctx;
  }

  function tone(freq,type,dur,vol){
    var c=getCtx();if(!c)return;
    var o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);
    o.start(c.currentTime);o.stop(c.currentTime+dur);
  }

  function noise(dur,vol){
    var c=getCtx();if(!c)return;
    var bufSize=c.sampleRate*dur;
    var buf=c.createBuffer(1,bufSize,c.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*(vol||0.1);
    var src=c.createBufferSource();src.buffer=buf;
    var g=c.createGain();
    g.gain.setValueAtTime(vol||0.1,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    src.connect(g);g.connect(c.destination);src.start(c.currentTime);
    src.stop(c.currentTime+dur);
  }

      var o1=c.createOscillator(),g1=c.createGain();o1.type='square';o1.frequency.setValueAtTime(2500,t);o1.frequency.exponentialRampToValueAtTime(4000,t+0.5);o1.frequency.exponentialRampToValueAtTime(2800,t+1);g1.gain.setValueAtTime(0.2,t);g1.gain.setValueAtTime(0.25,t+0.3);g1.gain.exponentialRampToValueAtTime(0.001,t+1);o1.connect(g1);g1.connect(c.destination);o1.start(t);o1.stop(t+1);

      var o3=c.createOscillator(),g3=c.createGain();o3.type='square';o3.frequency.setValueAtTime(150,t);o3.frequency.exponentialRampToValueAtTime(600,t+1.5);g3.gain.setValueAtTime(0.06,t);g3.gain.exponentialRampToValueAtTime(0.001,t+1.5);o3.connect(g3);g3.connect(c.destination);o3.start(t);o3.stop(t+1.5);

      var o1=c.createOscillator(),g1=c.createGain();o1.type='sine';o1.frequency.value=30;g1.gain.setValueAtTime(0.35,t);g1.gain.exponentialRampToValueAtTime(0.001,t+1);o1.connect(g1);g1.connect(c.destination);o1.start(t);o1.stop(t+1);

    },
    scare6:function(){/* 엔딩B: 최고 공포. 극악. 5초 */
      var c=getCtx();if(!c)return;var t=c.currentTime;var D=5;
      var o1=c.createOscillator(),g1=c.createGain();o1.type='sine';o1.frequency.setValueAtTime(20,t);o1.frequency.exponentialRampToValueAtTime(8000,t+2.5);o1.frequency.exponentialRampToValueAtTime(100,t+D);g1.gain.setValueAtTime(0.4,t);g1.gain.setValueAtTime(0.5,t+1.5);g1.gain.exponentialRampToValueAtTime(0.001,t+D);o1.connect(g1);g1.connect(c.destination);o1.start(t);o1.stop(t+D);
      var o2=c.createOscillator(),g2=c.createGain();o2.type='square';o2.frequency.setValueAtTime(2000,t+0.2);o2.frequency.exponentialRampToValueAtTime(5000,t+1);o2.frequency.setValueAtTime(4000,t+2);o2.frequency.exponentialRampToValueAtTime(6000,t+4);g2.gain.setValueAtTime(0.3,t+0.2);g2.gain.setValueAtTime(0.4,t+2);g2.gain.exponentialRampToValueAtTime(0.001,t+D);o2.connect(g2);g2.connect(c.destination);o2.start(t+0.2);o2.stop(t+D);
      var o3=c.createOscillator(),g3=c.createGain();o3.type='sawtooth';o3.frequency.setValueAtTime(25,t);o3.frequency.linearRampToValueAtTime(15,t+D);g3.gain.setValueAtTime(0.35,t);g3.gain.exponentialRampToValueAtTime(0.001,t+D);o3.connect(g3);g3.connect(c.destination);o3.start(t);o3.stop(t+D);
      [317,503,797,1103].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.12,t+0.5+i*0.3);g.gain.exponentialRampToValueAtTime(0.001,t+D);o.connect(g);g.connect(c.destination);o.start(t+0.5+i*0.3);o.stop(t+D);});
      var o5=c.createOscillator(),g5=c.createGain();o5.type='sawtooth';o5.frequency.setValueAtTime(1200,t+1);o5.frequency.linearRampToValueAtTime(3000,t+2);o5.frequency.setValueAtTime(2500,t+3);o5.frequency.linearRampToValueAtTime(4500,t+4.5);g5.gain.setValueAtTime(0.2,t+1);g5.gain.setValueAtTime(0.35,t+3);g5.gain.exponentialRampToValueAtTime(0.001,t+D);o5.connect(g5);g5.connect(c.destination);o5.start(t+1);o5.stop(t+D);

    scareUltimate:function(){
      var c=getCtx();if(!c)return;var t=c.currentTime;var D=5;
      /* 기존 scare6 핵심 레이어들 */
      var o1=c.createOscillator(),g1=c.createGain();o1.type='sine';o1.frequency.setValueAtTime(20,t);o1.frequency.exponentialRampToValueAtTime(8000,t+2);o1.frequency.exponentialRampToValueAtTime(100,t+D);g1.gain.setValueAtTime(0.5,t);g1.gain.setValueAtTime(0.6,t+1);g1.gain.exponentialRampToValueAtTime(0.001,t+D);o1.connect(g1);g1.connect(c.destination);o1.start(t);o1.stop(t+D);

      var o3=c.createOscillator(),g3=c.createGain();o3.type='sawtooth';o3.frequency.setValueAtTime(25,t);o3.frequency.linearRampToValueAtTime(12,t+D);g3.gain.setValueAtTime(0.4,t);g3.gain.exponentialRampToValueAtTime(0.001,t+D);o3.connect(g3);g3.connect(c.destination);o3.start(t);o3.stop(t+D);

      console.log('[CUTSCENE] showLine idx='+idx+'/'+scenes.length);
      if(idx>=scenes.length){console.log('[CUTSCENE] done');cb();return;}
      var line=scenes[idx];
      busy=true;
      textEl.classList.remove('visible');
      textEl.innerHTML=''; // 즉시 비워서 겹침 방지

      // 효과 실행
      if(line.effect){
        if(line.effect==='screenFlicker')EffectSystem.screenFlicker(3);
        else if(line.effect==='glitchScreen')EffectSystem.glitchScreen(400);
        else if(line.effect==='redPulse')EffectSystem.redPulse();
        else if(line.effect==='alienSignal')AudioEngine.alienSignal();
        else if(line.effect==='newsTicker')EffectSystem.showNewsTicker('전국 각지에서 원인불명의 수질 오염 확산... 당국 원인 파악 중. 수돗물 음용 자제 권고.');
      }

      setTimeout(function(){
        if(line.narrator){
          textEl.innerHTML='<div class="cutscene-narrator">'+line.narrator+'</div>';
        }else{
          textEl.innerHTML='<div class="cutscene-speech">"'+line.text+'"</div>';
        }
        textEl.classList.add('visible');
        busy=false;
      },350);
    }

    var canAdvance=false;
    function advance(){
      if(busy||!canAdvance)return;
      idx++;
      showLine();
    }

    var wrap=overlay;
    var keyHandler=function(e){
      if(e.code==='Space'){e.preventDefault();advance();}
    };

    // 첫 줄 표시 후 이벤트 바인딩 딜레이 (이전 이벤트 버블링 방지)
    showLine();
    setTimeout(function(){
      canAdvance=true;
      wrap.addEventListener('click',function(){advance();});
      document.addEventListener('keydown',keyHandler);
    },600);
  }
};

var PlaythroughManager = {
  KEY:'signal_game_data',

  _load:function(){
    try{return JSON.parse(localStorage.getItem(this.KEY))||{};}catch(e){return {};}
  },
  _save:function(data){
    try{localStorage.setItem(this.KEY,JSON.stringify(data));}catch(e){}
  },
  getCount:function(){return this._load().clearCount||0;},
  markCleared:function(ending){
    var d=this._load();
    d.clearCount=(d.clearCount||0)+1;
    if(!d.endings)d.endings=[];
    if(d.endings.indexOf(ending)===-1)d.endings.push(ending);
    this._save(d);
  },
  isSecondPlay:function(){return this.getCount()>=1;},
  getCollectedAlienItems:function(){return this._load().alienItems||[];},
  addAlienItem:function(itemId){
    var d=this._load();
    if(!d.alienItems)d.alienItems=[];

    this._save(d);
  },
  getEndings:function(){return this._load().endings||[];},
  reset:function(){try{localStorage.removeItem(this.KEY);}catch(e){}}
};

/* ===== UI MANAGER ===== */
var UIManager = {
  dialogQueue:[],
  dialogBusy:false,
  dialogResolve:null,
  typeTimer:null,

  showDialog:function(lines,cb){
    if(!Array.isArray(lines))lines=[lines];
    this.dialogQueue=lines.slice();
    this.dialogResolve=cb||null;
    this._nextLine();
  },

  _nextLine:function(){
    if(this.dialogQueue.length===0){
      document.getElementById('dialog-box').style.display='none';
      this.dialogBusy=false;
      if(this.dialogResolve)this.dialogResolve();
      return;
    }
    this.dialogBusy=true;
    var line=this.dialogQueue.shift();
    var speaker=line.speaker||'???';
    var text=line.text||line;
    var isHtml=line.isAlien||text.indexOf('<')!==-1;
    if(typeof line==='string'){
      var m=line.match(/^\[(.+?)\]\s*(.*)$/);
      if(m){speaker=m[1];text=m[2];}else{text=line;}
    }
    document.getElementById('dialog-speaker').textContent=speaker;
    var contentEl=document.getElementById('dialog-content');
    contentEl.innerHTML='';
    document.getElementById('dialog-box').style.display='block';

    if(isHtml){
      contentEl.innerHTML=text;
      this._typeDone=true;
      this._typeText='';
    }else{
      this._typeText=text;
      this._typeIdx=0;
      this._typeDone=false;
      var self=this;
      clearInterval(this.typeTimer);
      this.typeTimer=setInterval(function(){
        if(self._typeIdx<self._typeText.length){
          contentEl.textContent+=self._typeText[self._typeIdx];
          self._typeIdx++;
        }else{
          clearInterval(self.typeTimer);
          self._typeDone=true;
        }
      },30);
    }
  },

  advanceDialog:function(){
    if(!this.dialogBusy)return;
    if(!this._typeDone){
      clearInterval(this.typeTimer);
      var contentEl=document.getElementById('dialog-content');
      if(this._typeText)contentEl.textContent=this._typeText;
      this._typeDone=true;
    }else{
      this._nextLine();
    }
  },

  isBusy:function(){return this.dialogBusy;}
};

document.getElementById('dialog-box').addEventListener('click',function(e){
  e.stopPropagation();UIManager.advanceDialog();
});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'&&UIManager.isBusy()&&!CutsceneManager.active){e.preventDefault();UIManager.advanceDialog();}
});

    function doEnter(){

        EffectSystem.warpTransition(function(){self._enterStage(n);});
      }else{
        self._enterStage(n);
      }
    }

    // 컷신 체크: n-1 스테이지 클리어 후 컷신이 있으면 먼저 재생
    var cutsceneKey=n-1;
    if(cutsceneKey>=1&&CutsceneManager.SCENES[cutsceneKey]){
      CutsceneManager.play(cutsceneKey,doEnter);
    }else{
      doEnter();
    }
  },

  _enterStage:function(n){
    this.stage=n;
    this.stageFails=0;
    var label=n<=12?'Stage '+n:'';
    document.getElementById('stage-label').textContent=label;
    EffectSystem.atmosphereShift(STAGE_ATMOSPHERES[n]||'');

    var topBtns=document.getElementById('top-bar').querySelectorAll('.btn-small');
    var is2nd=PlaythroughManager.isSecondPlay();
    for(var b=0;b<topBtns.length;b++){
      var tb=topBtns[b];
      if(n>=11){tb.style.display='none';}
      else if(tb.id==='btn-sol'){tb.style.display=is2nd?'':'none';}
      else if(tb.id==='btn-alien'){tb.style.display=(is2nd&&PlaythroughManager.getCollectedAlienItems().length>0)?'':'none';}
      else{tb.style.display='';}
    }

    // 이전 스테이지의 이벤트 리스너 완전 제거 (cloneNode)
    var oldSc=document.getElementById('stage-content');
    var sc=oldSc.cloneNode(false);
    oldSc.parentNode.replaceChild(sc,oldSc);
    var self2=this;

    switch(n){
      case 1:this.stage1();break;
      case 2:this.stage2();break;
      case 3:this.stage3();break;
      case 4:this.stage4();break;
      case 5:this.stage5();break;
      case 6:this.stage6();break;
      case 7:this.stage7();break;
      case 8:this.stage8();break;
      case 9:this.stage9();break;
      case 10:this.stage10();break;
      case 11:this.stage11();break;
      case 12:this.stage12();break;
      default:this._placeholderStage(n);break;
    }

    // 디버그 버튼은 game-screen에 고정 (_initDebug)
  },

  /* ===== STAGE 1 — 자택 서재: 라디오 주파수 맞추기 ===== */
  stage1:function(){
    var self=this;
    var sc=document.getElementById('stage-content');
    var freq=94.0; // 시작 주파수
    var TARGET=87.5;
    var solved=false;
    var noiseNode=null;var noiseGain=null;var sigNodes=[];
    var audioCtx=null;

    // 라디오 오디오 제거 — 시각적 피드백만 사용
    function startRadioAudio(){}
    function updateRadioAudio(){}
    function stopRadioAudio(){}

    function updateDisplay(){
      var freqEl=document.getElementById('s1-freq');
      var barEl=document.getElementById('s1-signal-bar');
      var statusEl=document.getElementById('s1-status');
      var narrativeEl=document.getElementById('s1-narrative');
      if(!freqEl)return;
      freqEl.textContent=freq.toFixed(1)+' MHz';
      var dist=Math.abs(freq-TARGET);
      var strength=Math.max(0,Math.min(100,((14-dist)/14)*100));
      barEl.style.width=strength+'%';

      if(dist<=0.05){
        statusEl.textContent='▶▶▶ 이거다! 신호가 또렷하게 잡혔어!';statusEl.style.color='#00ff88';
        freqEl.style.textShadow='0 0 20px rgba(0,255,136,0.8)';
      }else if(dist<=0.2){
        statusEl.textContent='▶▶ 신호가 선명해지고 있어!';statusEl.style.color='#88ff88';
        freqEl.style.textShadow='0 0 10px rgba(0,255,136,0.5)';
      }else if(dist<=0.5){
        statusEl.textContent='▶ 신호 감지! 뭔가 들린다...';statusEl.style.color='#ffaa00';
        freqEl.style.textShadow='';
      }else if(dist<=2){
        statusEl.textContent='...뭔가 들리는 것 같은데?';statusEl.style.color='#667';
        freqEl.style.textShadow='';
      }else{
        statusEl.textContent='잡음만 들린다...';statusEl.style.color='#445';
        freqEl.style.textShadow='';
      }

      // 다이얼 회전 각도
      var angle=((freq-80)/(108-80))*300-150;
      var indicator=document.getElementById('s1-dial-indicator');
      if(indicator)indicator.style.transform='translateX(-50%) rotate('+angle+'deg)';

      updateRadioAudio();
    }

    function setFreq(f){
      if(solved)return;
      freq=Math.round(Math.max(80,Math.min(108,f))*10)/10;
      updateDisplay();
    }

    function trySubmit(){
      if(solved)return;
      var dist=Math.abs(freq-TARGET);
      if(freq>=87.4&&freq<=87.6){
        solved=true;trackEvent('stage_clear',{stage:1});
        stopRadioAudio();
        AudioEngine.success();
        var narrativeEl=document.getElementById('s1-narrative');
        if(narrativeEl)narrativeEl.textContent='';
        setTimeout(function(){
          UIManager.showDialog([
            {speaker:'윤',text:'이 시간에 이런 주파수가...?'}
          ],function(){
            AlienLang.showAlien('msg1',function(){
              UIManager.showDialog([
                {speaker:'윤',text:'뭐지 이건...'}
              ],function(){
                setTimeout(function(){self.goStage(2);},600);
              });
            });
          });
        },400);
      }else{
        self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
        AudioEngine.fail();
        EffectSystem.shake();
        var narrativeEl=document.getElementById('s1-narrative');
        if(narrativeEl){
          narrativeEl.textContent='이 주파수에는 아무것도 없다...';
          narrativeEl.style.color='#ff6666';
          setTimeout(function(){narrativeEl.style.color='';narrativeEl.textContent='다이얼을 돌려 주파수를 맞춰보자.';},1500);
        }
      }
    }

    sc.innerHTML=
      '<div class="scene" style="justify-content:center;">'+
        '<div class="scene-title">Stage 1: 자택 서재</div>'+
        '<div class="scene-desc" style="max-width:360px;">늦은 밤, 서재가 조용하다. 책상 위 오래된 라디오에서 희미한 잡음이 들린다.</div>'+
        '<div class="radio-body">'+
          '<div class="radio-display">'+
            '<div class="radio-freq" id="s1-freq">94.0 MHz</div>'+
            '<div class="radio-label">FREQUENCY</div>'+
          '</div>'+
          '<div class="signal-bar-wrap"><div class="signal-bar-fill" id="s1-signal-bar"></div></div>'+
          '<div class="signal-status" id="s1-status">잡음만 들린다...</div>'+
          '<div class="dial-area">'+
            '<button class="dial-btn" id="s1-minus">−</button>'+
            '<div class="dial-circle" id="s1-dial"><div class="dial-indicator" id="s1-dial-indicator"></div></div>'+
            '<button class="dial-btn" id="s1-plus">+</button>'+
          '</div>'+
          '<button class="btn-next" id="s1-submit" style="margin-top:12px;width:100%;">📻 수신</button>'+
        '</div>'+
        '<div class="radio-narrative" id="s1-narrative">다이얼을 돌려 주파수를 맞춰보자.</div>'+
      '</div>';

    updateDisplay();

    // 오디오 시작 (유저 인터랙션 후)
    var audioStarted=false;
    function ensureAudio(){if(!audioStarted){audioStarted=true;startRadioAudio();updateRadioAudio();}}

    // +/- 버튼
    sc.addEventListener('click',function(e){
      if(UIManager.isBusy())return;
      ensureAudio();
      if(e.target.id==='s1-minus'||e.target.closest('#s1-minus')){AudioEngine.click();setFreq(freq-0.1);}
      if(e.target.id==='s1-plus'||e.target.closest('#s1-plus')){AudioEngine.click();setFreq(freq+0.1);}
      if(e.target.id==='s1-submit'||e.target.closest('#s1-submit')){AudioEngine.click();trySubmit();}
    });

    // 다이얼 드래그
    var dial=document.getElementById('s1-dial');
    var dragging=false;var lastAngle=0;

    function getAngle(e,rect){
      var cx=rect.left+rect.width/2;
      var cy=rect.top+rect.height/2;
      var clientX=e.touches?e.touches[0].clientX:e.clientX;
      var clientY=e.touches?e.touches[0].clientY:e.clientY;
      return Math.atan2(clientY-cy,clientX-cx)*180/Math.PI;
    }

    function onStart(e){
      if(solved||UIManager.isBusy())return;
      ensureAudio();
      dragging=true;
      var rect=dial.getBoundingClientRect();
      lastAngle=getAngle(e,rect);
      e.preventDefault();
    }
    function onMove(e){
      if(!dragging)return;
      var rect=dial.getBoundingClientRect();
      var angle=getAngle(e,rect);
      var delta=angle-lastAngle;
      if(delta>180)delta-=360;
      if(delta<-180)delta+=360;
      lastAngle=angle;
      // 회전 2도당 0.1MHz
      var freqDelta=delta/4*0.1;
      setFreq(freq+freqDelta);
      e.preventDefault();
    }
    function onEnd(){dragging=false;}

    dial.addEventListener('mousedown',onStart);
    dial.addEventListener('touchstart',onStart,{passive:false});
    document.addEventListener('mousemove',onMove);
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('mouseup',onEnd);
    document.addEventListener('touchend',onEnd);

    // 스테이지 떠날 때 오디오 정리
    self._stageCleanup=function(){
      stopRadioAudio();
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('mouseup',onEnd);
      document.removeEventListener('touchend',onEnd);
    };

    // 입장 대사
    UIManager.showDialog([
      {speaker:'윤',text:'늦은 밤... 서재에 홀로 앉아있다. 라디오에서 잡음이 새어나온다.'},
      {speaker:'윤',text:'이 라디오... 오늘따라 이상한 소리가 섞여 있는 것 같은데.'}
    ]);
  },

  /* ===== STAGE 2 — 뒷마당: 안테나 조립 ===== */
  stage2:function(){
    var self=this;
    var sc=document.getElementById('stage-content');
    var solved=false;
    var slots=[];
    var PARTS=[
      {id:'dish',icon:'📡',name:'파라볼릭 접시',desc:'넓은 포물선 형태의 금속판. 신호를 한 점으로 모을 수 있을 것 같다.'},
      {id:'cable',icon:'🔌',name:'동축 케이블',desc:'차폐된 전선. 신호를 전달하는 통로 역할을 한다.'},
      {id:'amp',icon:'🔋',name:'신호 증폭기',desc:'작은 전자 장치. 입력된 신호를 증폭시킨다.'}
    ];
    var CORRECT=['dish','amp','cable']; // 수집→증폭→전달
    var usedParts={};

    function renderParts(){
      var partsHtml='';
      for(var i=0;i<PARTS.length;i++){
        var p=PARTS[i];
        var usedClass=usedParts[p.id]?' used':'';
        partsHtml+='<div class="antenna-part'+usedClass+'" data-part-id="'+p.id+'">'+
          '<div class="antenna-part-icon">'+p.icon+'</div>'+
          '<div class="antenna-part-name">'+p.name+'</div>'+
          '<div class="antenna-part-desc">'+p.desc+'</div>'+
        '</div>';
      }
      var el=document.getElementById('s2-parts');
      if(el)el.innerHTML=partsHtml;
    }

    function renderSlots(){
      for(var i=0;i<3;i++){
        var slotEl=document.getElementById('s2-slot-'+i);
        if(!slotEl)continue;
        if(slots[i]){
          var p=null;
          for(var j=0;j<PARTS.length;j++){if(PARTS[j].id===slots[i])p=PARTS[j];}
          slotEl.textContent=p?p.icon+' '+p.name:'?';
          slotEl.classList.add('filled');
        }else{
          slotEl.textContent=(i+1);
          slotEl.classList.remove('filled');
        }
      }
    }

    function resetSlots(){
      slots=[];
      usedParts={};
      renderParts();
      renderSlots();
    }

    function checkAnswer(){
      if(slots.length<3)return;
      var correct=true;
      for(var i=0;i<3;i++){if(slots[i]!==CORRECT[i]){correct=false;break;}}
      if(correct){
        solved=true;trackEvent('stage_clear',{stage:2});
        AudioEngine.success();
        // 슬롯 합체 애니메이션
        var slotsWrap=document.getElementById('s2-slots-wrap');
        if(slotsWrap)slotsWrap.style.animation='antenna-glow 1s infinite';
        var narrativeEl=document.getElementById('s2-narrative');
        if(narrativeEl)narrativeEl.textContent='안테나가 빛나기 시작한다... 신호가 강해지고 있어.';
        setTimeout(function(){
          AlienLang.showAlien('msg2',function(){
            UIManager.showDialog([
              {speaker:'윤',text:'설계도 같은 건가... 시키는 대로 해볼까.'},
              {speaker:'윤',text:'안테나가 완성됐다. 신호가 점점 강해진다...'}
            ],function(){
              setTimeout(function(){self.goStage(3);},600);
            });
          });
        },800);
      }else{
        // 실패
        self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
        AudioEngine.fail();
        EffectSystem.shake();
        var narrativeEl=document.getElementById('s2-narrative');
        if(narrativeEl){
          narrativeEl.textContent='뭔가 순서가 틀린 것 같다. 다시 생각해보자.';
          narrativeEl.style.color='#ff6666';
          setTimeout(function(){narrativeEl.style.color='';},1500);
        }
        setTimeout(function(){resetSlots();},800);
      }
    }

    sc.innerHTML=
      '<div class="scene" style="justify-content:center;">'+
        '<div class="scene-title">Stage 2: 뒷마당</div>'+
        '<div class="scene-desc" style="max-width:400px;">달빛이 비추는 뒷마당. 풀밭 위에 세 가지 부품이 놓여 있다.</div>'+
        '<div style="max-width:400px;width:100%;margin:0 auto;">'+
          '<div class="antenna-parts" id="s2-parts"></div>'+
          '<div class="antenna-slots" id="s2-slots-wrap">'+
            '<div class="antenna-slot" id="s2-slot-0">1</div>'+
            '<div class="antenna-arrow">→</div>'+
            '<div class="antenna-slot" id="s2-slot-1">2</div>'+
            '<div class="antenna-arrow">→</div>'+
            '<div class="antenna-slot" id="s2-slot-2">3</div>'+
          '</div>'+
          '<div style="text-align:center;"><button class="antenna-reset" id="s2-reset">↺ 초기화</button></div>'+
        '</div>'+
        '<div class="antenna-narrative" id="s2-narrative">부품을 클릭해서 조립 슬롯에 배치하자.</div>'+
      '</div>';

    renderParts();
    renderSlots();

    // 히든 아이템 조건: 15초 아무 클릭 없으면 출현
    var s2HiddenTimer=null;var s2HiddenShown=false;
    console.log('[HIDDEN] S2 shouldShow='+HiddenItemSystem.shouldShow());
    if(HiddenItemSystem.shouldShow()){
      s2HiddenTimer=setTimeout(function(){console.log('[HIDDEN] S2 timer fired');if(!s2HiddenShown&&!solved){s2HiddenShown=true;HiddenItemSystem.showHiddenItem(2);}},15000);
      self.timers.push(s2HiddenTimer);
    }

    sc.addEventListener('click',function(e){
      if(UIManager.isBusy())return;
      // 히든 타이머 리셋 (클릭하면 다시 15초)
      if(s2HiddenTimer&&!s2HiddenShown){clearTimeout(s2HiddenTimer);s2HiddenTimer=setTimeout(function(){if(!s2HiddenShown&&!solved){s2HiddenShown=true;HiddenItemSystem.showHiddenItem(2);}},15000);self.timers.push(s2HiddenTimer);}
      // 부품 클릭
      var partEl=e.target.closest('.antenna-part');
      if(partEl&&!solved){
        var pid=partEl.getAttribute('data-part-id');
        if(usedParts[pid])return;
        AudioEngine.click();
        usedParts[pid]=true;
        slots.push(pid);
        renderParts();
        renderSlots();
        if(slots.length===3){
          setTimeout(checkAnswer,400);
        }
      }
      // 초기화
      if((e.target.id==='s2-reset'||e.target.closest('#s2-reset'))&&!solved){
        AudioEngine.click();
        resetSlots();
        var narrativeEl=document.getElementById('s2-narrative');
        if(narrativeEl){narrativeEl.textContent='부품을 클릭해서 조립 슬롯에 배치하자.';narrativeEl.style.color='';}
      }
      // 히든 아이템 클릭
      var alienEl=e.target.closest('[data-alien-id]');
      if(alienEl){
        AudioEngine.click();
        var aid=alienEl.getAttribute('data-alien-id');
        alienEl.remove();
        HiddenItemSystem.collectItem(aid);
      }
    });

    // 입장 대사
    UIManager.showDialog([
      {speaker:'윤',text:'뒷마당에 나왔다. 달빛이 비추는 풀밭 위에 세 가지 부품이 놓여 있다.'},
      {speaker:'윤',text:'신호에 섞여 있던 잡음 속에... 뭔가 패턴이 있었어.'},
      {speaker:'윤',text:'모으고... 키우고... 보내라? 뭘 말하는 거지.'}
    ].concat(PlaythroughManager.isSecondPlay()?[{speaker:'???',text:'<span style="color:#00ff88;font-style:italic;">...서두르지 마. 기다리면 보이는 것이 있다...</span>',isAlien:true}]:[]));
  },

  /* ===== STAGE 3 — 마을 발전소: 회로 배선 연결 (전압 추론) ===== */
  stage3:function(){
    var self=this;
    var sc=document.getElementById('stage-content');
    var solved=false;
    var selected=null;
    var connections={};
    var connectedRight={};
    var failCount=0;
    var LEFT=['A','B','C','D'];
    var RIGHT=['E','F','G','H'];

    // 전압 쌍 생성: 합=10인 4쌍 (1~9 범위, 중복 없음)
    var pairs=[[1,9],[2,8],[3,7],[4,6]];
    // 셔플
    for(var pi=pairs.length-1;pi>0;pi--){var pj=Math.floor(Math.random()*(pi+1));var pt=pairs[pi];pairs[pi]=pairs[pj];pairs[pj]=pt;}
    var voltLeft={};var voltRight={};var CORRECT={};
    // 우측 순서도 셔플
    var rightOrder=RIGHT.slice();
    for(var ri2=rightOrder.length-1;ri2>0;ri2--){var rj=Math.floor(Math.random()*(ri2+1));var rt=rightOrder[ri2];rightOrder[ri2]=rightOrder[rj];rightOrder[rj]=rt;}
    for(var vi=0;vi<4;vi++){
      voltLeft[LEFT[vi]]=pairs[vi][0];
      voltRight[rightOrder[vi]]=pairs[vi][1];
      CORRECT[LEFT[vi]]=rightOrder[vi];
    }

    function renderNodes(){
      for(var i=0;i<LEFT.length;i++){
        var el=document.getElementById('s3-l-'+LEFT[i]);
        if(!el)continue;
        el.className='wire-node';
        if(connections[LEFT[i]])el.classList.add('connected');
        else if(selected===LEFT[i])el.classList.add('selected');
      }
      for(var j=0;j<RIGHT.length;j++){
        var el=document.getElementById('s3-r-'+RIGHT[j]);
        if(!el)continue;
        el.className='wire-node';
        if(connectedRight[RIGHT[j]])el.classList.add('connected');
      }
