    function renderLines(){
      var svg=document.getElementById('s3-svg');
      if(!svg)return;
      var lines='';
      for(var k in connections){
        var lEl=document.getElementById('s3-l-'+k);
        var rEl=document.getElementById('s3-r-'+connections[k]);
        if(!lEl||!rEl)continue;
        var area=document.getElementById('s3-wire-area');
        var aRect=area.getBoundingClientRect();
        var lRect=lEl.getBoundingClientRect();
        var rRect=rEl.getBoundingClientRect();
        var x1=lRect.left+lRect.width/2-aRect.left;
        var y1=lRect.top+lRect.height/2-aRect.top;
        var x2=rRect.left+rRect.width/2-aRect.left;
        var y2=rRect.top+rRect.height/2-aRect.top;
        lines+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#00ff88" stroke-width="2" stroke-opacity="0.6"/>';
      }
      svg.innerHTML=lines;
    }

    function renderConnList(){
      var el=document.getElementById('s3-conn-list');if(!el)return;
      var keys=Object.keys(connections);
      if(keys.length===0){el.textContent='연결 없음';return;}
      var txt=[];for(var i=0;i<keys.length;i++)txt.push(keys[i]+' → '+connections[keys[i]]);
      el.textContent=txt.join(' | ');
    }

    function resetAll(){connections={};connectedRight={};selected=null;renderNodes();renderLines();renderConnList();}

    function sparkEffect(){
      var flash=document.getElementById('flash-overlay');
      flash.style.background='rgba(255,200,0,0.6)';flash.style.transition='opacity 0.05s';flash.style.opacity='1';
      setTimeout(function(){flash.style.transition='opacity 0.3s';flash.style.opacity='0';setTimeout(function(){flash.style.background='#000';},300);},100);
    }

    function checkAnswer(){
      if(Object.keys(connections).length<4)return;
      var correct=true;
      for(var k in CORRECT){if(connections[k]!==CORRECT[k]){correct=false;break;}}
      if(correct){
        solved=true;trackEvent('stage_clear',{stage:3});
        AudioEngine.success();
        var flash=document.getElementById('flash-overlay');
        flash.style.background='#000';flash.style.transition='opacity 0.5s';flash.style.opacity='0.7';
        setTimeout(function(){flash.style.transition='opacity 2s';flash.style.opacity='0';},1500);
        self.addItem('발전소 배선도 사본','발전소에서 가져온 배선도. 배선 패턴이 기록되어 있다.');
        setTimeout(function(){
          UIManager.showDialog([
            {speaker:'윤',text:'...전력이 차단됐다. 마을 전체가 깜깜해졌어.'},
            {speaker:'윤',text:'내가 한 건가?'}
          ],function(){
            AlienLang.showAlien('msg3',function(){
              UIManager.showDialog([
                {speaker:'윤',text:'왜 이런 걸 시키는 거지... 하지만 멈출 수가 없어.'}
              ],function(){setTimeout(function(){self.goStage(4);},600);});
            });
          });
        },1000);
      }else{
        failCount++;self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
        AudioEngine.fail();EffectSystem.shake();sparkEffect();EffectSystem.glitchScreen(300);
        var narrativeEl=document.getElementById('s3-narrative');
        if(failCount>=3){
          failCount=0;
          if(narrativeEl){narrativeEl.textContent='회로가 과부하됐다. 처음부터 다시...';narrativeEl.style.color='#ff6666';}
          setTimeout(function(){resetAll();if(narrativeEl){narrativeEl.style.color='';narrativeEl.textContent='배선도를 참고해서 노드를 연결하자.';}},1500);
        }else{
          if(narrativeEl){narrativeEl.textContent='스파크가 튀었다! 연결이 잘못됐어. ('+failCount+'/3)';narrativeEl.style.color='#ff6666';}
          setTimeout(function(){resetAll();if(narrativeEl)narrativeEl.style.color='';},1200);
        }
      }
    }

    // 동적 HTML 생성 (전압 표시)
    var leftHtml='';for(var li=0;li<LEFT.length;li++)leftHtml+='<div class="wire-node" id="s3-l-'+LEFT[li]+'" style="font-size:14px;">'+LEFT[li]+'<br><span style="font-size:11px;color:#ffaa00;">'+voltLeft[LEFT[li]]+'V</span></div>';
    var rightHtml='';for(var ri=0;ri<RIGHT.length;ri++)rightHtml+='<div class="wire-node" id="s3-r-'+RIGHT[ri]+'" style="font-size:14px;">'+RIGHT[ri]+'<br><span style="font-size:11px;color:#ffaa00;">'+voltRight[RIGHT[ri]]+'V</span></div>';

    sc.innerHTML=
      '<div class="scene" style="justify-content:center;">'+
        '<div class="scene-title">Stage 3: 마을 발전소</div>'+
        '<div class="scene-desc" style="max-width:400px;">깊은 밤, 마을 외곽 발전소. 철조망 너머로 녹슨 문이 보인다.</div>'+
        '<div class="wire-panel">'+
          '<div class="wire-hint">⚡ 배전반 안내: <span style="color:#ffaa00;">합계 전압이 10V</span>가 되는 쌍을 연결하시오</div>'+
          '<div class="wire-area" id="s3-wire-area" style="position:relative;min-height:260px;padding:20px 0;">'+
            '<div class="wire-col">'+leftHtml+'</div>'+
            '<svg class="wire-svg" id="s3-svg"></svg>'+
            '<div class="wire-col">'+rightHtml+'</div>'+
          '</div>'+
          '<div class="wire-connections"><span id="s3-conn-list">연결 없음</span></div>'+
          '<div style="display:flex;gap:8px;justify-content:center;">'+
            '<button class="antenna-reset" id="s3-reset">↺ 초기화</button>'+
            '<button class="btn-next" id="s3-submit" style="margin-top:0;">⚡ 점등</button>'+
          '</div>'+
        '</div>'+
        '<div class="antenna-narrative" id="s3-narrative">배선도를 참고해서 노드를 연결하자.</div>'+
      '</div>';

    sc.addEventListener('click',function(e){
      if(UIManager.isBusy()||solved)return;
      for(var i=0;i<LEFT.length;i++){
        var lid='s3-l-'+LEFT[i];
        if(e.target.id===lid||e.target.closest('#'+lid)){
          if(connections[LEFT[i]])return;
          AudioEngine.click();selected=LEFT[i];renderNodes();return;
        }
      }
      for(var j=0;j<RIGHT.length;j++){
        var rid='s3-r-'+RIGHT[j];
        if(e.target.id===rid||e.target.closest('#'+rid)){
          if(!selected||connectedRight[RIGHT[j]])return;
          AudioEngine.click();
          connections[selected]=RIGHT[j];connectedRight[RIGHT[j]]=true;selected=null;
          renderNodes();renderLines();renderConnList();return;
        }
      }
      if(e.target.id==='s3-reset'||e.target.closest('#s3-reset')){
        AudioEngine.click();resetAll();
        var narrativeEl=document.getElementById('s3-narrative');
        if(narrativeEl){narrativeEl.textContent='배선도를 참고해서 노드를 연결하자.';narrativeEl.style.color='';}
      }
      if(e.target.id==='s3-submit'||e.target.closest('#s3-submit')){
        AudioEngine.click();
        if(Object.keys(connections).length<4){
          var narrativeEl=document.getElementById('s3-narrative');
          if(narrativeEl)narrativeEl.textContent='4쌍 모두 연결해야 점등할 수 있어.';
          return;
        }
        checkAnswer();
      }
    });

    UIManager.showDialog([
      {speaker:'윤',text:'발전소... 신호가 이쪽을 가리키고 있었어.'},
      {speaker:'윤',text:'문이 열려 있다. 안에 배전반이 보인다.'},
      {speaker:'윤',text:'벽에 배선도가 붙어있네. 일부가 지워져 있지만...'}
    ]);
  },

  /* ===== STAGE 4 — 연구소: 암호 해독 + 현미경 분석 ===== */
  stage4:function(){
    var self=this;
    var sc=document.getElementById('stage-content');
    var phase=1;
    var solved=false;
    var code='';
    var keypadFails=0;
    var keypadLocked=false;

    // 랜덤 원소 선택
    var ELEMENTS=[
      {sym:'He',num:2},{sym:'Li',num:3},{sym:'C',num:6},{sym:'N',num:7},
      {sym:'Ne',num:10},{sym:'Na',num:11},{sym:'Al',num:13},{sym:'Si',num:14},
      {sym:'Ar',num:18},{sym:'K',num:19},{sym:'Ca',num:20}
    ];
    var picked=[];
    var pool=ELEMENTS.slice();
    for(var pi=0;pi<3;pi++){var idx=Math.floor(Math.random()*pool.length);picked.push(pool.splice(idx,1)[0]);}
    var ANSWER='';
    var sum=0;for(var ps=0;ps<picked.length;ps++)sum+=picked[ps].num;
    ANSWER=('0000'+sum).slice(-4);

    // === PHASE 1: KEYPAD ===
    function renderPhase1(){
      sc.innerHTML=
        '<div class="scene" style="justify-content:center;">'+
          '<div class="scene-title">Stage 4: 연구소</div>'+
          '<div class="scene-desc" style="max-width:360px;">비상등만 깜빡이는 연구소 입구. 잠긴 문 앞에 키패드가 있다.</div>'+
          '<div class="keypad-wrap">'+
            '<div class="hint-panel">'+
              '📋 벽의 주기율표에 빨간 원이 쳐져 있다:<br>'+
              picked.map(function(e){return '<span class="element">'+e.sym+' ('+e.num+')</span>';}).join('')+'<br>'+
              '<div class="graffiti">누군가 벽에 긁어놓은 글씨: "표시된 숫자를 모두 더해라"</div>'+
            '</div>'+
            '<div class="keypad-display" id="s4-display">____</div>'+
            '<div class="keypad-grid" id="s4-keypad">'+
              '<button class="keypad-btn" data-key="1">1</button>'+
              '<button class="keypad-btn" data-key="2">2</button>'+
              '<button class="keypad-btn" data-key="3">3</button>'+
              '<button class="keypad-btn" data-key="4">4</button>'+
              '<button class="keypad-btn" data-key="5">5</button>'+
              '<button class="keypad-btn" data-key="6">6</button>'+
              '<button class="keypad-btn" data-key="7">7</button>'+
              '<button class="keypad-btn" data-key="8">8</button>'+
              '<button class="keypad-btn" data-key="9">9</button>'+
            '</div>'+
            '<div class="keypad-row-bottom">'+
              '<button class="keypad-btn fn" data-key="del">⌫</button>'+
              '<button class="keypad-btn" data-key="0">0</button>'+
              '<button class="keypad-btn fn confirm" data-key="enter">✓</button>'+
            '</div>'+
          '</div>'+
          '<div class="antenna-narrative" id="s4-narrative">4자리 비밀번호를 입력하자.</div>'+
        '</div>';

      sc.addEventListener('click',function(e){
        if(UIManager.isBusy()||keypadLocked||phase!==1)return;
        var btn=e.target.closest('.keypad-btn');
        if(!btn)return;
        var key=btn.getAttribute('data-key');
        AudioEngine.click();
        if(key==='del'){
          code=code.slice(0,-1);
        }else if(key==='enter'){
          if(code.length<4)return;
          // 히든 아이템: 0000 입력 시
          if(code==='0000'&&HiddenItemSystem.shouldShow()){HiddenItemSystem.showHiddenItem(4);code='';updateKeypadDisplay();return;}
          if(code===ANSWER){
            phase=2;
            AudioEngine.success();
            var display=document.getElementById('s4-display');
            if(display){display.textContent='OPEN';display.style.color='#00ff88';}
            UIManager.showDialog([
              {speaker:'윤',text:'...열렸다.'}
            ],function(){
              setTimeout(renderPhase2,500);
            });
            return;
          }else{
            keypadFails++;
            self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
            AudioEngine.fail();
            EffectSystem.shake();
            var display=document.getElementById('s4-display');
            if(display){display.classList.add('error');}
            var narrativeEl=document.getElementById('s4-narrative');
            if(keypadFails>=3){
              keypadLocked=true;
              if(display){display.className='keypad-display locked';display.textContent='보안 잠금 — 30초 대기';}
              if(narrativeEl){narrativeEl.textContent='보안 잠금이 발동됐다!';narrativeEl.style.color='#ff6666';}
              var lockTimer=30;
              var lockInterval=setInterval(function(){
                lockTimer--;
                if(display)display.textContent='보안 잠금 — '+lockTimer+'초';
                if(lockTimer<=0){
                  clearInterval(lockInterval);
                  keypadLocked=false;keypadFails=0;code='';
                  if(display){display.className='keypad-display';display.textContent='____';}
                  if(narrativeEl){narrativeEl.textContent='4자리 비밀번호를 입력하자.';narrativeEl.style.color='';}
                }
              },1000);
              self.timerIntervals.push(lockInterval);
            }else{
              if(narrativeEl){narrativeEl.textContent='틀렸다. ('+keypadFails+'/3)';narrativeEl.style.color='#ff6666';}
              code='';
              setTimeout(function(){
                if(display){display.classList.remove('error');}
                updateKeypadDisplay();
                if(narrativeEl)narrativeEl.style.color='';
              },800);
            }
            return;
          }
        }else{
          if(code.length<4)code+=key;
        }
        updateKeypadDisplay();
      });
    }

    function updateKeypadDisplay(){
      var display=document.getElementById('s4-display');
      if(!display)return;
      var shown=code;
      while(shown.length<4)shown+='_';
      display.textContent=shown;
    }

    // === PHASE 2: MICROSCOPE PATTERN SYNTHESIS ===
    var BASE_PATTERNS=[
      [1,0,0, 0,1,0, 0,0,1], // 대각선
      [0,1,0, 1,0,1, 0,0,0], // 위 삼각
      [0,0,0, 0,1,0, 1,0,1], // 아래 삼각
      [1,1,0, 0,0,0, 0,1,1], // 코너 쌍
      [0,0,1, 1,0,0, 1,0,0], // L자
      [0,1,0, 0,0,1, 0,1,0], // 세로 지그재그
      [1,0,1, 0,0,0, 1,0,0], // 산점
      [0,0,0, 1,1,0, 0,0,1]  // 하단 L
    ];
    var PCOLORS=['#ff4444','#4488ff','#44ff44','#ffcc00','#aa44ff','#ff8844','#44ffcc','#ff44aa'];
    var PNAMES=['빨강','파랑','초록','노랑','보라','주황','시안','핑크'];
    var microRound=0;
    var microTimer=null;
    var microTimeLeft=0;
    var microSelected={};
    var microAnswer=[];
    var ROUND_COUNTS=[2,3,4]; // R1: 2개 합성, R2: 3개, R3: 4개
    var ROUND_TIMES=[15,20,25];

    function hexToRgb(hex){
      var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }
    function rgbToHex(rgb){
      return '#'+rgb.map(function(c){return ('0'+Math.round(c).toString(16)).slice(-2);}).join('');
    }
    function mixColors(colorHexes){
      if(colorHexes.length===0)return '#222';
      if(colorHexes.length===1)return colorHexes[0];
      var sum=[0,0,0];
      for(var i=0;i<colorHexes.length;i++){var rgb=hexToRgb(colorHexes[i]);sum[0]+=rgb[0];sum[1]+=rgb[1];sum[2]+=rgb[2];}
      return rgbToHex([sum[0]/colorHexes.length,sum[1]/colorHexes.length,sum[2]/colorHexes.length]);
    }

    function buildComposite(indices){
      // 각 셀에 어떤 패턴들이 켜져 있는지 + 혼합색 계산
      var cells=[];
      for(var c=0;c<9;c++){
        var active=[];
        for(var i=0;i<indices.length;i++){
          if(BASE_PATTERNS[indices[i]][c])active.push(indices[i]);
        }
        if(active.length>0){
          var colors=active.map(function(idx){return PCOLORS[idx];});
          cells.push({on:true,color:mixColors(colors),contributors:active});
        }else{
          cells.push({on:false,color:'',contributors:[]});
        }
      }
      return cells;
    }

    function compositeToHtml(cells,big){
      var dotCls=big?'micro-dot':'micro-mini-dot';
      var h='';
      for(var i=0;i<9;i++){
        if(cells[i].on){
          h+='<div class="'+dotCls+'" style="background:'+cells[i].color+';box-shadow:0 0 '+(big?'8':'4')+'px '+cells[i].color+';"></div>';
        }else{
          h+='<div class="'+dotCls+' off"></div>';
        }
      }
      return h;
    }

    function singlePatternHtml(idx,big){
      var dotCls=big?'micro-dot':'micro-mini-dot';
      var color=PCOLORS[idx];
      var h='';
      for(var i=0;i<9;i++){
        if(BASE_PATTERNS[idx][i]){
          h+='<div class="'+dotCls+'" style="background:'+color+';box-shadow:0 0 '+(big?'8':'4')+'px '+color+';"></div>';
        }else{
          h+='<div class="'+dotCls+' off"></div>';
        }
      }
      return h;
    }

    function startMicroRound(){
      if(microRound>=3){
        solved=true;trackEvent('stage_clear',{stage:4});
        AudioEngine.success();
        self.addItem('화학 물질 X-7','연구소 냉장고에서 가져온 위험한 화학 물질. 용도 불명.');
        self.addItem('연구소 실험 기록','연구소에서 발견한 실험 기록. 대기권 관련 데이터가 있다.');
        setTimeout(function(){
          UIManager.showDialog([
            {speaker:'윤',text:'이건... 위험한 물질 아닌가?'}
          ],function(){
            AlienLang.showAlien('msg4',function(){
              UIManager.showDialog([
                {speaker:'윤',text:'가져오라는 건 알겠는데... 이걸로 뭘 하려는 거야?'}
              ],function(){setTimeout(function(){self.goStage(5);},600);});
            });
          });
        },500);
        return;
      }

      var count=ROUND_COUNTS[microRound];
      // 랜덤으로 count개 패턴 선택
      var pool=[0,1,2,3,4,5,6,7];
      microAnswer=[];
      for(var a=0;a<count;a++){var ai=Math.floor(Math.random()*pool.length);microAnswer.push(pool.splice(ai,1)[0]);}
      microAnswer.sort(function(a,b){return a-b;});
      microSelected={};

      var composite=buildComposite(microAnswer);
      var roundDots='';
      for(var r=0;r<3;r++)roundDots+='<div class="micro-round-dot'+(r<microRound?' done':'')+'"></div>';

      // 8개 보기
      var optionsHtml='';
      for(var oi=0;oi<8;oi++){
        optionsHtml+='<div class="micro-option" data-pidx="'+oi+'" id="s4-opt-'+oi+'">'+
          '<div class="micro-label" style="color:'+PCOLORS[oi]+';">'+(oi+1)+'. '+PNAMES[oi]+'</div>'+
          '<div class="micro-mini-grid">'+singlePatternHtml(oi,false)+'</div>'+
        '</div>';
      }

      sc.innerHTML=
        '<div class="scene" style="justify-content:center;">'+
          '<div class="scene-title">Stage 4: 연구소 내부</div>'+
          '<div class="scene-desc" style="max-width:400px;">이 분자 구조는 여러 성분이 합쳐진 것이다. 어떤 성분들인지 골라내자.</div>'+
          '<div class="micro-wrap" style="max-width:400px;">'+
            '<div class="micro-scope"><div class="micro-grid" id="s4-scope">'+compositeToHtml(composite,true)+'</div></div>'+
            '<div class="micro-timer-wrap"><div class="micro-timer-bar" id="s4-timer-bar" style="width:100%;"></div></div>'+
            '<div class="micro-round">'+roundDots+'</div>'+
            '<div style="text-align:center;font-size:12px;color:#889;margin:4px 0;">'+count+'개 성분을 선택하세요</div>'+
            '<div class="micro-options" style="grid-template-columns:repeat(4,1fr);" id="s4-options">'+optionsHtml+'</div>'+
            '<button class="btn-next" id="s4-micro-submit" style="margin-top:8px;width:100%;">🔬 분석 확인</button>'+
          '</div>'+
          '<div class="antenna-narrative" id="s4-narrative2">합성된 패턴을 보고 어떤 성분들이 섞였는지 고르자. (라운드 '+(microRound+1)+'/3)</div>'+
        '</div>';

      // 히든 아이템
      var sceneEl=sc.querySelector('.scene');
      if(sceneEl){sceneEl.style.position='relative';HiddenItemSystem.injectItems(4,sceneEl);}

      // 타이머
      var totalTime=ROUND_TIMES[microRound]||15;
      microTimeLeft=totalTime;
      var timerBar=document.getElementById('s4-timer-bar');
      if(microTimer)clearInterval(microTimer);
      microTimer=setInterval(function(){
        microTimeLeft-=0.1;
        var pct=Math.max(0,(microTimeLeft/totalTime)*100);
        if(timerBar)timerBar.style.width=pct+'%';
        if(microTimeLeft<=5)AudioEngine.timerTick();
        if(microTimeLeft<=0){
          clearInterval(microTimer);
          self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});AudioEngine.fail();EffectSystem.shake();
          var narr=document.getElementById('s4-narrative2');
          if(narr){narr.textContent='시료가 변질됐다. 다시 관찰...';narr.style.color='#ff6666';}
          setTimeout(function(){startMicroRound();},1200);
        }
      },100);
      self.timerIntervals.push(microTimer);

      // 보기 토글 + 확인 버튼
      sc.onclick=function(e){
        if(UIManager.isBusy()||solved)return;
        // 보기 토글
        var opt=e.target.closest('.micro-option');
        if(opt){
          AudioEngine.click();
          var pidx=parseInt(opt.getAttribute('data-pidx'));
          if(microSelected[pidx]){
            delete microSelected[pidx];
            opt.style.borderColor='rgba(102,119,136,0.3)';opt.style.background='rgba(255,255,255,0.03)';
          }else{
            microSelected[pidx]=true;
            opt.style.borderColor=PCOLORS[pidx];opt.style.background='rgba(255,255,255,0.08)';
          }
          return;
        }
        // 확인
        if(e.target.id==='s4-micro-submit'||e.target.closest('#s4-micro-submit')){
          AudioEngine.click();
          var selKeys=Object.keys(microSelected).map(function(k){return parseInt(k);}).sort(function(a,b){return a-b;});
          if(selKeys.length!==count){
            var narr=document.getElementById('s4-narrative2');
            if(narr)narr.textContent=count+'개를 선택해야 해. (현재 '+selKeys.length+'개)';
            return;
          }
          if(microTimer)clearInterval(microTimer);
          // 정답 체크
          var correct=selKeys.length===microAnswer.length;
          if(correct){for(var ci=0;ci<selKeys.length;ci++){if(selKeys[ci]!==microAnswer[ci]){correct=false;break;}}}
          if(correct){
            AudioEngine.success();
            microRound++;
            var narr=document.getElementById('s4-narrative2');
            if(narr){narr.textContent='정확해!';narr.style.color='#00ff88';}
            setTimeout(function(){startMicroRound();},800);
          }else{
            self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});AudioEngine.fail();EffectSystem.shake();
            var narr=document.getElementById('s4-narrative2');
            if(narr){narr.textContent='성분 조합이 틀렸다!';narr.style.color='#ff6666';}
            microSelected={};
            for(var ri=0;ri<8;ri++){var oel=document.getElementById('s4-opt-'+ri);if(oel){oel.style.borderColor='rgba(102,119,136,0.3)';oel.style.background='rgba(255,255,255,0.03)';}}
            setTimeout(function(){if(narr)narr.style.color='';},1000);
          }
        }
      };
    }

    function renderPhase2(){
      UIManager.showDialog([
        {speaker:'윤',text:'현미경이 있다. 냉장고의 물질을 분석해보자.'},
        {speaker:'윤',text:'여러 성분이 섞여 있는 것 같다... 어떤 것들이 합쳐진 건지 찾아내야 해.'}
      ],function(){
        startMicroRound();
      });
    }

    // 2회차 히든 아이템
    function injectHidden(){
      var sceneEl=sc.querySelector('.scene');
      if(sceneEl){sceneEl.style.position='relative';HiddenItemSystem.injectItems(4,sceneEl);}
    }

    // 시작
    renderPhase1();
    injectHidden();

    // 히든 아이템 클릭 (이벤트 위임)
    sc.addEventListener('click',function(e){
      var alienEl=e.target.closest('[data-alien-id]');
      if(alienEl){
        AudioEngine.click();
        var aid=alienEl.getAttribute('data-alien-id');
        alienEl.remove();
        HiddenItemSystem.collectItem(aid);
      }
    });

    // 입장 대사
    UIManager.showDialog([
      {speaker:'윤',text:'연구소... 정전 때문인지 비상등만 깜빡이고 있다.'},
      {speaker:'윤',text:'문이 잠겨 있어. 키패드가 보인다.'},
      {speaker:'윤',text:'벽에 뭔가 써있네... 주기율표?'}
    ].concat(PlaythroughManager.isSecondPlay()?[{speaker:'???',text:'<span style="color:#00ff88;font-style:italic;">...아무것도 아닌 숫자가 무언가를 연다...</span>',isAlien:true}]:[]));
  },

  /* ===== STAGE 5 — 통신 기지국: 주파수 교란 ===== */
  stage5:function(){
    var self=this;
    var sc=document.getElementById('stage-content');
    var solved=false;
    // 원본 파형 파라미터 (랜덤)
    var origA=1.0+Math.round(Math.random()*5)/10; // 1.0~1.5
    var origF=1.0+Math.round(Math.random()*10)/10; // 1.0~2.0
    var myA=1.0,myF=1.0,myP=0;
    var animId=null;

    sc.innerHTML=
      '<div class="scene" style="justify-content:center;">'+
        '<div class="scene-title">Stage 5: 통신 기지국</div>'+
        '<div class="scene-desc" style="max-width:400px;">🔴 빨간 파형(원본 통신)을 상쇄시켜야 한다.<br>🔵 파란 파형(내 신호)을 조절해서 ⚪ 흰 합성 파형이 평평해지면 성공!</div>'+
        '<div class="wave-wrap">'+
          '<canvas class="wave-canvas" id="s5-canvas" width="400" height="150"></canvas>'+
          '<div style="font-size:11px;color:#556;text-align:center;margin-bottom:4px;">🔴 원본 주파수 &nbsp; 🔵 내 주파수 &nbsp; ⚪ 합성</div>'+
          '<div class="wave-slider-wrap">'+
            '<div class="wave-slider-row"><label>진폭</label><input type="range" id="s5-amp" min="0" max="20" value="10" step="1"><span class="wave-val" id="s5-amp-val">1.0</span></div>'+
            '<div class="wave-slider-row"><label>주파수</label><input type="range" id="s5-freq" min="5" max="30" value="10" step="1"><span class="wave-val" id="s5-freq-val">1.0</span></div>'+
            '<div class="wave-slider-row"><label>위상</label><input type="range" id="s5-phase" min="0" max="36" value="0" step="1"><span class="wave-val" id="s5-phase-val">0°</span></div>'+
          '</div>'+
          '<div class="wave-status" id="s5-status">슬라이더를 조절해서 원본 파형을 상쇄시키자.</div>'+
          '<button class="btn-next" id="s5-submit" style="width:100%;">📡 교란 실행</button>'+
        '</div>'+
        '<div class="antenna-narrative" id="s5-narrative">진폭과 주파수를 원본에 맞추고, 위상을 180°로 — 역위상을 만들자.</div>'+
      '</div>';

    var canvas=document.getElementById('s5-canvas');
    var ctx5=canvas.getContext('2d');

    function drawWave(){
      var w=canvas.width,h=canvas.height;
      ctx5.fillStyle='#000';ctx5.fillRect(0,0,w,h);
      var mid=h/2;var scale=mid*0.7;
      var phaseRad=myP*Math.PI/180;

      // 그리드
      ctx5.strokeStyle='rgba(255,255,255,0.05)';ctx5.lineWidth=1;
      ctx5.beginPath();ctx5.moveTo(0,mid);ctx5.lineTo(w,mid);ctx5.stroke();

      function drawLine(color,ampVal,freqVal,phaseVal){
        ctx5.strokeStyle=color;ctx5.lineWidth=1.5;ctx5.beginPath();
        for(var x=0;x<w;x++){
          var t=x/w*Math.PI*4;
          var y=mid-ampVal*Math.sin(freqVal*t+phaseVal)*scale;
          if(x===0)ctx5.moveTo(x,y);else ctx5.lineTo(x,y);
        }
        ctx5.stroke();
      }

      // 원본 (빨강)
      drawLine('rgba(255,68,68,0.7)',origA,origF,0);
      // 내 파형 (파랑)
      drawLine('rgba(68,136,255,0.7)',myA,myF,phaseRad);
      // 합성 (흰)
      ctx5.strokeStyle='rgba(255,255,255,0.9)';ctx5.lineWidth=2;ctx5.beginPath();
      var maxComposite=0;
      for(var x=0;x<w;x++){
        var t=x/w*Math.PI*4;
        var combined=origA*Math.sin(origF*t)+myA*Math.sin(myF*t+phaseRad);
        if(Math.abs(combined)>maxComposite)maxComposite=Math.abs(combined);
        var y=mid-combined*scale;
        if(x===0)ctx5.moveTo(x,y);else ctx5.lineTo(x,y);
      }
      ctx5.stroke();

      // 상태 업데이트
      var statusEl=document.getElementById('s5-status');
      if(statusEl){
        if(maxComposite<=0.15){
          statusEl.textContent='▶▶▶ 완벽한 상쇄! 교란 준비 완료!';statusEl.style.color='#00ff88';
        }else if(maxComposite<=0.3){
          statusEl.textContent='▶▶ 거의 상쇄됐다!';statusEl.style.color='#88ff88';
        }else if(maxComposite<=0.8){
          statusEl.textContent='▶ 파형이 줄어들고 있어...';statusEl.style.color='#ffaa00';
        }else{
          statusEl.textContent='아직 멀었어. 슬라이더를 조절하자.';statusEl.style.color='#667';
        }
      }

      if(!solved)animId=requestAnimationFrame(drawWave);
    }

    // 슬라이더 이벤트
    function updateSliders(){
      myA=parseInt(document.getElementById('s5-amp').value)/10;
      myF=parseInt(document.getElementById('s5-freq').value)/10;
      myP=parseInt(document.getElementById('s5-phase').value)*10;
      document.getElementById('s5-amp-val').textContent=myA.toFixed(1);
      document.getElementById('s5-freq-val').textContent=myF.toFixed(1);
      document.getElementById('s5-phase-val').textContent=myP+'°';
    }
    ['s5-amp','s5-freq','s5-phase'].forEach(function(id){
      document.getElementById(id).addEventListener('input',updateSliders);
    });

    drawWave();

    sc.addEventListener('click',function(e){
      if(UIManager.isBusy()||solved)return;
      if(e.target.id==='s5-submit'||e.target.closest('#s5-submit')){
        AudioEngine.click();
        // 합성 최대 진폭 계산
        var phaseRad=myP*Math.PI/180;
        var maxC=0;
        for(var x=0;x<100;x++){
          var t=x/100*Math.PI*4;
          var c=Math.abs(origA*Math.sin(origF*t)+myA*Math.sin(myF*t+phaseRad));
          if(c>maxC)maxC=c;
        }
        if(maxC<=0.3){
          solved=true;trackEvent('stage_clear',{stage:5});
          if(animId)cancelAnimationFrame(animId);
          AudioEngine.success();
          self.addItem('교란 주파수 데이터','통신 기지국에서 사용한 역위상 주파수 기록. 142.7MHz.');
          var flash=document.getElementById('flash-overlay');
          flash.style.background='#000';flash.style.transition='opacity 0.5s';flash.style.opacity='0.5';
          setTimeout(function(){flash.style.transition='opacity 2s';flash.style.opacity='0';},1500);
          setTimeout(function(){
            UIManager.showDialog([
              {speaker:'윤',text:'...조용해졌다. 완전히.'}
            ],function(){
              AlienLang.showAlien('msg5',function(){
                UIManager.showDialog([
                  {speaker:'윤',text:'이제 아무도... 연락할 수 없겠지.'}
                ],function(){
                  setTimeout(function(){self.goStage(6);},600);
                });
              });
            });
          },1000);
        }else{
          self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
          AudioEngine.fail();
          EffectSystem.redPulse();
          EffectSystem.shake();
          var narr=document.getElementById('s5-narrative');
          if(narr){narr.textContent='경보 발동! 파형이 충분히 상쇄되지 않았어.';narr.style.color='#ff6666';
            setTimeout(function(){narr.style.color='';narr.textContent='역위상 파형을 만들어 통신을 교란하자.';},1500);
          }
        }
      }
    });

    // 스테이지 떠날 때 애니메이션 정리
    self._stageCleanup=function(){if(animId){cancelAnimationFrame(animId);animId=null;}};

    UIManager.showDialog([
      {speaker:'윤',text:'통신 기지국... 여긴 마을 전체 통신이 지나가는 곳이야.'},
      {speaker:'윤',text:'신호가... 이걸 끊으라고?'},
      {speaker:'윤',text:'역위상 파형을 만들면 기존 신호를 상쇄시킬 수 있을 거야.'}
    ]);
  },

  /* ===== STAGE 6 — 숲속 동굴: 벽화 순서 퍼즐 + 첫 깜놀 ===== */
  stage6:function(){
    var self=this;
    var sc=document.getElementById('stage-content');
    var solved=false;
    var scareDone=false;
    var TILES=[
      {id:'sun',icon:'☀',name:'태양'},
      {id:'water',icon:'🌊',name:'물'},
      {id:'sprout',icon:'🌱',name:'싹'},
      {id:'tree',icon:'🌳',name:'나무'},
      {id:'fire',icon:'🔥',name:'불'},
      {id:'skull',icon:'💀',name:'죽음'}
    ];
    var CORRECT_ORDER=['sun','water','sprout','tree','fire','skull'];
    var slots=[];
    var usedTiles={};

    // 타일 셔플
    var shuffled=TILES.slice();
    for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=st;}

    function renderTiles(){
      var el=document.getElementById('s6-tiles');if(!el)return;
      var h='';
      for(var i=0;i<shuffled.length;i++){
        var t=shuffled[i];
        var usedClass=usedTiles[t.id]?' used':'';
        h+='<div class="glyph-circle'+usedClass+'" data-tile-id="'+t.id+'" style="width:clamp(36px,11vw,48px);height:clamp(36px,11vw,48px);">'+
          '<div style="font-size:clamp(24px,6vw,32px);">'+t.icon+'</div>'+
        '</div>';
      }
      el.innerHTML=h;
    }

    function renderSlots(){
      for(var i=0;i<6;i++){
        var slotEl=document.getElementById('s6-slot-'+i);if(!slotEl)continue;
        if(slots[i]){
          var t=null;for(var j=0;j<TILES.length;j++){if(TILES[j].id===slots[i])t=TILES[j];}
          slotEl.textContent=t?t.icon:'?';
          slotEl.classList.add('filled');
        }else{
          slotEl.textContent=(i+1);
          slotEl.classList.remove('filled');
        }
      }
    }

    function resetSlots(){
      slots=[];usedTiles={};renderTiles();renderSlots();
    }

    function checkAnswer(){
      if(slots.length<6)return;
      var correct=true;
      for(var i=0;i<6;i++){if(slots[i]!==CORRECT_ORDER[i]){correct=false;break;}}
      if(correct){
        solved=true;trackEvent('stage_clear',{stage:6});
        AudioEngine.success();
        var flash=document.getElementById('flash-overlay');
        flash.style.background='rgba(0,255,136,0.3)';flash.style.transition='opacity 0.3s';flash.style.opacity='1';
        setTimeout(function(){flash.style.transition='opacity 2s';flash.style.opacity='0';
          setTimeout(function(){flash.style.background='#000';},2000);
        },1000);
        self.addItem('외계 장치','동굴 벽 뒤에서 발견한 장치. 녹색 빛을 내며 손에서 떨어지지 않는다.');
        self.addItem('동굴 문양 탁본','동굴 벽의 고대 문양을 탁본한 것. 생명 순환 패턴이 새겨져 있다.');
        setTimeout(function(){
          UIManager.showDialog([
            {speaker:'윤',text:'벽이... 열렸어. 뒤에 뭔가 있다.'}
          ],function(){
            AlienLang.showAlien('msg6',function(){
              UIManager.showDialog([
                {speaker:'윤',text:'이건 뭐지... 만지면 안 될 것 같은데, 손이 저절로...'}
              ],function(){
                setTimeout(function(){self.goStage(7);},600);
              });
            });
          });
        },1200);
      }else{
        self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
        AudioEngine.fail();EffectSystem.shake();
        var narr=document.getElementById('s6-narrative');
        if(narr){narr.textContent='순서가 틀렸다. 벽화가 반응하지 않는다.';narr.style.color='#ff6666';
          setTimeout(function(){narr.style.color='';narr.textContent='타일을 클릭해서 올바른 순서로 배치하자.';},1500);
        }
        setTimeout(resetSlots,800);
      }
    }

    // 슬롯 HTML
    var slotsHtml='';
    for(var si2=0;si2<6;si2++){
      slotsHtml+='<div class="antenna-slot" id="s6-slot-'+si2+'" style="width:clamp(32px,9vw,40px);height:36px;font-size:10px;">'+(si2+1)+'</div>';
      if(si2<5)slotsHtml+='<div class="antenna-arrow" style="font-size:12px;">→</div>';
    }

    sc.innerHTML=
      '<div class="scene" style="justify-content:center;">'+
        '<div class="scene-title">Stage 6: 숲속 동굴</div>'+
        '<div class="scene-desc" style="max-width:420px;">깊은 숲속 동굴. 벽에 고대 벽화가 희미한 녹색 빛을 내고 있다.</div>'+
        '<div style="max-width:420px;width:100%;margin:0 auto;">'+
          '<div class="glyph-hint">🪨 동굴 천장 각인:<br>"빛이 물을 깨우고, 땅에서 솟아나고,<br>하늘로 뻗고, 모든 것을 삼키고, 끝으로 돌아간다"</div>'+
          '<div class="glyph-row" id="s6-tiles" style="gap:10px;"></div>'+
          '<div class="antenna-slots" style="flex-wrap:nowrap;gap:2px;margin:16px 0;">'+slotsHtml+'</div>'+
          '<div style="text-align:center;"><button class="antenna-reset" id="s6-reset">↺ 초기화</button></div>'+
        '</div>'+
        '<div class="antenna-narrative" id="s6-narrative">타일을 클릭해서 올바른 순서로 배치하자.</div>'+
      '</div>';

    renderTiles();renderSlots();

    // 히든 아이템 (2회차)
    var sceneEl=sc.querySelector('.scene');
    if(sceneEl){sceneEl.style.position='relative';HiddenItemSystem.injectItems(6,sceneEl);}

    sc.addEventListener('click',function(e){
      if(UIManager.isBusy()||solved)return;
      // 타일 클릭
      var tile=e.target.closest('[data-tile-id]');
      if(tile&&!solved){
        var tid=tile.getAttribute('data-tile-id');
        if(usedTiles[tid])return;
        AudioEngine.click();
        usedTiles[tid]=true;
        slots.push(tid);
        renderTiles();renderSlots();

        // 깜놀: 3개 배치했을 때 1회
        if(slots.length===3&&!scareDone){
          scareDone=true;
          setTimeout(function(){
            EffectSystem.jumpScare('heavy',function(){
              UIManager.showDialog([
                {speaker:'윤',text:'뭐...뭐야?! 지금 뭔가 봤어...!'},
                {speaker:'윤',text:'...아무것도 없어. 없다고.'}
              ]);
            },1);
          },200);
        }

        if(slots.length===6)setTimeout(checkAnswer,400);
      }
      // 초기화
      if((e.target.id==='s6-reset'||e.target.closest('#s6-reset'))&&!solved){
        // 히든: 역순 배치 후 초기화
        if(slots.length===6&&HiddenItemSystem.shouldShow()){
          var rev=['skull','fire','tree','sprout','water','sun'];
          var isRev=true;for(var ri=0;ri<6;ri++){if(slots[ri]!==rev[ri]){isRev=false;break;}}
          if(isRev)HiddenItemSystem.showHiddenItem(6);
        }
        AudioEngine.click();resetSlots();
        var narr=document.getElementById('s6-narrative');
        if(narr){narr.textContent='타일을 클릭해서 올바른 순서로 배치하자.';narr.style.color='';}
      }
      // 히든 아이템

    ].concat(PlaythroughManager.isSecondPlay()?[{speaker:'???',text:'<span style="color:#00ff88;font-style:italic;">...죽음에서 시작해봐. 그리고 다시 돌려놓아...</span>',isAlien:true}]:[]));

  /* ===== STAGE 7 — 저수지: 화학 배합 (60초 제한) ===== */
  stage7:function(){
    var self=this;
    self.stageFails=0;
    var sc=document.getElementById('stage-content');
    var solved=false;
    var amounts={A:0,B:0,C:0};
    var timeLeft=60;
    var timerInterval=null;

    // 랜덤 비율 선택
    var RATIO_SETS=[[3,1,2],[4,1,1],[2,2,2],[2,1,3],[1,2,3],[3,2,1]];
    var ratioSet=RATIO_SETS[Math.floor(Math.random()*RATIO_SETS.length)];
    var ANS_A=ratioSet[0],ANS_B=ratioSet[1],ANS_C=ratioSet[2];
    var ANS_TOTAL=ANS_A+ANS_B+ANS_C;

    function getColor(){
      var total=amounts.A+amounts.B+amounts.C;
      if(total===0)return 'rgba(100,100,255,0.2)';
      if(amounts.A===ANS_A&&amounts.B===ANS_B&&amounts.C===ANS_C)return 'rgba(120,40,200,0.8)';
      var r=Math.min(255,amounts.A*40+amounts.C*30);
      var g=Math.min(255,amounts.B*60);
      var b=Math.min(255,200-total*20);
      return 'rgba('+r+','+g+','+b+',0.7)';
    }

    function updateDisplay(){
      for(var k in amounts){
        var el=document.getElementById('s7-val-'+k);if(el)el.textContent=amounts[k];
      }
      var liquid=document.getElementById('s7-liquid');
      var total=amounts.A+amounts.B+amounts.C;
      if(liquid){
        liquid.style.height=Math.min(100,total*15)+'%';
        liquid.style.background=getColor();
      }
    }

    function startTimer(){
      var timerText=document.getElementById('s7-timer-text');
      var timerCircle=document.getElementById('s7-timer-circle');
      timerInterval=setInterval(function(){
        timeLeft--;
        if(timerText)timerText.textContent=timeLeft;
        if(timerCircle){
          var pct=(timeLeft/60)*163.36;
          timerCircle.setAttribute('stroke-dashoffset',163.36-pct);
        }
        if(timeLeft<=10){AudioEngine.timerUrgent();if(timerCircle)timerCircle.setAttribute('stroke','#ff0000');}
        else if(timeLeft<=30)AudioEngine.timerTick();
        if(timeLeft<=0){
          clearInterval(timerInterval);
          AudioEngine.scare2();EffectSystem.glitchScreen(600);EffectSystem.shake();
          self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
          if(self.checkStageFail())return;
          var narr=document.getElementById('s7-narrative');
          if(narr){narr.textContent='시간 초과! 시약이 변질됐다...';narr.style.color='#ff6666';}
          setTimeout(function(){timeLeft=60;amounts={A:0,B:0,C:0};updateDisplay();startTimer();
            if(narr){narr.style.color='';narr.textContent='시약을 비율에 맞게 배합하자. (60초)';}
          },2000);
        }
      },1000);
      self.timerIntervals.push(timerInterval);
    }

    sc.innerHTML=
      '<div class="scene" style="justify-content:center;">'+
        '<div class="scene-title">Stage 7: 저수지</div>'+
        '<div class="scene-desc" style="max-width:380px;">깊은 밤 저수지. 안개가 피어오른다. 달빛이 물 위에 반사된다.</div>'+
        '<div class="chem-wrap">'+
          '<div class="timer-wrap"><svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/><circle id="s7-timer-circle" cx="30" cy="30" r="26" fill="none" stroke="#ff4444" stroke-width="4" stroke-dasharray="163.36" stroke-dashoffset="0" transform="rotate(-90 30 30)"/><text x="30" y="35" text-anchor="middle" class="timer-text" id="s7-timer-text">60</text></svg></div>'+
          '<div class="chem-hint">📋 실험 기록 참조:<br>"A는 <span style="color:#ff6666;">'+ANS_A+'</span>. B는 <span style="color:#ff6666;">'+ANS_B+'</span>. C는 판독 불가."<br><span style="color:#556;">총량이 '+ANS_TOTAL+'이 되도록 배합할 것.</span></div>'+
          '<div style="display:flex;align-items:center;gap:16px;justify-content:center;">'+
            '<div class="chem-beaker"><div class="chem-liquid" id="s7-liquid"></div></div>'+
            '<div class="chem-reagents">'+
              '<div class="chem-row"><label>시약 A</label><button class="chem-btn" data-r="A" data-d="-1">−</button><span class="chem-val" id="s7-val-A">0</span><button class="chem-btn" data-r="A" data-d="1">+</button></div>'+
              '<div class="chem-row"><label>시약 B</label><button class="chem-btn" data-r="B" data-d="-1">−</button><span class="chem-val" id="s7-val-B">0</span><button class="chem-btn" data-r="B" data-d="1">+</button></div>'+
              '<div class="chem-row"><label>시약 C</label><button class="chem-btn" data-r="C" data-d="-1">−</button><span class="chem-val" id="s7-val-C">0</span><button class="chem-btn" data-r="C" data-d="1">+</button></div>'+
            '</div>'+
          '</div>'+
          '<button class="btn-next" id="s7-submit" style="width:100%;margin-top:12px;">🧪 배합 실행</button>'+
        '</div>'+
        '<div class="antenna-narrative" id="s7-narrative">시약을 비율에 맞게 배합하자. (60초)</div>'+
      '</div>';

    updateDisplay();
    startTimer();

    sc.addEventListener('click',function(e){
      if(UIManager.isBusy()||solved)return;
      var btn=e.target.closest('.chem-btn');
      if(btn){
        AudioEngine.click();
        var r=btn.getAttribute('data-r');
        var d=parseInt(btn.getAttribute('data-d'));
        amounts[r]=Math.max(0,Math.min(6,amounts[r]+d));
        updateDisplay();
      }
      if(e.target.id==='s7-submit'||e.target.closest('#s7-submit')){
        AudioEngine.click();
        var total=amounts.A+amounts.B+amounts.C;
        if(total===0){var narr=document.getElementById('s7-narrative');if(narr)narr.textContent='시약을 넣어야 해!';return;}
        if(amounts.A===ANS_A&&amounts.B===ANS_B&&amounts.C===ANS_C){
          solved=true;trackEvent('stage_clear',{stage:7});
          clearInterval(timerInterval);
          AudioEngine.success();
          // 물색 변화 연출
          var liquid=document.getElementById('s7-liquid');
          if(liquid){liquid.style.height='100%';liquid.style.background='rgba(120,40,200,0.8)';}
          self.addItem('오염된 수질 샘플','저수지에서 채취한 변색된 물. 보라색 빛을 낸다.');
          setTimeout(function(){
            UIManager.showDialog([
              {speaker:'윤',text:'...물이 변하고 있어. 보라색으로...'}
            ],function(){
              AlienLang.showAlien('msg7',function(){
                UIManager.showDialog([
                  {speaker:'윤',text:'왜 이런 걸 시키는 건지... 점점 모르겠어.'}
                ],function(){
                  setTimeout(function(){self.goStage(8);},600);
                });
              });
            });
          },800);
        }else{
          self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
          AudioEngine.fail();EffectSystem.shake();
          var liquid=document.getElementById('s7-liquid');
          if(liquid)liquid.style.background='rgba(30,30,30,0.9)';
          if(self.checkStageFail())return;
          var narr=document.getElementById('s7-narrative');
          if(narr){narr.textContent='배합 실패! 혼합액이 검게 변했다. ('+self.stageFails+'/3)';narr.style.color='#ff6666';}
          setTimeout(function(){
            amounts={A:0,B:0,C:0};updateDisplay();
            if(narr){narr.style.color='';narr.textContent='시약을 비율에 맞게 배합하자. ('+timeLeft+'초)';}
          },1200);
        }
      }
    });

    UIManager.showDialog([
      {speaker:'윤',text:'저수지... 외계 장치가 이 물을 가리키고 있어.'},
      {speaker:'윤',text:'화학 물질 X-7을... 여기에 넣으라는 건가?'},
      {speaker:'윤',text:'실험 기록에 배합 비율이 적혀있었어. 시약 A는 '+ANS_A+'이라고...'}
    ]);
  },

  /* ===== STAGE 8 — 폐병원: 탐색 + 코드 입력 + 깜놀 ===== */
  stage8:function(){

    var sc=document.getElementById('stage-content');

    var phase=1;
    var visited={};
    var foundClues={};
    var codeFails=0;
    var code='';
    var scare302done=false;
    var codeDigits=[];for(var cd=0;cd<4;cd++)codeDigits.push(1+Math.floor(Math.random()*9));
    var CODE=codeDigits.join('');

    function getClueList(){
      var list=[];
      if(foundClues['301'])list.push('301호: 환자번호 "'+codeDigits[0]+'\u2605'+codeDigits[2]+'\u2605"');
      if(foundClues['302'])list.push('302호: 벽 낙서 "'+codeDigits[1]+'"');
      if(foundClues['nurse'])list.push('간호사실: 투여량 '+codeDigits[3]+'cc');
      return list;
    }

    function updateKeypad(){
      var d=document.getElementById('s8-display');if(!d)return;
      var shown=code;while(shown.length<4)shown+='_';d.textContent=shown;
    }

    function renderPhase1(){
      phase=1;
      var clueList=getClueList();
      var clueText=clueList.length>0?'\ud83d\udccb 수집한 단서: '+clueList.join(' | '):'\uc544\uc9c1 단서가 없다. 방을 탐색하자.';
      var rm=function(id){return 'hospital-room'+(visited[id]?' visited':'');};
      sc.innerHTML=
        '<div class="scene" style="justify-content:center;">'+

          '<div class="hospital-map">'+
            '<div class="hospital-rooms">'+
              '<div class="'+rm('301')+'" data-room="301">\ud83d\udeaa 301호</div>'+
              '<div class="'+rm('302')+'" data-room="302">\ud83d\udeaa 302호</div>'+
              '<div class="'+rm('303')+'" data-room="303">\ud83d\udeaa 303호</div>'+
              '<div class="'+rm('nurse')+' wide" data-room="nurse">\ud83c\udfe5 간호사실</div>'+
              '<div class="'+rm('storage')+'" data-room="storage">\ud83d\udce6 창고</div>'+
            '</div>'+
            '<div class="hospital-clues" id="s8-clues">'+clueText+'</div>'+
            '<div class="hospital-basement'+(clueList.length<3?' locked':'')+'" id="s8-basement">\ud83d\udd12 지하실 (단서 3개 이상 필요)</div>'+
          '</div>'+
          '<div class="antenna-narrative" id="s8-narrative">방을 탐색해서 지하실 비밀번호의 단서를 찾자.</div>'+
        '</div>';
    }

    function renderPhase2(){
      phase=2;code='';
      var clueList=getClueList();
      sc.innerHTML=
        '<div class="scene" style="justify-content:center;">'+
          '<div class="scene-title">Stage 8: 폐병원 지하</div>'+
          '<div class="scene-desc" style="max-width:360px;">지하로 내려가는 문. 잠금 키패드가 빛난다.</div>'+
          '<div class="keypad-wrap">'+
            '<div class="hint-panel">'+
              '\ud83d\udccb 수집한 단서:<br>'+
              clueList.map(function(c){return '\u2022 '+c;}).join('<br>')+
            '</div>'+
            '<div class="keypad-display" id="s8-display">____</div>'+
            '<div class="keypad-grid">'+
              '<button class="keypad-btn" data-key="1">1</button>'+
              '<button class="keypad-btn" data-key="2">2</button>'+
              '<button class="keypad-btn" data-key="3">3</button>'+
              '<button class="keypad-btn" data-key="4">4</button>'+
              '<button class="keypad-btn" data-key="5">5</button>'+
              '<button class="keypad-btn" data-key="6">6</button>'+
              '<button class="keypad-btn" data-key="7">7</button>'+
              '<button class="keypad-btn" data-key="8">8</button>'+
              '<button class="keypad-btn" data-key="9">9</button>'+
            '</div>'+
            '<div class="keypad-row-bottom">'+
              '<button class="keypad-btn fn" data-key="del">\u232b</button>'+
              '<button class="keypad-btn" data-key="0">0</button>'+
              '<button class="keypad-btn fn confirm" data-key="enter">\u2713</button>'+
            '</div>'+
          '</div>'+
          '<div style="text-align:center;margin-top:8px;"><button class="antenna-reset" id="s8-back">\u21a9 다시 탐색</button></div>'+
          '<div class="antenna-narrative" id="s8-narrative2">단서를 조합해서 4자리 코드를 완성하자.</div>'+
        '</div>';
    }

    /* 이벤트 리스너 — 한 번만 등록, phase로 분기 */
    sc.addEventListener('click',function(e){
      if(UIManager.isBusy()||solved)return;

      /* === Phase 1: 방 탐색 === */
      if(phase===1){
        var room=e.target.closest('.hospital-room');
        if(room){
          var rid=room.getAttribute('data-room');
          AudioEngine.click();
          visited[rid]=true;
          if(rid==='301'){
            if(foundClues['301']){
              UIManager.showDialog([{speaker:'윤',text:'환자번호 "'+codeDigits[0]+'\u2605'+codeDigits[2]+'\u2605". 이미 확인했다.'}],function(){renderPhase1();});
            }else{
              foundClues['301']=true;
              UIManager.showDialog([
                {speaker:'윤',text:'환자 기록부가 있다...'},
                {speaker:'윤',text:'"환자번호: '+codeDigits[0]+'\u2605'+codeDigits[2]+'\u2605" ...\u2605 부분은 피로 번져서 안 보여.'}
              ],function(){renderPhase1();});
            }
          }else if(rid==='302'){
            if(foundClues['302']){
              UIManager.showDialog([{speaker:'윤',text:'벽에 "'+codeDigits[1]+'"이 긁혀있다. 이미 봤어.'}],function(){renderPhase1();});
            }else{
              foundClues['302']=true;
              if(!scare302done){
                scare302done=true;
                EffectSystem.jumpScare('heavy',function(){
                  document.getElementById('static-overlay').style.opacity='0';
                  UIManager.showDialog([
                    {speaker:'윤',text:'뭐야?! ...아무것도 없어. 벽에 숫자 "'+codeDigits[1]+'"이 긁혀있다.'}
                  ],function(){renderPhase1();});
                },3);
              }else{
                UIManager.showDialog([{speaker:'윤',text:'벽에 "'+codeDigits[1]+'"이 긁혀있다.'}],function(){renderPhase1();});
              }
            }
          }else if(rid==='303'){
            UIManager.showDialog([
              {speaker:'윤',text:'깨진 사진... 가족 사진인 것 같은데.'},
              {speaker:'윤',text:'...뒤에 아무것도 적혀있지 않다. 여긴 단서가 없어.'}
            ],function(){renderPhase1();});
          }else if(rid==='nurse'){
            if(foundClues['nurse']){
              UIManager.showDialog([{speaker:'윤',text:'처방전에 "'+codeDigits[3]+'cc". 이미 봤어.'}],function(){renderPhase1();});
            }else{
              foundClues['nurse']=true;
              UIManager.showDialog([
                {speaker:'윤',text:'...발소리? 아니야, 착각이겠지.'},
                {speaker:'윤',text:'처방전에 숫자가 적혀있다. "투여량: '+codeDigits[3]+'cc"'}
              ],function(){renderPhase1();});
            }
          }else if(rid==='storage'){
            if(!self._storageVisits)self._storageVisits=0;
            self._storageVisits++;
            if(self._storageVisits>=3&&HiddenItemSystem.shouldShow()){
              HiddenItemSystem.showHiddenItem(8);
              UIManager.showDialog([{speaker:'윤',text:'...뭔가 있다. 구석에 빛나는 물체가...'}],function(){renderPhase1();});
            }else{
              UIManager.showDialog([{speaker:'윤',text:'의료 도구들... 쓸만한 건 없다.'+(self._storageVisits>=2?' ...정말?':'')}],function(){renderPhase1();});
            }
          }
          return;
        }
        if(e.target.id==='s8-basement'||e.target.closest('#s8-basement')){
          if(getClueList().length<3){
            var narr=document.getElementById('s8-narrative');
            if(narr)narr.textContent='단서가 더 필요해. 방을 더 탐색하자.';
            return;
          }
          AudioEngine.click();
          renderPhase2();
        }
        return;
      }

      /* === Phase 2: 키패드 입력 === */
      if(e.target.id==='s8-back'||e.target.closest('#s8-back')){
        AudioEngine.click();renderPhase1();return;
      }
      var btn=e.target.closest('.keypad-btn');if(!btn)return;
      var key=btn.getAttribute('data-key');
      AudioEngine.click();
      if(key==='del'){code=code.slice(0,-1);}
      else if(key==='enter'){
        if(code.length<4)return;
        if(code===CODE){
          solved=true;trackEvent('stage_clear',{stage:8});
          AudioEngine.success();
          EffectSystem.glitchScreen(500);
          self.addItem('활성화된 외계 장치','병원 지하에서 활성화한 외계 장치. 강한 진동을 내고 있다.');
          self.addItem('환자 기록부 사본','폐병원 301호에서 발견한 환자 기록. 의미불명의 숫자가 적혀있다.');
          setTimeout(function(){
            UIManager.showDialog([
              {speaker:'윤',text:'...열렸다. 지하에 뭔가 있어.'}
            ],function(){
              AlienLang.showAlien('msg8',function(){
                UIManager.showDialog([
                  {speaker:'윤',text:'거의 다 왔다고...? 뭐가?'}
                ],function(){
                  setTimeout(function(){self.goStage(9);},600);
                });
              });
            });
          },800);
        }else{
          codeFails++;
          self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
          AudioEngine.fail();EffectSystem.shake();
          var d=document.getElementById('s8-display');if(d)d.classList.add('error');
          if(codeFails>=3){
            EffectSystem.jumpScare('heavy',function(){self.gameOver();},3);
            return;
          }
          var narr=document.getElementById('s8-narrative2');
          if(narr){narr.textContent='틀렸다! ('+codeFails+'/3) 단서를 다시 확인해보자.';narr.style.color='#ff6666';}
          code='';
          setTimeout(function(){
            if(d)d.classList.remove('error');
            updateKeypad();
            if(narr){narr.textContent='단서를 조합해서 4자리 코드를 완성하자.';narr.style.color='';}
          },1200);
        }
      }else{
        if(code.length<4)code+=key;
      }
      updateKeypad();
    });

    renderPhase1();

    UIManager.showDialog([
      {speaker:'윤',text:'폐병원... 비상등만 깜빡이고 있어.'},
      {speaker:'윤',text:'신호가 지하를 가리킨다. 먼저 이 병원을 탐색해봐야 할 것 같아.'}
    ].concat(PlaythroughManager.isSecondPlay()?[{speaker:'???',text:'<span style="color:#00ff88;font-style:italic;">...아무것도 없는 곳을 세 번 두드려라...</span>',isAlien:true}]:[]));
  },

  /* ===== STAGE 9 — 외계 기지: 3층 보안 해제 (이전 단서 활용) ===== */
  stage9:function(){
    var self=this;
    self.stageFails=0;
    var sc=document.getElementById('stage-content');
    var solved=false;
    var floor=1;
    var timeLeft=90;
    var timerInterval=null;
    var scareDone=false;

    // 정답 — 연쇄 추론 구조
    // 1층: 142.7 - 87.5 = 55.2 → 552
    var F1_ANS='552';
    // 2층: 1층 답 각 자릿수의 곱 (5×5×2=50)
    var f2Prod=1;for(var di=0;di<F1_ANS.length;di++)f2Prod*=parseInt(F1_ANS[di]);
    var F2_ANS=String(f2Prod);
    // 3층: 문양 홀수/짝수 번째 합 (랜덤)
    var f3UseOdd=Math.random()<0.5;
    var f3Sum=f3UseOdd?(1+3+5):(2+4+6);
    var F3_ANS=String(f3Sum);
    var f3Label=f3UseOdd?'홀수':'짝수';

    function floorDots(){
      var h='';
      for(var f=1;f<=3;f++){
        var cls='floor-dot';
        if(f<floor)cls+=' done';else if(f===floor)cls+=' active';
        h+='<div class="'+cls+'">'+f+'F</div>';
      }
      return h;
    }

    function timerHtml(){
      return '<div class="timer-wrap"><svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/><circle id="s9-tc" cx="30" cy="30" r="26" fill="none" stroke="#aa44ff" stroke-width="4" stroke-dasharray="163.36" stroke-dashoffset="'+(163.36-(timeLeft/90)*163.36)+'" transform="rotate(-90 30 30)"/><text x="30" y="35" text-anchor="middle" class="timer-text" id="s9-tt">'+timeLeft+'</text></svg></div>';
    }

    function startTimer(){
      timerInterval=setInterval(function(){
        timeLeft--;
        var tt=document.getElementById('s9-tt');var tc=document.getElementById('s9-tc');
        if(tt)tt.textContent=timeLeft;
        if(tc){tc.setAttribute('stroke-dashoffset',163.36-(timeLeft/90)*163.36);}
        if(timeLeft<=15)AudioEngine.timerUrgent();
        else if(timeLeft<=30)AudioEngine.timerTick();
        if(timeLeft<=0){
          clearInterval(timerInterval);
          AudioEngine.scare4();EffectSystem.shake();
          self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
          if(self.checkStageFail())return;
          setTimeout(function(){timeLeft=90;floor=1;renderFloor();startTimer();},2000);
        }
      },1000);
      self.timerIntervals.push(timerInterval);
    }

    function renderFloor(){
      var mercyHint='';
      if(self.stageFails>=3){
        if(floor===1)mercyHint='<div style="color:#ffaa00;font-size:12px;margin:4px 0;">\ud83d\udca1 힌트: 142.7 - 87.5 = ? (소수점 제거)</div>';
        else if(floor===2)mercyHint='<div style="color:#ffaa00;font-size:12px;margin:4px 0;">\ud83d\udca1 힌트: 1층 답 '+F1_ANS+'의 각 자릿수를 곱해봐</div>';
        else if(floor===3)mercyHint='<div style="color:#ffaa00;font-size:12px;margin:4px 0;">\ud83d\udca1 힌트: '+f3Label+' 번째 = '+(f3UseOdd?'1,3,5번째':'2,4,6번째')+' 값의 합</div>';
      }

      var puzzleHtml='';
      var answer='';var narrative='';
      if(floor===1){
        answer=F1_ANS;
        puzzleHtml=
          '<div style="text-align:center;color:#aa44ff;font-size:16px;margin:12px 0;">\ud83d\udd0a 1층 보안 \u2014 주파수 코드</div>'+
          '<div class="hint-panel" style="border-color:rgba(170,68,255,0.3);">'+
            '\ud83d\udce1 기지 단말기 표시:<br>'+
            '"원본 수신 주파수: <span style="color:#ff6666;">87.5</span>MHz<br>'+
            '교란 주파수와의 <span style="color:#ff6666;">차이</span>를 구하라"<br>'+
            '<span style="color:#556;">소수점을 빼고 입력하세요. (교란 주파수는 수집품 참조)</span>'+
          '</div>'+mercyHint;
        narrative='수집품에서 교란 주파수를 확인하고, 87.5와의 차이를 구하자.';
      }else if(floor===2){
        // 깜놀
        if(!scareDone){scareDone=true;setTimeout(function(){EffectSystem.jumpScare('heavy',null,4);},300);}
        answer=F2_ANS;
        puzzleHtml=
          '<div style="text-align:center;color:#aa44ff;font-size:16px;margin:12px 0;">\u2697 2층 보안 \u2014 연산 코드</div>'+
          '<div class="hint-panel" style="border-color:rgba(170,68,255,0.3);">'+
            '\ud83d\udccb 기지 연산 패널:<br>'+
            '"1층 보안 코드의 <span style="color:#ff6666;">각 자릿수를 모두 곱한</span> 값을 입력하라"'+
          '</div>'+mercyHint;
        narrative='1층에서 입력한 코드를 기억해내자.';
      }else{
        answer=F3_ANS;
        puzzleHtml=
          '<div style="text-align:center;color:#aa44ff;font-size:16px;margin:12px 0;">\ud83e\udea8 3층 보안 \u2014 문양 코드</div>'+
          '<div class="hint-panel" style="border-color:rgba(170,68,255,0.3);">'+
            '\ud83d\udccb 기지 벽 문양:<br>'+
            '\u2600=1, \ud83c\udf0a=2, \ud83c\udf31=3, \ud83c\udf33=4, \ud83d\udd25=5, \ud83d\udc80=6<br><br>'+
            '"생명 순환 순서에서<br><span style="color:#ff6666;">'+f3Label+' 번째</span> 값의 합을 입력하라"'+
          '</div>'+mercyHint;
        narrative='문양 순서에서 '+f3Label+' 번째 값들의 합을 구하자.';
      }

      sc.innerHTML=
        '<div class="scene" style="justify-content:center;">'+
          timerHtml()+
          '<div class="scene-title" style="color:#aa44ff;">Stage 9: 외계 기지</div>'+
          '<div class="floor-indicator">'+floorDots()+'</div>'+
          '<div class="alien-base-wrap">'+puzzleHtml+
            '<div class="keypad-display" id="s9-disp" style="border-color:rgba(170,68,255,0.4);">'+('_'.repeat(answer.length))+'</div>'+
            '<div class="keypad-grid">'+
              '<button class="keypad-btn" data-key="1">1</button><button class="keypad-btn" data-key="2">2</button><button class="keypad-btn" data-key="3">3</button>'+
              '<button class="keypad-btn" data-key="4">4</button><button class="keypad-btn" data-key="5">5</button><button class="keypad-btn" data-key="6">6</button>'+
              '<button class="keypad-btn" data-key="7">7</button><button class="keypad-btn" data-key="8">8</button><button class="keypad-btn" data-key="9">9</button>'+
            '</div>'+
            '<div class="keypad-row-bottom">'+
              '<button class="keypad-btn fn" data-key="del">⌫</button><button class="keypad-btn" data-key="0">0</button><button class="keypad-btn fn confirm" data-key="enter">✓</button>'+
            '</div>'+
          '</div>'+
          '<div class="antenna-narrative" id="s9-narr">'+narrative+'</div>'+
        '</div>';

      var code='';
      var maxLen=answer.length;
      function updDisp(){var d=document.getElementById('s9-disp');if(d){var s=code;while(s.length<maxLen)s+='_';d.textContent=s;}}

      sc.onclick=function(e){
        if(UIManager.isBusy()||solved)return;
        var btn=e.target.closest('.keypad-btn');if(!btn)return;
        var key=btn.getAttribute('data-key');AudioEngine.click();
        if(key==='del'){code=code.slice(0,-1);}
        else if(key==='enter'){
          if(code.length<1)return;
          // 히든: 1층에서 0 입력
          if(code==='0'&&floor===1&&HiddenItemSystem.shouldShow()){HiddenItemSystem.showHiddenItem(9);code='';updDisp();return;}
          if(code===answer){
            AudioEngine.success();
            floor++;
            if(floor>3){
              // 전체 클리어!
              solved=true;trackEvent('stage_clear',{stage:9});
              clearInterval(timerInterval);
              var flash=document.getElementById('flash-overlay');
              flash.style.background='rgba(100,0,200,0.4)';flash.style.transition='opacity 0.5s';flash.style.opacity='1';
              setTimeout(function(){flash.style.transition='opacity 2s';flash.style.opacity='0';setTimeout(function(){flash.style.background='#000';},2000);},1500);
              self.addItem('번역기 모듈','외계 기지에서 획득한 번역 장치. 외계어를 해독할 수 있다.');
              setTimeout(function(){
                UIManager.showDialog([
                  {speaker:'윤',text:'이게... 전부 여기서 시작된 거였어.'}
                ],function(){
                  AlienLang.showAlien('msg9',function(){
                    UIManager.showDialog([
                      {speaker:'윤',text:'뭔가... 이번 건 다르게 들려. 거의... 이해할 수 있을 것 같아.'}
                    ],function(){
                      setTimeout(function(){self.goStage(10);},600);
                    });
                  });
                });
              },1000);
            }else{
              setTimeout(renderFloor,400);
            }
          }else{
            self.totalWrong++;trackEvent('stage_fail',{stage:self.stage});
            AudioEngine.fail();EffectSystem.redPulse();
            if(self.checkStageFail())return;
            code='';updDisp();
            var narr=document.getElementById('s9-narr');
            if(narr){narr.textContent='틀렸다!';narr.style.color='#ff6666';setTimeout(function(){if(narr){narr.style.color='';renderFloor();}},1000);}
          }
        }else{if(code.length<maxLen)code+=key;}
        updDisp();
      };
    }

    renderFloor();
    startTimer();

    // 히든 아이템 (2회차)
    setTimeout(function(){
      var sceneEl=sc.querySelector('.scene');
      if(sceneEl){sceneEl.style.position='relative';HiddenItemSystem.injectItems(9,sceneEl);}
    },200);

    UIManager.showDialog([
      {speaker:'윤',text:'여기가... 외계 기지. 인간이 만든 건물이 아니야.'},
      {speaker:'윤',text:'벽이 맥동하고 있어. 이전 스테이지에서 모은 단서가 필요할 것 같아.'},
      {speaker:'윤',text:'3층 보안을 해제해야 중심부에 갈 수 있다.'}
    ].concat(PlaythroughManager.isSecondPlay()?[{speaker:'???',text:'<span style="color:#00ff88;font-style:italic;">...첫 관문에서 무(無)를 입력하라...</span>',isAlien:true}]:[]));
  },

  /* ===== STAGE 11 — 번역기 완성 (완전 구현) ===== */
  stage11:function(){
    var self=this;
    var sc=document.getElementById('stage-content');
    sc.innerHTML=
      '<div class="scene" style="justify-content:center;">'+
        '<div style="text-align:center;max-width:500px;padding:20px;">'+

      {speaker:'윤',text:'번역 모듈...? 그동안 받았던 신호를 번역할 수 있다는 건가?'},
      {speaker:'윤',text:'...해보자.'}
    ],function(){
      // 번역 시퀀스 시작
      var bar=document.getElementById('s11-bar');
      var status=document.getElementById('s11-status');
      var msgArea=document.getElementById('s11-messages');
      var msgs=[];
      for(var i=0;i<ALIEN_MESSAGES.length;i++){
        if(ALIEN_MESSAGES[i].id!=='msg_hidden')msgs.push(ALIEN_MESSAGES[i]);
      }

      var idx=0;
      function revealNext(){
        if(idx>=msgs.length){
          // 모든 번역 완료
          status.textContent='번역 완료';
          status.style.color='#ff0000';
          bar.style.background='#ff0000';
          EffectSystem.glitchScreen(800);
          EffectSystem.redPulse();

          setTimeout(function(){
            AudioEngine.heartbeat();
            UIManager.showDialog([
              {speaker:'윤',text:'...뭐야 이건.'},
              {speaker:'윤',text:'전력 차단... 통신 두절... 독소... 방어막 해제...'},
              {speaker:'윤',text:'내가... 내가 한 짓이...'},
              {speaker:'윤',text:'이건... 지구를 파괴하기 위한 절차였어?!'},
              {speaker:'윤',text:'나는... 도구였던 거야...?'}
            ],function(){
              setTimeout(function(){self.goStage(12);},1000);
            });
          },1500);
          return;
        }

        var m=msgs[idx];
        var pct=Math.round(((idx+1)/msgs.length)*100);
        bar.style.width=pct+'%';
        status.textContent='번역 중... '+pct+'%';

        // 먼저 외계어 표시
        var div=document.createElement('div');
        div.style.cssText='margin:8px 0;padding:8px;border-left:2px solid #333;';
        div.innerHTML='<div style="font-size:11px;color:#555;margin-bottom:4px;">Stage '+(m.stage)+' — '+m.timing+'</div>'+
          '<div class="alien-text" style="font-size:13px;">'+m.alien+'</div>';
        msgArea.appendChild(div);
        msgArea.scrollTop=msgArea.scrollHeight;
        AudioEngine.alienSignal();

        // 번역 표시
        setTimeout(function(){
          var transDiv=document.createElement('div');
          transDiv.className='alien-translated reveal-anim';
          transDiv.style.cssText='font-size:14px;margin-top:4px;';
          transDiv.textContent='→ "'+m.translation+'"';
          div.appendChild(transDiv);
          msgArea.scrollTop=msgArea.scrollHeight;

          // 후반부일수록 충격적 — 효과 강화
          if(idx>=7){
            EffectSystem.glitchScreen(200);
            AudioEngine.heartbeat();
          }
          if(idx>=9){
            EffectSystem.redPulse();
          }

          idx++;
          setTimeout(revealNext,1200);
        },600);
      }

      setTimeout(revealNext,1000);
    });
  },
