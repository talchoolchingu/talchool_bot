              '마지막으로 본 것은 붉게 물든 하늘이었다.<br><br>'+
              '<span style="color:#555;">저항은 무의미했다.<br>하지만 당신은 끝까지 인간이었다.</span>'+
            '</div>'+
            self._statsHtml(min,sec,'B')+
            self._replayHtml()+
          '</div>';
        /* 엔딩 텍스트 서서히 나타남 */
        setTimeout(function(){
          var box=sc.querySelector('.ending-box');
          if(box)box.style.opacity='1';
        },100);

        if(!PlaythroughManager.isSecondPlay()||PlaythroughManager.getEndings().length<3){
          setTimeout(function(){
            UIManager.showDialog([{speaker:'???',text:'...다른 방법이... 있었을지도...'}]);
          },3000);
        }
      });
    });
  },

  endingC:function(min,sec){
    var self=this;
    PlaythroughManager.markCleared('C');
    var elapsed=Math.floor((Date.now()-this.startTime)/1000);
    trackEvent('ending_reached',{ending:'C'});trackEvent('game_complete',{time:elapsed});
    var sc=document.getElementById('stage-content');

    UIManager.showDialog([
      {speaker:'윤',text:'이 파편들이... 빛나고 있어. 이건 무기가 될 수 있어!'},
      {speaker:'??? 신호',text:'<span class="alien-translated">불가능해. 그것은 우리의—</span>',isAlien:true},
      {speaker:'윤',text:'닥쳐. 이번엔 내가 신호를 보낸다.'}
    ],function(){
      EffectSystem.screenFlicker(8,function(){
        EffectSystem.glitchScreen(1000);
        setTimeout(function(){
          sc.innerHTML=
            '<div class="ending-box">'+
              '<div class="ending-title" style="color:#00ff88;">ENDING C<br>역전</div>'+
              '<div class="ending-text">'+
                '외계 아이템에서 방출된 에너지가<br>함선의 코어를 역류시켰다.<br><br>'+
                '함선은 폭발하며 궤도에서 사라졌다.<br>'+
                '지구는 상처투성이였지만, 아직 살아있었다.<br><br>'+
                '<span style="color:#00ff88;">당신은 도구가 아니었다.<br>당신은 반격의 신호 그 자체였다.</span>'+
              '</div>'+
              self._statsHtml(min,sec,'C')+
              self._replayHtml()+
            '</div>';
        },1200);
      });
    });
  },

  /* ===== ENDING D — 루프 (메타 엔딩) ===== */
  endingD:function(min,sec){
    var self=this;
    PlaythroughManager.markCleared('D');
    trackEvent('ending_reached',{ending:'D'});
    trackEvent('hidden_ending_timeout',{wait_seconds:20});
    var sc=document.getElementById('stage-content');
    var flash=document.getElementById('flash-overlay');

    // Phase 1 (0s): 가벼운 글리치 + 대사
    EffectSystem.glitchScreen(300);
    UIManager.showDialog([
      {speaker:'윤',text:'...뭔가 이상해.'},
      {speaker:'윤',text:'왜 아무것도 선택할 수가 없지...?'}
    ],function(){
      // Phase 2 (3s): 글리치 심해짐
      EffectSystem.glitchScreen(800);
      EffectSystem.shake();
      AudioEngine.heartbeat();
      setTimeout(function(){
        UIManager.showDialog([
          {speaker:'윤',text:'이 상황... 전에도 겪은 것 같아.'},
          {speaker:'윤',text:'선택지도, 외계인도, 전부 이미 본 것 같은...'}
        ],function(){
          // Phase 3 (7s): UI 붕괴
          var codeSnippets=[
            'function jumpScare() {','var stage = 12;','ENDING_D = true;',
            'if(player.choice === null) {','Game.goStage(1);','// TODO: 탈출구 없음',
            'while(true) { play(); }','signal.receive();','var loop = Infinity;'
          ];
          var breakHtml='<div style="position:relative;width:100%;height:100%;overflow:hidden;">';
          for(var ci=0;ci<codeSnippets.length;ci++){
            var x=Math.random()*80+5,y=Math.random()*70+5,dur=2+Math.random()*3;
            breakHtml+='<div style="position:absolute;left:'+x+'%;top:'+y+'%;color:#0f0;font-family:monospace;font-size:11px;opacity:0.7;animation:code-float '+dur+'s linear infinite;white-space:nowrap;">'+codeSnippets[ci]+'</div>';
          }
          // 깨진 UI 요소
          breakHtml+='<div style="position:absolute;left:10%;top:20%;animation:ui-collapse 3s forwards;font-size:14px;color:#ff6666;">Stage 12</div>';
          breakHtml+='<div style="position:absolute;right:10%;top:15%;animation:ui-collapse 4s forwards 0.5s;font-size:12px;color:#4488ff;">📦 수집품</div>';
          breakHtml+='<div style="position:absolute;left:30%;top:60%;animation:ui-collapse 3.5s forwards 1s;font-size:12px;color:#ffaa00;">💡 힌트</div>';
          breakHtml+='</div>';
          sc.innerHTML=breakHtml;
          sc.style.filter='hue-rotate(0deg)';
          var hueVal=0;
          var hueInterval=setInterval(function(){hueVal+=30;sc.style.filter='hue-rotate('+hueVal+'deg)'+(hueVal%60===0?' invert(1)':'');},150);
          self.timers.push(hueInterval);

          setTimeout(function(){
            // Phase 4 (10s): 메타 인식 대사
            clearInterval(hueInterval);sc.style.filter='';
            UIManager.showDialog([
              {speaker:'윤',text:'이건... 게임이었어...?'},
              {speaker:'윤',text:'나는... 뭐지?'},
              {speaker:'윤',text:'플레이어...? 캐릭터...? 그럼 지금 이 생각도...'}
            ],function(){
              // Phase 5 (15s): 검은 화면 2초
              sc.innerHTML='';
              flash.style.transition='opacity 0.5s';
              flash.style.background='#000';
              flash.style.opacity='1';

              setTimeout(function(){
                // Phase 6 (17s): 수신 질문
                flash.style.opacity='0';
                sc.innerHTML=
                  '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;font-family:monospace;">'+
                    '<div id="meta-question" style="color:#0f0;font-size:18px;opacity:0;transition:opacity 1.5s;text-align:center;">SIGNAL\uc744 \ub2e4\uc2dc \uc218\uc2e0\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?</div>'+
                    '<div id="meta-prompt" style="color:#0f0;font-size:16px;margin-top:16px;opacity:0;transition:opacity 1s;">> <span class="meta-cursor">_</span></div>'+
                  '</div>';
                setTimeout(function(){document.getElementById('meta-question').style.opacity='1';},100);
                setTimeout(function(){document.getElementById('meta-prompt').style.opacity='1';},1500);

                setTimeout(function(){
                  // Phase 7 (20s): 자동 YES 타이핑
                  var prompt=document.getElementById('meta-prompt');
                  if(prompt)prompt.innerHTML='> <span style="color:#0f0;">Y</span><span class="meta-cursor">_</span>';
                  setTimeout(function(){
                    if(prompt)prompt.innerHTML='> <span style="color:#0f0;">YE</span><span class="meta-cursor">_</span>';
                    setTimeout(function(){
                      if(prompt)prompt.innerHTML='> <span style="color:#0f0;">YES</span>';
                      AudioEngine.glitch();
                      setTimeout(function(){
                        UIManager.showDialog([
                          {speaker:'윤',text:'...잠깐, 내가 친 게 아닌데\u2014'}
                        ],function(){
                          // Phase 8 (23s): 플래시 → 엔딩 표시 → 타이틀
                          EffectSystem.screenFlicker(6,function(){
                            flash.style.transition='opacity 0.3s';
                            flash.style.background='#fff';
                            flash.style.opacity='1';
                            setTimeout(function(){
                              sc.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div style="text-align:center;color:#0f0;font-size:20px;font-family:monospace;">ENDING D \u2014 \ub8e8\ud504</div></div>';
                              flash.style.transition='opacity 1s';
                              flash.style.background='#000';
                              flash.style.opacity='0';
                              setTimeout(function(){
                                flash.style.opacity='1';flash.style.background='#000';
                                setTimeout(function(){
                                  flash.style.opacity='0';
                                  document.getElementById('game-screen').style.display='none';
                                  document.getElementById('title-screen').style.display='flex';
                                  EffectSystem.atmosphereShift('');
                                  AudioEngine.stopBgm();
                                  // 타이틀 글리치 효과 적용
                                  self._applyEndingDTitle();
                                },500);
                              },2000);
                            },300);
                          });
                        });
                      },800);
                    },300);
                  },300);
                },3000);
              },2000);
            });
          },3000);
        });
      },500);
    });
  },

  _applyEndingDTitle:function(){
    // SIGNAL 로고 글리치
    var title=document.querySelector('#title-screen h1');
    if(title)title.classList.add('title-glitch-d');
    // RECEIVE → AGAIN? 깜빡임
    var btn=document.getElementById('btn-start');
    if(btn){
      var toggle=false;
      setInterval(function(){
        toggle=!toggle;
        btn.textContent=toggle?'AGAIN?':'RECEIVE';
        if(toggle)setTimeout(function(){btn.textContent='RECEIVE';},2000);
      },3000);
    }
  },

  _statsHtml:function(min,sec,ending){
    return '<div class="stats-box">'+
      '<h3 style="color:var(--atmo-accent);margin-bottom:8px;">📊 기록</h3>'+
      '<p>엔딩: <span>'+ending+'</span></p>'+
      '<p>소요 시간: <span>'+min+'분 '+sec+'초</span></p>'+
      '<p>힌트 사용: <span>'+this.hintTotal+'/'+this.hintMax+'</span></p>'+
      '<p>오답: <span>'+this.totalWrong+'회</span></p>'+
      '<p>회차: <span>'+PlaythroughManager.getCount()+'회차</span></p>'+
    '</div>';
  },

  _replayHtml:function(){
    return '<div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">'+
      '<button class="btn-signal" id="btn-replay" style="padding:12px 24px;font-size:14px;">REPLAY</button>'+
    '</div>';
  }
};

/* ===== HINT ===== */
function updateHintButton(){
  var btn=document.getElementById('btn-hint');
  var remaining=Game.hintMax-Game.hintTotal;
  btn.innerHTML='💡 힌트('+remaining+')';
  if(remaining<=0)btn.classList.add('disabled');
  else btn.classList.remove('disabled');
}

function openHint(){
  var stage=Game.stage;
  if(stage<1||stage>12){
    document.getElementById('hint-text').textContent='현재 스테이지에는 힌트가 없습니다.';
    document.getElementById('hint-modal').style.display='flex';return;
  }
  if(Game.hintTotal>=Game.hintMax){
    document.getElementById('hint-text').textContent='힌트를 모두 사용했습니다! ('+Game.hintMax+'/'+Game.hintMax+')';
    document.getElementById('hint-modal').style.display='flex';return;
  }
  if(!Game.hintUsedStages.has(stage)){
    Game.hintUsedStages.add(stage);Game.hintTotal++;updateHintButton();trackEvent('hint_used',{stage:stage});
  }
  document.getElementById('hint-text').textContent=SOLUTIONS[stage-1].hint;
  document.getElementById('hint-modal').style.display='flex';
}

function openInventory(){
  var list=document.getElementById('inv-list');
  if(Game.inventory.length===0){
    list.innerHTML='<div class="inv-empty">아직 수집품이 없습니다</div>';
  }else{
    var h='';
    for(var i=0;i<Game.inventory.length;i++){
      h+='<div class="inv-item" data-idx="'+i+'">'+Game.inventory[i].name+'</div>';
    }
    list.innerHTML=h;
  }
  document.getElementById('inv-modal').style.display='flex';
}

document.getElementById('inv-list').addEventListener('click',function(e){
  var item=e.target.closest('.inv-item');if(!item)return;
  var idx=parseInt(item.getAttribute('data-idx'));
  var inv=Game.inventory[idx];if(!inv)return;
  document.getElementById('item-popup-title').textContent=inv.name;
  document.getElementById('item-popup-desc').innerHTML=inv.desc;
  document.getElementById('item-popup').style.display='flex';
});

function openSolutions(){
  var h='';
  for(var i=0;i<SOLUTIONS.length;i++){
    var s=SOLUTIONS[i];
    h+='<div class="sol-item"><div class="sol-title">Stage '+s.stage+': '+s.title+'</div>'+
      '<div class="sol-hint">💡 '+s.hint+'</div>'+
      '<button class="sol-reveal" data-answer="'+s.answer+'">🔍 정답 보기</button>'+
      '<div class="sol-answer" id="sol-ans-'+i+'"></div></div>';
  }
  document.getElementById('sol-list').innerHTML=h;
  document.getElementById('sol-modal').style.display='flex';
}

document.getElementById('sol-list').addEventListener('click',function(e){
  var btn=e.target.closest('.sol-reveal');if(!btn)return;
  AudioEngine.click();
  var ans=btn.getAttribute('data-answer');
  var ansDiv=btn.nextElementSibling;
  ansDiv.textContent='✅ '+ans;ansDiv.style.display='block';btn.style.display='none';
});

/* ===== MODAL HANDLERS ===== */
document.getElementById('btn-inv').addEventListener('click',function(){AudioEngine.click();openInventory();});
document.getElementById('btn-hint').addEventListener('click',function(){AudioEngine.click();openHint();});
document.getElementById('btn-sol').addEventListener('click',function(){AudioEngine.click();openSolutions();});
document.getElementById('inv-close').addEventListener('click',function(){document.getElementById('inv-modal').style.display='none';});
document.getElementById('sol-close').addEventListener('click',function(){document.getElementById('sol-modal').style.display='none';});
document.getElementById('hint-close').addEventListener('click',function(){document.getElementById('hint-modal').style.display='none';});
document.getElementById('item-close').addEventListener('click',function(){document.getElementById('item-popup').style.display='none';});
document.getElementById('inv-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
document.getElementById('sol-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
document.getElementById('hint-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
document.getElementById('item-popup').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

document.getElementById('btn-alien').addEventListener('click',function(){
  AudioEngine.click();
  var collected=PlaythroughManager.getCollectedAlienItems();
  var items=HiddenItemSystem.ITEMS;
  var h='';
  for(var i=0;i<items.length;i++){
    var found=collected.indexOf(items[i].id)!==-1;
    if(found){
      h+='<div class="inv-item" style="border-color:rgba(0,255,136,0.3);color:#00ff88;">'+items[i].name+'<br><span style="font-size:12px;color:#889;">'+items[i].desc+'</span></div>';
    }else{
      h+='<div class="inv-item" style="opacity:0.3;">??? (Stage '+items[i].stage+')<br><span style="font-size:11px;color:#00ff88;font-style:italic;">'+items[i].hint+'</span></div>';
    }
  }
  h+='<div style="text-align:center;margin-top:12px;font-size:12px;color:#556;">수집: '+collected.length+'/'+items.length+(collected.length>=4?' — 엔딩 C 해금!':'')+'</div>';
  document.getElementById('alien-list').innerHTML=h;
  document.getElementById('alien-modal').style.display='flex';
});
document.getElementById('alien-close').addEventListener('click',function(){document.getElementById('alien-modal').style.display='none';});
document.getElementById('alien-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

/* ===== 히든 아이템 획득 팝업 핸들러 ===== */
document.getElementById('hidden-item-close').addEventListener('click',function(){document.getElementById('hidden-item-popup').style.display='none';});
document.getElementById('hidden-item-ok').addEventListener('click',function(){document.getElementById('hidden-item-popup').style.display='none';});
document.getElementById('hidden-item-popup').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

/* ===== 히든 아이템 전역 클릭 핸들러 ===== */
document.body.addEventListener('click',function(e){
  var alienEl=e.target.closest('.hidden-item-icon[data-alien-id]');
  if(alienEl){e.stopPropagation();AudioEngine.click();var aid=alienEl.getAttribute('data-alien-id');alienEl.remove();HiddenItemSystem.collectItem(aid);}
});

/* ===== START + REPLAY ===== */
document.getElementById('btn-start').addEventListener('click',function(){
  AudioEngine.click();Game.start();
});

// 엔딩D 클리어 시 타이틀 글리치
if(PlaythroughManager.getEndings().indexOf('D')!==-1){
  Game._applyEndingDTitle();
}

// 히든 가이드 버튼 (3회차부터)
if(PlaythroughManager.getCount()>=2){
  document.getElementById('btn-hidden-guide').style.display='';
}
document.getElementById('btn-hidden-guide').addEventListener('click',function(){
  AudioEngine.click();
  var items=HiddenItemSystem.ITEMS;
  var collected=PlaythroughManager.getCollectedAlienItems();
  var h='';
  for(var i=0;i<items.length;i++){
    var found=collected.indexOf(items[i].id)!==-1;
    h+='<div style="padding:8px;margin:6px 0;border-left:3px solid '+(found?'#00ff88':'#333')+';color:'+(found?'#00ff88':'#667')+';">'+
      '<div style="font-size:13px;font-weight:bold;">Stage '+items[i].stage+(found?' \u2714':'')+' </div>'+
      '<div style="font-size:12px;margin-top:4px;font-style:italic;">'+items[i].hint+'</div>'+
    '</div>';
  }
  document.getElementById('hidden-guide-list').innerHTML=h;
  document.getElementById('hidden-guide-modal').style.display='flex';
});
document.getElementById('hidden-guide-close').addEventListener('click',function(){document.getElementById('hidden-guide-modal').style.display='none';});
document.getElementById('hidden-guide-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

document.addEventListener('click',function(e){
  if(e.target.id==='btn-replay'||e.target.closest('#btn-replay')){
    AudioEngine.click();AudioEngine.stopBgm();EffectSystem.hideNewsTicker();
    document.getElementById('game-screen').style.display='none';
    document.getElementById('title-screen').style.display='flex';
    EffectSystem.atmosphereShift('');
    // 2회차 표시 업데이트
    if(PlaythroughManager.isSecondPlay()){
      document.getElementById('playthrough-notice').style.display='block';
    }
  }
});

/* ===== INIT ===== */
if(PlaythroughManager.isSecondPlay()){
  document.getElementById('playthrough-notice').style.display='block';
}

})();
</script>
